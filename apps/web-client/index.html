<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/seams6_branding_assets/web/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/seams6_branding_assets/web/seams-icon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/seams6_branding_assets/web/seams-icon-192x192.png"
    />
    <link rel="apple-touch-icon" href="/seams6_branding_assets/web/seams-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap"
    />
    <!-- Fallback bundled fonts are also imported via @fontsource in src/app/main.tsx -->
    <script>
      (function () {
        try {
          var ls = (localStorage.getItem('seams-site-theme') || '').replace(/\"/g, '');
          // Default to dark when no preference is stored yet
          var hasStored = ls === 'dark' || ls === 'light';
          var mode = hasStored ? ls : 'dark';
          if (!hasStored) {
            localStorage.setItem('seams-site-theme', mode);
          }
          // Keep SDK/theme hooks in sync with environment by reflecting on <html>
          document.documentElement.classList.toggle('dark', mode === 'dark');
          document.documentElement.setAttribute('data-w3a-theme', mode);
          document.addEventListener('DOMContentLoaded', function () {
            document.body.setAttribute('data-w3a-theme', mode);
          });
        } catch (e) {}
      })();
    </script>
    <title>Seams Passkey Wallet</title>
  </head>
  <body>
    <div id="app-root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
