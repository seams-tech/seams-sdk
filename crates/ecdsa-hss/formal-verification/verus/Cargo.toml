[package]
name = "ecdsa-hss-verus"
version = "0.1.0"
edition = "2021"
publish = false
description = "Standalone Verus verification crate for ecdsa-hss"

[dependencies]
vstd = "=0.0.0-2026-03-29-0113"

[dev-dependencies]
ecdsa-hss = { path = "../.." }
signer-core = { path = "../../../signer-core", features = ["secp256k1"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
sha3 = "0.10"
num-bigint = "0.4"
num-traits = "0.2"
k256 = { version = "0.13", default-features = false, features = ["ecdsa", "arithmetic"] }

[lib]
name = "ecdsa_hss_verus"
path = "src/lib.rs"

[package.metadata.verus]
verify = true

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(verus_only)'] }
