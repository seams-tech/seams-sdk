[verus]
release = "0.2026.04.03.21dfcd2"
vstd = "0.0.0-2026-03-29-0113"

[aeneas]
repo = "https://github.com/AeneasVerif/aeneas.git"
rev = "42c0e90dacf486f7d3ed5b6cde3a9a81f04915a4"

[charon]
repo = "https://github.com/AeneasVerif/charon.git"
rev = "419f53b6eed3fe487a8427fd290a734c49634366"

[lean]
toolchain = "leanprover/lean4:v4.28.0-rc1"

[python]
