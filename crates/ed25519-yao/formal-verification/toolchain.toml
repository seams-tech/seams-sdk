  "ed25519_yao_generator::wrapping_add_le_256",
  "ed25519_yao_generator::clamp_rfc8032",
]

[evidence]
vector_cases = 5
kdf_vector_cases = 1
differential_vector_cases = 128
independent_verifier_tests = 21
production_rust_tests = 16
generator_rust_tests = 42
anti_drift_tests = 6
verus_obligations = 10
lean_model_theorems = 3
aeneas_extracted_functions = 2
