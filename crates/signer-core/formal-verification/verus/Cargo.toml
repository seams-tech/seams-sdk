[package]
name = "signer-core-verus"
version = "0.1.0"
edition = "2021"
publish = false
description = "Standalone Verus verification crate for signer-core"

[dependencies]
vstd = "=0.0.0-2026-03-29-0113"

[dev-dependencies]
signer-core = { path = "../..", features = ["secp256k1", "near-threshold-ed25519"] }
curve25519-dalek = { version = "=4.1.3", features = ["rand_core", "zeroize"] }
hkdf = "0.12"
k256 = { version = "0.13", default-features = false, features = ["ecdsa", "arithmetic"] }
num-bigint = "0.4"
num-traits = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
sha3 = "0.10"

[lib]
name = "signer_core_verus"
path = "src/lib.rs"

[package.metadata.verus]
verify = true

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(verus_only)'] }
