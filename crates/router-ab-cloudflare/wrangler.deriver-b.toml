name = "router-ab-deriver-b"
main = "build/deriver-b/worker/shim.mjs"
compatibility_date = "2026-06-12"
workers_dev = false

[build]
command = "cargo install -q worker-build --version 0.8.4 && bash ./scripts/build-strict-worker.sh deriver-b"

[durable_objects]
bindings = [
  { name = "DERIVER_B_ROOT_SHARE_DO", class_name = "RouterAbDeriverBRootShareDurableObject" },
  { name = "DERIVER_B_YAO_SESSION_DO", class_name = "RouterAbDeriverBYaoSessionDurableObject" },
]

[[migrations]]
tag = "router_ab_deriver_b_v1"
new_sqlite_classes = ["RouterAbDeriverBRootShareDurableObject"]

[[migrations]]
tag = "router_ab_deriver_b_v2"
new_sqlite_classes = ["RouterAbDeriverBYaoSessionDurableObject"]

[[services]]
binding = "DERIVER_A"
service = "router-ab-deriver-a"

[vars]
ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET_BINDING = "ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET"
DERIVER_B_ROOT_SHARE_DO_BINDING = "DERIVER_B_ROOT_SHARE_DO"
DERIVER_B_ROOT_SHARE_DO_OBJECT = "deriver-b-root-share"
DERIVER_B_ROOT_SHARE_DO_KEY_PREFIX = "deriver-b-root-share/"
DERIVER_B_ROOT_SHARE_WIRE_SECRET_BINDING = "DERIVER_B_ROOT_SHARE_WIRE_SECRET"
DERIVER_B_ENVELOPE_HPKE_PRIVATE_KEY_BINDING = "DERIVER_B_ENVELOPE_HPKE_PRIVATE_KEY"
DERIVER_B_ENVELOPE_HPKE_KEY_EPOCH = "epoch-1"
DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY = "x25519:5e2819f555ecfcc996761ca4558551172f06052fb9f80123a88f4e0094c3b13a"
DERIVER_B_PEER_SIGNING_KEY_BINDING = "DERIVER_B_PEER_SIGNING_KEY"
DERIVER_B_PEER_SIGNING_KEY_EPOCH = "epoch-1"
DERIVER_A_PEER_VERIFYING_KEY_HEX = "d6d21d388a92e6eb9d85d9fcdbcba81c383d7102717b7160fab5e2b501555907"
DERIVER_B_PEER_VERIFYING_KEY_HEX = "1a369e342f555305e278312f3b704465e11fadbbab09134ed897402ed65c2d4a"
DERIVER_A_PEER_BINDING = "DERIVER_A"

[env.staging]
name = "router-ab-deriver-b-staging"
workers_dev = false

[[env.staging.durable_objects.bindings]]
name = "DERIVER_B_ROOT_SHARE_DO"
class_name = "RouterAbDeriverBRootShareDurableObject"

[[env.staging.durable_objects.bindings]]
name = "DERIVER_B_YAO_SESSION_DO"
class_name = "RouterAbDeriverBYaoSessionDurableObject"

[[env.staging.services]]
binding = "DERIVER_A"
service = "router-ab-deriver-a-staging"

[env.staging.vars]
ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET_BINDING = "ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET"
DERIVER_B_ROOT_SHARE_DO_BINDING = "DERIVER_B_ROOT_SHARE_DO"
DERIVER_B_ROOT_SHARE_DO_OBJECT = "deriver-b-root-share"
DERIVER_B_ROOT_SHARE_DO_KEY_PREFIX = "deriver-b-root-share/"
DERIVER_B_ROOT_SHARE_WIRE_SECRET_BINDING = "DERIVER_B_ROOT_SHARE_WIRE_SECRET"
DERIVER_B_ENVELOPE_HPKE_PRIVATE_KEY_BINDING = "DERIVER_B_ENVELOPE_HPKE_PRIVATE_KEY"
DERIVER_B_ENVELOPE_HPKE_KEY_EPOCH = "epoch-1"
DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY = "x25519:5e2819f555ecfcc996761ca4558551172f06052fb9f80123a88f4e0094c3b13a"
DERIVER_B_PEER_SIGNING_KEY_BINDING = "DERIVER_B_PEER_SIGNING_KEY"
DERIVER_B_PEER_SIGNING_KEY_EPOCH = "epoch-1"
DERIVER_A_PEER_VERIFYING_KEY_HEX = "d6d21d388a92e6eb9d85d9fcdbcba81c383d7102717b7160fab5e2b501555907"
DERIVER_B_PEER_VERIFYING_KEY_HEX = "1a369e342f555305e278312f3b704465e11fadbbab09134ed897402ed65c2d4a"
DERIVER_A_PEER_BINDING = "DERIVER_A"

[observability]
  [observability.logs]
  enabled = true
  head_sampling_rate = 1
  invocation_logs = true
