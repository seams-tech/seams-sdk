name = "router-ab-strict-signing-worker"
main = "build/signing-worker/worker/shim.mjs"
compatibility_date = "2026-06-12"
workers_dev = true

[build]
command = "cargo install -q worker-build --version 0.8.4 && worker-build --release --out-dir build/signing-worker --features strict-worker-signing-worker-entrypoint"

[durable_objects]
bindings = [
  { name = "SIGNING_WORKER_RELAYER_OUTPUT_DO", class_name = "RouterAbSigningWorkerRelayerOutputDurableObject" },
]

[[migrations]]
tag = "router_ab_signing_worker_v1"
new_classes = ["RouterAbSigningWorkerRelayerOutputDurableObject"]

[vars]
ROUTER_AB_ROUTE_PROFILE = "strict_proof_bundle"
SIGNING_WORKER_RELAYER_OUTPUT_DO_BINDING = "SIGNING_WORKER_RELAYER_OUTPUT_DO"
SIGNING_WORKER_RELAYER_OUTPUT_DO_OBJECT = "signing-worker-relayer-output"
SIGNING_WORKER_RELAYER_OUTPUT_DO_KEY_PREFIX = "signing-worker-relayer-output/"
SIGNING_WORKER_RELAYER_OUTPUT_HPKE_PRIVATE_KEY_BINDING = "SIGNING_WORKER_RELAYER_OUTPUT_HPKE_PRIVATE_KEY"
SIGNING_WORKER_RELAYER_OUTPUT_HPKE_KEY_EPOCH = "epoch-1"
SIGNING_WORKER_RELAYER_OUTPUT_HPKE_PUBLIC_KEY = "x25519:3333333333333333333333333333333333333333333333333333333333333333"
