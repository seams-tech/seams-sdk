name = "router-ab-strict-signer-a"
main = "build/signer-a/worker/shim.mjs"
compatibility_date = "2026-06-12"
workers_dev = true

[build]
command = "cargo install -q worker-build --version 0.8.4 && worker-build --release --out-dir build/signer-a --features strict-worker-signer-a-entrypoint"

[durable_objects]
bindings = [
  { name = "SIGNER_A_ROOT_SHARE_DO", class_name = "RouterAbSignerARootShareDurableObject" },
  { name = "SIGNER_A_RELAYER_OUTPUT_DO", class_name = "RouterAbSignerARelayerOutputDurableObject" },
]

[[migrations]]
tag = "router_ab_signer_a_v1"
new_classes = [
  "RouterAbSignerARootShareDurableObject",
  "RouterAbSignerARelayerOutputDurableObject",
]

[[services]]
binding = "SIGNER_B"
service = "router-ab-strict-signer-b"

[vars]
ROUTER_AB_ROUTE_PROFILE = "strict_proof_bundle"
SIGNER_A_ROOT_SHARE_DO_BINDING = "SIGNER_A_ROOT_SHARE_DO"
SIGNER_A_ROOT_SHARE_DO_OBJECT = "signer-a-root-share"
SIGNER_A_ROOT_SHARE_DO_KEY_PREFIX = "signer-a-root-share/"
SIGNER_A_RELAYER_OUTPUT_DO_BINDING = "SIGNER_A_RELAYER_OUTPUT_DO"
SIGNER_A_RELAYER_OUTPUT_DO_OBJECT = "signer-a-relayer-output"
SIGNER_A_RELAYER_OUTPUT_DO_KEY_PREFIX = "signer-a-relayer-output/"
SIGNER_A_ROOT_SHARE_WIRE_SECRET_BINDING = "SIGNER_A_ROOT_SHARE_WIRE_SECRET"
SIGNER_A_ENVELOPE_AEAD_KEY_BINDING = "SIGNER_A_ENVELOPE_AEAD_KEY"
SIGNER_A_ENVELOPE_AEAD_KEY_EPOCH = "epoch-1"
SIGNER_A_PEER_SIGNING_KEY_BINDING = "SIGNER_A_PEER_SIGNING_KEY"
SIGNER_A_PEER_SIGNING_KEY_EPOCH = "epoch-1"
SIGNER_A_PEER_VERIFYING_KEY_HEX = "REPLACE_WITH_SIGNER_A_ED25519_VERIFYING_KEY_HEX"
SIGNER_B_PEER_VERIFYING_KEY_HEX = "REPLACE_WITH_SIGNER_B_ED25519_VERIFYING_KEY_HEX"
SIGNER_B_PEER_BINDING = "SIGNER_B"
