name = "router-ab-mpc-router"
main = "build/router/worker/shim.mjs"
compatibility_date = "2026-06-12"
workers_dev = true

[build]
command = "cargo install -q worker-build --version 0.8.4 && bash ./scripts/build-strict-worker.sh router"

[durable_objects]
bindings = [
  { name = "ROUTER_REPLAY_DO", class_name = "RouterAbRouterReplayDurableObject" },
  { name = "ROUTER_LIFECYCLE_DO", class_name = "RouterAbRouterLifecycleDurableObject" },
  { name = "ROUTER_PROJECT_POLICY_DO", class_name = "RouterAbRouterProjectPolicyDurableObject" },
  { name = "ROUTER_QUOTA_DO", class_name = "RouterAbRouterQuotaDurableObject" },
  { name = "ROUTER_ABUSE_DO", class_name = "RouterAbRouterAbuseDurableObject" },
  { name = "ROUTER_WALLET_BUDGET_DO", class_name = "RouterAbRouterWalletBudgetDurableObject" },
]

[[migrations]]
tag = "router_ab_router_v1"
new_sqlite_classes = [
  "RouterAbRouterReplayDurableObject",
  "RouterAbRouterLifecycleDurableObject",
  "RouterAbRouterProjectPolicyDurableObject",
  "RouterAbRouterQuotaDurableObject",
  "RouterAbRouterAbuseDurableObject",
]

[[migrations]]
tag = "router_ab_router_wallet_budget_v1"
new_sqlite_classes = [
  "RouterAbRouterWalletBudgetDurableObject",
]

[[services]]
binding = "DERIVER_A"
service = "router-ab-deriver-a"

[[services]]
binding = "DERIVER_B"
service = "router-ab-deriver-b"

[[services]]
binding = "SIGNING_WORKER"
service = "router-ab-signing-worker"

[vars]
ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET_BINDING = "ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET"
ROUTER_JWT_ISSUER = "https://issuer.example"
ROUTER_JWT_AUDIENCE = "router-ab"
ROUTER_JWT_JWKS_URL = "https://issuer.example/.well-known/jwks.json"
DERIVER_A_ENVELOPE_HPKE_KEY_EPOCH = "epoch-1"
DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY = "x25519:1111111111111111111111111111111111111111111111111111111111111111"
DERIVER_B_ENVELOPE_HPKE_KEY_EPOCH = "epoch-1"
DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY = "x25519:2222222222222222222222222222222222222222222222222222222222222222"
DERIVER_A_PEER_VERIFYING_KEY_HEX = "5afa80b305e72e02615ed1f580144a40a42a71dfcac175809ceb5d79e740d015"
DERIVER_B_PEER_VERIFYING_KEY_HEX = "0c700dd63695221e508f3164b528f190bed63a4437d38e882308f9a57acc1bc3"
SIGNING_WORKER_SERVER_OUTPUT_HPKE_KEY_EPOCH = "epoch-1"
SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY = "x25519:3333333333333333333333333333333333333333333333333333333333333333"
ROUTER_REPLAY_DO_BINDING = "ROUTER_REPLAY_DO"
ROUTER_REPLAY_DO_OBJECT = "router-replay"
ROUTER_REPLAY_DO_KEY_PREFIX = "router-replay/"
ROUTER_LIFECYCLE_DO_BINDING = "ROUTER_LIFECYCLE_DO"
ROUTER_LIFECYCLE_DO_OBJECT = "router-lifecycle"
ROUTER_LIFECYCLE_DO_KEY_PREFIX = "router-lifecycle/"
ROUTER_PROJECT_POLICY_DO_BINDING = "ROUTER_PROJECT_POLICY_DO"
ROUTER_PROJECT_POLICY_DO_OBJECT = "router-project-policy"
ROUTER_PROJECT_POLICY_DO_KEY_PREFIX = "router-project-policy/"
ROUTER_PROJECT_POLICY_BOOTSTRAP_JSON = '{"org_id":"org_staging","project_id":"project_staging","environment":"staging","allowed_work_kinds":["registration_prepare","key_export","recovery","server_share_refresh"],"allow_normal_signing":true,"rejected_retry_after_ms":1000}'
ROUTER_QUOTA_DO_BINDING = "ROUTER_QUOTA_DO"
ROUTER_QUOTA_DO_OBJECT = "router-quota"
ROUTER_QUOTA_DO_KEY_PREFIX = "router-quota/"
ROUTER_ABUSE_DO_BINDING = "ROUTER_ABUSE_DO"
ROUTER_ABUSE_DO_OBJECT = "router-abuse"
ROUTER_ABUSE_DO_KEY_PREFIX = "router-abuse/"
ROUTER_WALLET_BUDGET_DO_BINDING = "ROUTER_WALLET_BUDGET_DO"
ROUTER_WALLET_BUDGET_DO_OBJECT = "router-wallet-budget"
ROUTER_WALLET_BUDGET_DO_KEY_PREFIX = "router-wallet-budget/"
DERIVER_A_PEER_BINDING = "DERIVER_A"
DERIVER_B_PEER_BINDING = "DERIVER_B"
SIGNING_WORKER_PEER_BINDING = "SIGNING_WORKER"

# Deployment targets keep Worker names and service bindings explicit.
[env.staging]
name = "router-ab-mpc-router-staging"
