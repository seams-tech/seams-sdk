name = "router-ab-strict-signer-b"
main = "build/signer-b/worker/shim.mjs"
compatibility_date = "2026-06-12"
workers_dev = false

[build]
command = "cargo install -q worker-build --version 0.8.4 && worker-build --release --out-dir build/signer-b --features strict-worker-signer-b-entrypoint"

[durable_objects]
bindings = [
  { name = "SIGNER_B_ROOT_SHARE_DO", class_name = "RouterAbSignerBRootShareDurableObject" },
]

[[migrations]]
tag = "router_ab_signer_b_v1"
new_sqlite_classes = ["RouterAbSignerBRootShareDurableObject"]

[[services]]
binding = "SIGNER_A"
service = "router-ab-strict-signer-a"

[[services]]
binding = "SIGNING_WORKER"
service = "router-ab-strict-signing-worker"

[vars]
ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET_BINDING = "ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET"
SIGNER_B_ROOT_SHARE_DO_BINDING = "SIGNER_B_ROOT_SHARE_DO"
SIGNER_B_ROOT_SHARE_DO_OBJECT = "signer-b-root-share"
SIGNER_B_ROOT_SHARE_DO_KEY_PREFIX = "signer-b-root-share/"
SIGNER_B_ROOT_SHARE_WIRE_SECRET_BINDING = "SIGNER_B_ROOT_SHARE_WIRE_SECRET"
SIGNER_B_ENVELOPE_HPKE_PRIVATE_KEY_BINDING = "SIGNER_B_ENVELOPE_HPKE_PRIVATE_KEY"
SIGNER_B_ENVELOPE_HPKE_KEY_EPOCH = "epoch-1"
SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY = "x25519:2222222222222222222222222222222222222222222222222222222222222222"
SIGNER_B_PEER_SIGNING_KEY_BINDING = "SIGNER_B_PEER_SIGNING_KEY"
SIGNER_B_PEER_SIGNING_KEY_EPOCH = "epoch-1"
SIGNER_A_PEER_VERIFYING_KEY_HEX = "REPLACE_WITH_SIGNER_A_ED25519_VERIFYING_KEY_HEX"
SIGNER_B_PEER_VERIFYING_KEY_HEX = "REPLACE_WITH_SIGNER_B_ED25519_VERIFYING_KEY_HEX"
SIGNER_A_PEER_BINDING = "SIGNER_A"
SIGNING_WORKER_PEER_BINDING = "SIGNING_WORKER"

[env.staging]
name = "router-ab-strict-signer-b-staging"
workers_dev = false

[[env.staging.durable_objects.bindings]]
name = "SIGNER_B_ROOT_SHARE_DO"
class_name = "RouterAbSignerBRootShareDurableObject"

[[env.staging.services]]
binding = "SIGNER_A"
service = "router-ab-strict-signer-a-staging"

[[env.staging.services]]
binding = "SIGNING_WORKER"
service = "router-ab-strict-signing-worker-staging"

[env.staging.vars]
ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET_BINDING = "ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET"
SIGNER_B_ROOT_SHARE_DO_BINDING = "SIGNER_B_ROOT_SHARE_DO"
SIGNER_B_ROOT_SHARE_DO_OBJECT = "signer-b-root-share"
SIGNER_B_ROOT_SHARE_DO_KEY_PREFIX = "signer-b-root-share/"
SIGNER_B_ROOT_SHARE_WIRE_SECRET_BINDING = "SIGNER_B_ROOT_SHARE_WIRE_SECRET"
SIGNER_B_ENVELOPE_HPKE_PRIVATE_KEY_BINDING = "SIGNER_B_ENVELOPE_HPKE_PRIVATE_KEY"
SIGNER_B_ENVELOPE_HPKE_KEY_EPOCH = "epoch-1"
SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY = "x25519:2222222222222222222222222222222222222222222222222222222222222222"
SIGNER_B_PEER_SIGNING_KEY_BINDING = "SIGNER_B_PEER_SIGNING_KEY"
SIGNER_B_PEER_SIGNING_KEY_EPOCH = "epoch-1"
SIGNER_A_PEER_VERIFYING_KEY_HEX = "REPLACE_WITH_SIGNER_A_ED25519_VERIFYING_KEY_HEX"
SIGNER_B_PEER_VERIFYING_KEY_HEX = "REPLACE_WITH_SIGNER_B_ED25519_VERIFYING_KEY_HEX"
SIGNER_A_PEER_BINDING = "SIGNER_A"
SIGNING_WORKER_PEER_BINDING = "SIGNING_WORKER"

[env.production]
name = "router-ab-strict-signer-b-prod"
workers_dev = false

[[env.production.durable_objects.bindings]]
name = "SIGNER_B_ROOT_SHARE_DO"
class_name = "RouterAbSignerBRootShareDurableObject"

[[env.production.services]]
binding = "SIGNER_A"
service = "router-ab-strict-signer-a-prod"

[[env.production.services]]
binding = "SIGNING_WORKER"
service = "router-ab-strict-signing-worker-prod"

[env.production.vars]
ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET_BINDING = "ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET"
SIGNER_B_ROOT_SHARE_DO_BINDING = "SIGNER_B_ROOT_SHARE_DO"
SIGNER_B_ROOT_SHARE_DO_OBJECT = "signer-b-root-share"
SIGNER_B_ROOT_SHARE_DO_KEY_PREFIX = "signer-b-root-share/"
SIGNER_B_ROOT_SHARE_WIRE_SECRET_BINDING = "SIGNER_B_ROOT_SHARE_WIRE_SECRET"
SIGNER_B_ENVELOPE_HPKE_PRIVATE_KEY_BINDING = "SIGNER_B_ENVELOPE_HPKE_PRIVATE_KEY"
SIGNER_B_ENVELOPE_HPKE_KEY_EPOCH = "epoch-1"
SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY = "x25519:2222222222222222222222222222222222222222222222222222222222222222"
SIGNER_B_PEER_SIGNING_KEY_BINDING = "SIGNER_B_PEER_SIGNING_KEY"
SIGNER_B_PEER_SIGNING_KEY_EPOCH = "epoch-1"
SIGNER_A_PEER_VERIFYING_KEY_HEX = "REPLACE_WITH_SIGNER_A_ED25519_VERIFYING_KEY_HEX"
SIGNER_B_PEER_VERIFYING_KEY_HEX = "REPLACE_WITH_SIGNER_B_ED25519_VERIFYING_KEY_HEX"
SIGNER_A_PEER_BINDING = "SIGNER_A"
SIGNING_WORKER_PEER_BINDING = "SIGNING_WORKER"

[observability]
  [observability.logs]
  enabled = true
  head_sampling_rate = 1
  invocation_logs = true
