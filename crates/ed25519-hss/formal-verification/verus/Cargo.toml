[package]
name = "ed25519-hss-verus"
version = "0.1.0"
edition = "2021"
publish = false
description = "Standalone Verus verification crate for ed25519-hss"

[dependencies]
vstd = "=0.0.0-2026-03-29-0113"

[dev-dependencies]
ed25519-hss = { path = "../.." }
serde_json = "1.0"

[lib]
name = "ed25519_hss_verus"
path = "src/lib.rs"

[package.metadata.verus]
verify = true

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(verus_only)'] }
