[package]
name = "threshold-prf-wasm-bench"
version = "0.1.0"
edition = "2021"
publish = false
description = "WASM benchmark harness for threshold-prf"

[lib]
crate-type = ["cdylib", "rlib"]
name = "threshold_prf_wasm_bench"
path = "src/lib.rs"

[dependencies]
getrandom = { version = "0.2", features = ["js"] }
rand_chacha = "0.3"
rand_core = "0.6"
threshold-prf = { path = ".." }
wasm-bindgen = "0.2"
