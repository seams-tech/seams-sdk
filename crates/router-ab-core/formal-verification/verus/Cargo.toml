[package]
name = "router-ab-core-verus"
version = "0.1.0"
edition = "2021"
publish = false
description = "Standalone Verus abstract spec model for router-ab-core"

[dependencies]
vstd = "=0.0.0-2026-03-29-0113"

[dev-dependencies]
router-ab-core = { path = "../.." }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[lib]
name = "router_ab_core_verus"
path = "src/lib.rs"

[package.metadata.verus]
verify = true

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(verus_only)'] }
