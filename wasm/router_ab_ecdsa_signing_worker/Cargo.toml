[package]
name = "router_ab_ecdsa_signing_worker"
version = "0.1.0"
edition = "2021"
description = "Server-only Router A/B ECDSA presign and derivation WASM"
license = "Apache-2.0"

[package.metadata.wasm-pack.profile.release]
wasm-opt = true

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"

[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
getrandom = { version = "0.2.15", features = ["js"] }
js-sys = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
wasm-bindgen = "0.2"
zeroize = "1.8"
signer-core = { path = "../../crates/signer-core", features = ["secp256k1", "threshold-ecdsa"] }
router-ab-ecdsa-derivation = { path = "../../crates/router-ab-ecdsa-derivation" }
