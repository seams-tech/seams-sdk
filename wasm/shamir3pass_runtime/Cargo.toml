[package]
name = "shamir3pass_runtime"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/web3-authn/sdk"
description = "WASM runtime wrapper for shamir-3-pass lock operations"

[package.metadata.wasm-pack.profile.release]
wasm-opt = true

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"

[lib]
crate-type = ["rlib", "cdylib"]

[dependencies]
num-bigint = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
shamir-3-pass = "0.5"
wasm-bindgen = "0.2"
