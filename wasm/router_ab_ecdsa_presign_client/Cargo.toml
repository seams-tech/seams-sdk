[package]
name = "router_ab_ecdsa_presign_client"
version = "0.1.0"
edition = "2021"
description = "Browser Client-only Router A/B ECDSA presign WASM"
license = "Apache-2.0"

[package.metadata.wasm-pack.profile.release]
wasm-opt = true

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"

[workspace]

[lib]
crate-type = ["rlib", "cdylib"]

[dependencies]
getrandom = { version = "0.2", features = ["js"] }
js-sys = "0.3"
rand_core = { version = "0.6", features = ["getrandom"] }
router-ab-ecdsa-presign = { path = "../../crates/router-ab-ecdsa-presign" }
router-ab-ecdsa-wire = { path = "../../crates/router-ab-ecdsa-wire" }
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
wasm-bindgen = "=0.2.100"
zeroize = "1.8"
