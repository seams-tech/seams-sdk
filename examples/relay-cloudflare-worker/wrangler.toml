name = "w3a-relay-prod"
main = "src/worker.ts"
compatibility_date = "2024-09-24"
compatibility_flags = ["nodejs_compat"]

# Configure module rules for WASM imports
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# Durable Object for threshold session persistence (Cloudflare-native; required for prod threshold signing).
[[durable_objects.bindings]]
name = "THRESHOLD_STORE"
class_name = "ThresholdStoreDurableObject"

[[migrations]]
tag = "v2"
# Cloudflare Free plan requires SQLite-backed Durable Objects.
new_sqlite_classes = ["ThresholdStoreDurableObject"]

# Default inactive; add one or more cron schedules when enabling any cron-backed job.
[triggers]
crons = []

[vars]
RELAYER_ACCOUNT_ID = "w3a-relayer.testnet"
NEAR_RPC_URL = "https://test.rpc.fastnear.com"
NETWORK_ID = "testnet"
# Optional explicit RP ID for `/.well-known/webauthn` (defaults to hostname(EXPECTED_WALLET_ORIGIN))
ROR_RP_ID = "wallet.web3authn.org"
ACCOUNT_INITIAL_BALANCE = "40000000000000000000000" # 0.04 NEAR
CREATE_ACCOUNT_AND_REGISTER_GAS = "85000000000000"  # 85 TGas
RELAYER_URL = "https://relay.seams.xyz"
THRESHOLD_PREFIX = "seams:prod:w3a"
THRESHOLD_ED25519_SHARE_MODE = "derived"
SIGNING_SESSION_SEAL_ENABLED = "1"
SIGNING_SESSION_SEAL_KEY_VERSION = "kek-s-2026-02"

# Secrets are NOT defined here. Set them via Wrangler secrets (they persist across deploys):
#   wrangler secret put RELAYER_PRIVATE_KEY
#   wrangler secret put SIGNING_SESSION_SHAMIR_P_B64U
#   wrangler secret put SIGNING_SESSION_SEAL_E_S_B64U
#   wrangler secret put SIGNING_SESSION_SEAL_D_S_B64U
# Required at runtime by src/worker.ts

# Optional CORS (production allowlist)
EXPECTED_ORIGIN = "https://seams.xyz"
EXPECTED_WALLET_ORIGIN = "https://wallet.web3authn.org"

# Production worker env (explicit; matches GitHub Environment name)
[env.production]
name = "w3a-relay-prod"

[env.production.vars]
RELAYER_ACCOUNT_ID = "w3a-relayer.testnet"
NEAR_RPC_URL = "https://test.rpc.fastnear.com"
NETWORK_ID = "testnet"
ROR_RP_ID = "wallet.web3authn.org"
ACCOUNT_INITIAL_BALANCE = "40000000000000000000000" # 0.04 NEAR
CREATE_ACCOUNT_AND_REGISTER_GAS = "85000000000000"  # 85 TGas
RELAYER_URL = "https://relay.seams.xyz"
EXPECTED_ORIGIN = "https://seams.xyz"
EXPECTED_WALLET_ORIGIN = "https://wallet.web3authn.org"
THRESHOLD_PREFIX = "seams:prod:w3a"
THRESHOLD_ED25519_SHARE_MODE = "derived"
SIGNING_SESSION_SEAL_ENABLED = "1"
SIGNING_SESSION_SEAL_KEY_VERSION = "kek-s-2026-02"
# Console cron jobs (explicitly disabled by default; enable per job and set org ids/postgres url).
ENABLE_ROTATION = "0"
BILLING_FINALIZATION_ENABLED = "0"
BILLING_POSTGRES_URL = ""
BILLING_NAMESPACE = "console-default"
BILLING_FINALIZATION_CRONS = "0 2 1 * *"
BILLING_FINALIZATION_ORG_IDS = ""
BILLING_FINALIZATION_PERIOD_MONTH_UTC = ""
RUNTIME_SNAPSHOT_OUTBOX_ENABLED = "0"
RUNTIME_SNAPSHOT_OUTBOX_POSTGRES_URL = ""
RUNTIME_SNAPSHOT_OUTBOX_NAMESPACE = "console-default"
RUNTIME_SNAPSHOT_OUTBOX_CRONS = "*/5 * * * *"
RUNTIME_SNAPSHOT_OUTBOX_ORG_IDS = ""
RUNTIME_SNAPSHOT_OUTBOX_LIMIT = "100"
WEBHOOK_RETRY_ENABLED = "0"
WEBHOOK_RETRY_POSTGRES_URL = ""
WEBHOOK_RETRY_NAMESPACE = "console-default"
WEBHOOK_RETRY_CRONS = "*/10 * * * *"
WEBHOOK_RETRY_ORG_IDS = ""
WEBHOOK_RETRY_LIMIT = "100"
WEBHOOK_RETRY_MAX_ATTEMPTS = "5"
WEBHOOK_RETRY_INITIAL_BACKOFF_MS = "60000"
WEBHOOK_RETRY_MAX_BACKOFF_MS = "3600000"

# Durable Object binding (explicit per-env to avoid any inheritance ambiguity).
[[env.production.durable_objects.bindings]]
name = "THRESHOLD_STORE"
class_name = "ThresholdStoreDurableObject"

# Staging worker (separate Worker name + tighter CORS allowlist)
[env.staging]
name = "w3a-relay-staging"

[env.staging.vars]
RELAYER_ACCOUNT_ID = "w3a-relayer.testnet"
NEAR_RPC_URL = "https://test.rpc.fastnear.com"
NETWORK_ID = "testnet"
ROR_RP_ID = "wallet-staging.web3authn.org"
ACCOUNT_INITIAL_BALANCE = "40000000000000000000000" # 0.04 NEAR
CREATE_ACCOUNT_AND_REGISTER_GAS = "85000000000000"  # 85 TGas
RELAYER_URL = "https://relay-staging.seams.xyz"
EXPECTED_ORIGIN = "https://staging.seams.xyz"
EXPECTED_WALLET_ORIGIN = "https://wallet-staging.web3authn.org"
THRESHOLD_PREFIX = "seams:staging:w3a"
THRESHOLD_ED25519_SHARE_MODE = "derived"
SIGNING_SESSION_SEAL_ENABLED = "1"
SIGNING_SESSION_SEAL_KEY_VERSION = "kek-s-2026-02"
# Console cron jobs (explicitly disabled by default; enable per job and set org ids/postgres url).
ENABLE_ROTATION = "0"
BILLING_FINALIZATION_ENABLED = "0"
BILLING_POSTGRES_URL = ""
BILLING_NAMESPACE = "console-default"
BILLING_FINALIZATION_CRONS = "0 2 1 * *"
BILLING_FINALIZATION_ORG_IDS = ""
BILLING_FINALIZATION_PERIOD_MONTH_UTC = ""
RUNTIME_SNAPSHOT_OUTBOX_ENABLED = "0"
RUNTIME_SNAPSHOT_OUTBOX_POSTGRES_URL = ""
RUNTIME_SNAPSHOT_OUTBOX_NAMESPACE = "console-default"
RUNTIME_SNAPSHOT_OUTBOX_CRONS = "*/5 * * * *"
RUNTIME_SNAPSHOT_OUTBOX_ORG_IDS = ""
RUNTIME_SNAPSHOT_OUTBOX_LIMIT = "100"
WEBHOOK_RETRY_ENABLED = "0"
WEBHOOK_RETRY_POSTGRES_URL = ""
WEBHOOK_RETRY_NAMESPACE = "console-default"
WEBHOOK_RETRY_CRONS = "*/10 * * * *"
WEBHOOK_RETRY_ORG_IDS = ""
WEBHOOK_RETRY_LIMIT = "100"
WEBHOOK_RETRY_MAX_ATTEMPTS = "5"
WEBHOOK_RETRY_INITIAL_BACKOFF_MS = "60000"
WEBHOOK_RETRY_MAX_BACKOFF_MS = "3600000"

# Durable Object binding (explicit per-env to avoid any inheritance ambiguity).
[[env.staging.durable_objects.bindings]]
name = "THRESHOLD_STORE"
class_name = "ThresholdStoreDurableObject"

# Optional: Threshold signing.
#
# This Worker example enables signing-root threshold-prf derivation when sealed
# signing-root shares are present in the Durable Object and a KEK is provided:
#   wrangler secret put SIGNING_ROOT_SECRET_SHARE_KEK_B64U

# Observability (Workers Logs). Requires appropriate Cloudflare plan.
[observability]
  [observability.logs]
  enabled = true
  head_sampling_rate = 1
  invocation_logs = true
