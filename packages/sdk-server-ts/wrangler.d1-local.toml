name = "seams-sdk-d1-local"
main = "src/router/cloudflare/d1LocalDevWorker.ts"
compatibility_date = "2026-04-17"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "CONSOLE_DB"
database_name = "seams-console"
database_id = "00000000-0000-0000-0000-000000000101"
preview_database_id = "00000000-0000-0000-0000-000000000102"
migrations_dir = "migrations/d1-console"

[[d1_databases]]
binding = "SIGNER_DB"
database_name = "seams-signer"
database_id = "00000000-0000-0000-0000-000000000201"
preview_database_id = "00000000-0000-0000-0000-000000000202"
migrations_dir = "migrations/d1-signer"

[[durable_objects.bindings]]
name = "THRESHOLD_STORE"
class_name = "ThresholdStoreDurableObject"

[[migrations]]
tag = "threshold-store-sqlite-v1"
new_sqlite_classes = ["ThresholdStoreDurableObject"]

[vars]
SEAMS_TENANT_STORAGE_NAMESPACE = "seams-local"
SEAMS_LOCAL_RELAYER_ACCOUNT = "relay.local"
SEAMS_LOCAL_RELAYER_PUBLIC_KEY = "ed25519:local-relay-public-key"
ACCOUNT_ID_DERIVATION_SECRET = "local-dev-account-id-derivation-secret"
ROUTER_AB_NORMAL_SIGNING_WORKER_ID = "local-signing-worker"
SIGNER_A_ENVELOPE_HPKE_KEY_EPOCH = "epoch-1"
SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY = "x25519:1111111111111111111111111111111111111111111111111111111111111111"
SIGNER_B_ENVELOPE_HPKE_KEY_EPOCH = "epoch-1"
SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY = "x25519:2222222222222222222222222222222222222222222222222222222222222222"
SIGNER_A_PEER_VERIFYING_KEY_HEX = "5afa80b305e72e02615ed1f580144a40a42a71dfcac175809ceb5d79e740d015"
SIGNER_B_PEER_VERIFYING_KEY_HEX = "0c700dd63695221e508f3164b528f190bed63a4437d38e882308f9a57acc1bc3"
SIGNING_WORKER_SERVER_OUTPUT_HPKE_KEY_EPOCH = "epoch-1"
SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY = "x25519:3333333333333333333333333333333333333333333333333333333333333333"
GOOGLE_OIDC_CLIENT_ID = "395858803136-cfekocmm8p59bct6kf64rn5jap9a04cn.apps.googleusercontent.com"
RELAY_SESSION_HMAC_SECRET = "seams-local-d1-relay-session-secret-change-before-shared-dev"
