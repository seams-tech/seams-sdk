name: template / deploy / cloudflare-pages

on:
  workflow_call:
    inputs:
      target:
        description: Pages components to deploy
        required: true
        type: string
      deploy_environment:
        description: Deployment target
        required: true
        type: string
      source_sha:
        description: Exact source revision to deploy
        required: true
        type: string
      artifact_run_id:
        description: Accepted release artifact workflow run ID
        required: true
        type: string
      release_set_id:
        description: Content-addressed release-set ID
        required: true
        type: string
    outputs:
      app_origin:
        description: Deployed app Pages origin
        value: ${{ jobs.deploy_app.outputs.pages_origin }}
      wallet_origin:
        description: Deployed wallet Pages origin
        value: ${{ jobs.deploy_wallet.outputs.pages_origin }}
permissions:
  actions: read
  contents: read

env:
  DEPLOY_SHA: ${{ inputs.source_sha }}
  DEPLOY_ENVIRONMENT: ${{ inputs.deploy_environment }}
  ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
  RELEASE_SET_ID: ${{ inputs.release_set_id }}
  PAGES_BRANCH: ${{ inputs.deploy_environment == 'production' && 'main' || 'dev' }}
  PAGES_ARTIFACT_NAME: release-${{ inputs.deploy_environment }}-${{ inputs.source_sha }}-pages
  PAGES_ARTIFACT_IDENTITY: '{"pagesBuild":"app-wallet-v1"}'

jobs:
  deploy_app:
    name: Deploy / ${{ inputs.deploy_environment }} / cloudflare-pages / app
    if: inputs.target == 'all' || inputs.target == 'app'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      pages_origin: ${{ steps.deploy_app.outputs.pages_origin }}
    environment:
      name: ${{ inputs.deploy_environment }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PAGES_PROJECT: ${{ secrets.CF_PAGES_PROJECT_VITE }}
    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            crates/router-ab-cloudflare
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            scripts
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install deployment dependencies
        run: pnpm install --frozen-lockfile --filter router-ab-cloudflare

      - name: Download release-set manifest
        uses: actions/download-artifact@v8
        with:
          name: release-set-${{ env.RELEASE_SET_ID }}
          path: .release-artifacts/release-set
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}

      - name: Download Pages artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}

      - name: Verify Pages artifact
        run: |
          set -euo pipefail
          node scripts/deployment-release.mjs verify \
            --manifest .release-artifacts/release-set/manifest.json \
            --target "$DEPLOY_ENVIRONMENT" \
            --source-sha "$DEPLOY_SHA" \
            --artifact-run-id "$ARTIFACT_RUN_ID" \
            --release-set-id "$RELEASE_SET_ID"
          node -e "const value=require('./.release-artifacts/release-set/manifest.json'); if (!value.components.some((component) => component.name === 'site')) throw new Error('Pages deployment requires the site release component')"
          node scripts/deployment-artifact.mjs verify \
            --kind pages \
            --target "$DEPLOY_ENVIRONMENT" \
            --sha "$DEPLOY_SHA" \
            --root apps/seams-site/dist \
            --manifest .release-artifacts/pages/manifest.json \
            --identity-json "$PAGES_ARTIFACT_IDENTITY"

      - name: Deploy app
        id: deploy_app
        env:
          WRANGLER_OUTPUT_FILE_PATH: ${{ runner.temp }}/wrangler-pages-app.ndjson
        run: |
          set -euo pipefail
          test -n "${CF_PAGES_PROJECT:-}" || { echo "CF_PAGES_PROJECT_VITE is not set" >&2; exit 1; }
          rm -f "$WRANGLER_OUTPUT_FILE_PATH"
          pnpm -C crates/router-ab-cloudflare exec wrangler pages deploy ../../apps/seams-site/dist \
            --project-name "$CF_PAGES_PROJECT" \
            --branch "$PAGES_BRANCH" \
            --commit-hash "$DEPLOY_SHA" \
            --commit-dirty=false
          pages_origin="$(
            node scripts/wrangler-pages-deployment-url.mjs \
              "$WRANGLER_OUTPUT_FILE_PATH" \
              "$CF_PAGES_PROJECT"
          )"
          echo "pages_origin=$pages_origin" >> "$GITHUB_OUTPUT"

      - name: Verify app readiness
        env:
          PAGES_ORIGIN: ${{ steps.deploy_app.outputs.pages_origin }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 5 "$PAGES_ORIGIN/" > /dev/null
          curl --fail --silent --show-error --max-time 5 "$PAGES_ORIGIN/sdk/workers/near-signer.worker.js" > /dev/null

      - name: Summarize app deployment
        env:
          PAGES_ORIGIN: ${{ steps.deploy_app.outputs.pages_origin }}
        run: |
          manifest_digest="$(node -e "const value=require('./.release-artifacts/pages/manifest.json'); process.stdout.write(value.contentDigestSha256)")"
          {
            echo '## App Pages deployment'
            echo
            echo "- Source SHA: \`$DEPLOY_SHA\`"
            echo "- Release set: \`$RELEASE_SET_ID\`"
            echo "- Artifact run: \`$ARTIFACT_RUN_ID\`"
            echo "- Artifact content digest: \`$manifest_digest\`"
            echo "- URL: $PAGES_ORIGIN"
            echo "- Readiness: app and SDK worker passed"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_wallet:
    name: Deploy / ${{ inputs.deploy_environment }} / cloudflare-pages / wallet
    if: inputs.target == 'all' || inputs.target == 'wallet'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      pages_origin: ${{ steps.deploy_wallet.outputs.pages_origin }}
    environment:
      name: ${{ inputs.deploy_environment }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PAGES_PROJECT: ${{ secrets.CF_PAGES_PROJECT_WALLET }}
    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            crates/router-ab-cloudflare
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            scripts
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install deployment dependencies
        run: pnpm install --frozen-lockfile --filter router-ab-cloudflare

      - name: Download release-set manifest
        uses: actions/download-artifact@v8
        with:
          name: release-set-${{ env.RELEASE_SET_ID }}
          path: .release-artifacts/release-set
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}

      - name: Download Pages artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}

      - name: Verify Pages artifact
        run: |
          set -euo pipefail
          node scripts/deployment-release.mjs verify \
            --manifest .release-artifacts/release-set/manifest.json \
            --target "$DEPLOY_ENVIRONMENT" \
            --source-sha "$DEPLOY_SHA" \
            --artifact-run-id "$ARTIFACT_RUN_ID" \
            --release-set-id "$RELEASE_SET_ID"
          node -e "const value=require('./.release-artifacts/release-set/manifest.json'); if (!value.components.some((component) => component.name === 'site')) throw new Error('Pages deployment requires the site release component')"
          node scripts/deployment-artifact.mjs verify \
            --kind pages \
            --target "$DEPLOY_ENVIRONMENT" \
            --sha "$DEPLOY_SHA" \
            --root apps/seams-site/dist \
            --manifest .release-artifacts/pages/manifest.json \
            --identity-json "$PAGES_ARTIFACT_IDENTITY"

      - name: Deploy wallet
        id: deploy_wallet
        env:
          WRANGLER_OUTPUT_FILE_PATH: ${{ runner.temp }}/wrangler-pages-wallet.ndjson
        run: |
          set -euo pipefail
          test -n "${CF_PAGES_PROJECT:-}" || { echo "CF_PAGES_PROJECT_WALLET is not set" >&2; exit 1; }
          rm -f "$WRANGLER_OUTPUT_FILE_PATH"
          pnpm -C crates/router-ab-cloudflare exec wrangler pages deploy ../../apps/seams-site/dist \
            --project-name "$CF_PAGES_PROJECT" \
            --branch "$PAGES_BRANCH" \
            --commit-hash "$DEPLOY_SHA" \
            --commit-dirty=false
          pages_origin="$(
            node scripts/wrangler-pages-deployment-url.mjs \
              "$WRANGLER_OUTPUT_FILE_PATH" \
              "$CF_PAGES_PROJECT"
          )"
          echo "pages_origin=$pages_origin" >> "$GITHUB_OUTPUT"

      - name: Verify wallet readiness
        env:
          PAGES_ORIGIN: ${{ steps.deploy_wallet.outputs.pages_origin }}
        run: |
          set -euo pipefail
          for path in \
            /wallet-service/index.html \
            /sdk/workers/near-signer.worker.js \
            /sdk/workers/router_ab_ed25519_yao_client_bg.wasm
          do
            curl --fail --silent --show-error --max-time 5 "$PAGES_ORIGIN$path" > /dev/null
          done

      - name: Summarize wallet deployment
        env:
          PAGES_ORIGIN: ${{ steps.deploy_wallet.outputs.pages_origin }}
        run: |
          manifest_digest="$(node -e "const value=require('./.release-artifacts/pages/manifest.json'); process.stdout.write(value.contentDigestSha256)")"
          {
            echo '## Wallet Pages deployment'
            echo
            echo "- Source SHA: \`$DEPLOY_SHA\`"
            echo "- Release set: \`$RELEASE_SET_ID\`"
            echo "- Artifact run: \`$ARTIFACT_RUN_ID\`"
            echo "- Artifact content digest: \`$manifest_digest\`"
            echo "- URL: $PAGES_ORIGIN"
            echo "- Readiness: wallet service, SDK worker, and WASM passed"
          } >> "$GITHUB_STEP_SUMMARY"
