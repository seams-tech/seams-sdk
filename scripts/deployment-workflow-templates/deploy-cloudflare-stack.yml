name: template / deploy / cloudflare-stack

on:
  workflow_call:
    inputs:
      target:
        description: Deployment target
        required: true
        type: string
      deploy_sha:
        description: Exact source revision to deploy
        required: true
        type: string
      artifact_run_id:
        description: Accepted release artifact workflow run ID
        required: true
        type: string
      release_set_id:
        description: Content-addressed release-set ID
        required: true
        type: string
      source_branch:
        description: Source branch associated with the revision
        required: true
        type: string
      enforce_current_branch:
        description: Reject an automatic release once its branch has advanced
        required: true
        type: boolean
permissions:
  actions: read
  contents: read

env:
  DEPLOY_TARGET: ${{ inputs.target }}
  DEPLOY_SHA: ${{ inputs.deploy_sha }}
  ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
  RELEASE_SET_ID: ${{ inputs.release_set_id }}
  DEPLOY_SOURCE_BRANCH: ${{ inputs.source_branch }}
  ENFORCE_CURRENT_BRANCH: ${{ inputs.enforce_current_branch }}
  STAGING_GATEWAY_ORIGIN: https://seams-sdk-d1-gateway-staging.n6378056.workers.dev
  PRODUCTION_GATEWAY_ORIGIN: https://seams-sdk-d1-gateway.n6378056.workers.dev
  RUST_TOOLCHAIN: '1.96.0'

concurrency:
  group: deployment-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  preflight_release:
    name: Verify / ${{ inputs.target }} / cloudflare-stack
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      selected_components: ${{ steps.release_selection.outputs.selected_components }}
    environment:
      name: ${{ format('{0}-mpc-router', inputs.target) }}
    env:
      RELEASE_MANIFEST: .release-artifacts/release-set/manifest.json
    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}

      - name: Validate source branch and target
        run: |
          set -euo pipefail
          expected_branch='dev'
          if [[ "$DEPLOY_TARGET" == 'production' ]]; then expected_branch='main'; fi
          if [[ "$DEPLOY_TARGET" == 'production' && "$EVENT_BRANCH" != 'main' ]]; then
            echo "::error title=Untrusted production workflow authority::Production deployment workflows must be triggered from main"
            exit 1
          fi
          if [[ "${DEPLOY_SOURCE_BRANCH:-}" != "$expected_branch" ]]; then
            echo "::error title=Invalid release mapping::$DEPLOY_TARGET requires $expected_branch"
            exit 1
          fi
          git fetch origin "refs/heads/$DEPLOY_SOURCE_BRANCH:refs/remotes/origin/$DEPLOY_SOURCE_BRANCH"
          branch_ref="refs/remotes/origin/$DEPLOY_SOURCE_BRANCH"
          if ! git merge-base --is-ancestor "$DEPLOY_SHA" "$branch_ref"; then
            echo "::error title=Release SHA is not on the protected branch::$DEPLOY_SHA is not an ancestor of $DEPLOY_SOURCE_BRANCH"
            exit 1
          fi
          if [[ "$ENFORCE_CURRENT_BRANCH" == 'true' ]]; then
            branch_tip="$(git rev-parse "refs/remotes/origin/$DEPLOY_SOURCE_BRANCH")"
            if [[ "$branch_tip" != "$DEPLOY_SHA" ]]; then
              echo "::error title=Stale release skipped::$DEPLOY_SHA is no longer the tip of $DEPLOY_SOURCE_BRANCH"
              exit 1
            fi
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install release tooling
        run: pnpm install --frozen-lockfile --filter router-ab-cloudflare

      - name: Download release-set manifest
        uses: actions/download-artifact@v8
        with:
          name: release-set-${{ env.RELEASE_SET_ID }}
          path: .release-artifacts/release-set
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}

      - name: Download all release component artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_SHA }}-*
          path: .release-artifacts/components
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}
          merge-multiple: false

      - name: Verify release-set manifest
        run: |
          set -euo pipefail
          node scripts/deployment-release.mjs verify \
            --manifest "$RELEASE_MANIFEST" \
            --target "$DEPLOY_TARGET" \
            --source-sha "$DEPLOY_SHA" \
            --artifact-run-id "$ARTIFACT_RUN_ID" \
            --release-set-id "$RELEASE_SET_ID"
          for component in $(node -e "const value=require('./$RELEASE_MANIFEST'); process.stdout.write(value.components.map((component) => component.name).join('\\n'))"); do
            case "$component" in
              router|deriver-a|deriver-b|signing-worker)
                kind="$component"
                artifact_manifest=".release-artifacts/components/release-$DEPLOY_TARGET-$DEPLOY_SHA-$component/.release-artifacts/$component.json"
                artifact_root=".release-artifacts/components/release-$DEPLOY_TARGET-$DEPLOY_SHA-$component/build/$component"
                identity="{\"profile\":\"release\",\"role\":\"$component\"}"
                ;;
              gateway)
                kind='gateway-wasm'
                artifact_manifest=".release-artifacts/components/release-$DEPLOY_TARGET-$DEPLOY_SHA-gateway/manifest.json"
                artifact_root=".release-artifacts/components/release-$DEPLOY_TARGET-$DEPLOY_SHA-gateway/payload"
                identity='{"wasmPackageSet":"gateway-v1"}'
                ;;
              site)
                kind='pages'
                artifact_manifest=".release-artifacts/components/release-$DEPLOY_TARGET-$DEPLOY_SHA-pages/.release-artifacts/pages/manifest.json"
                artifact_root=".release-artifacts/components/release-$DEPLOY_TARGET-$DEPLOY_SHA-pages/apps/seams-site/dist"
                identity='{"pagesBuild":"app-wallet-v1"}'
                ;;
              signer-iframe)
                kind='signer-iframe'
                artifact_manifest=".release-artifacts/components/release-$DEPLOY_TARGET-$DEPLOY_SHA-signer-iframe/.release-artifacts/signer-iframe/manifest.json"
                artifact_root=".release-artifacts/components/release-$DEPLOY_TARGET-$DEPLOY_SHA-signer-iframe/packages/sdk-web/dist/public/wallet-service"
                identity='{"pagesBuild":"app-wallet-v1"}'
                ;;
            esac
            node scripts/deployment-release.mjs verify-component \
              --manifest "$RELEASE_MANIFEST" \
              --component-name "$component" \
              --artifact-manifest "$artifact_manifest"
            node scripts/deployment-artifact.mjs verify \
              --kind "$kind" \
              --target "$DEPLOY_TARGET" \
              --sha "$DEPLOY_SHA" \
              --root "$artifact_root" \
              --manifest "$artifact_manifest" \
              --identity-json "$identity"
          done

      - name: Resolve selected components
        id: release_selection
        run: |
          set -euo pipefail
          selected_components="$(node -e "const value=require('./$RELEASE_MANIFEST'); const selected=value.buildIdentity?.selectedComponents; if (!Array.isArray(selected) || selected.some((component) => typeof component !== 'string')) throw new Error('release-set selected components are invalid'); process.stdout.write(JSON.stringify(selected))")"
          if [[ "$selected_components" == *'"router"'* ]]; then
            for role in router deriver-a deriver-b signing-worker; do
              [[ "$selected_components" == *"\"$role\""* ]] || {
                echo "::error title=Incomplete Router release::Router selection is missing $role"
                exit 1
              }
            done
          fi
          echo "selected_components=$selected_components" >> "$GITHUB_OUTPUT"

  deploy_signing_worker:
    name: Deploy / ${{ inputs.target }} / cloudflare-mpc-router-ab / signing-worker
    if: >-
      ${{
        needs.preflight_release.result == 'success' &&
        contains(fromJSON(needs.preflight_release.outputs.selected_components), 'signing-worker')
      }}
    needs:
      - preflight_release
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: ${{ format('{0}-signing-worker', inputs.target) }}
    env:
      WORKER_ENV: ${{ inputs.target == 'staging' && 'staging' || '' }}
      ROUTER_AB_USE_PREBUILT: '1'
      ROUTER_AB_DEPLOY_TARGET: ${{ inputs.target }}
      ROUTER_AB_DEPLOY_SHA: ${{ inputs.deploy_sha }}
      ROUTER_AB_ARTIFACT_IDENTITY_JSON: '{"profile":"release","role":"signing-worker"}'
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET: ${{ secrets.ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET }}
      SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY }}
      SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY: ${{ secrets.SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile --filter router-ab-cloudflare

      - name: Download SigningWorker artifact
        uses: actions/download-artifact@v8
        with:
          name: release-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_SHA }}-signing-worker
          path: crates/router-ab-cloudflare
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}

      - name: Verify SigningWorker artifact
        run: |
          node scripts/deployment-artifact.mjs verify \
            --kind signing-worker \
            --target "$DEPLOY_TARGET" \
            --sha "$DEPLOY_SHA" \
            --root crates/router-ab-cloudflare/build/signing-worker \
            --manifest crates/router-ab-cloudflare/.release-artifacts/signing-worker.json \
            --identity-json "$ROUTER_AB_ARTIFACT_IDENTITY_JSON"

      - name: Check SigningWorker environment
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_API_TOKEN is required"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_ACCOUNT_ID is required"; exit 1; }
          test -n "${ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET:-}" || { echo "::error title=Missing GitHub secret::ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET is required"; exit 1; }
          test -n "${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY:-}" || { echo "::error title=Missing GitHub secret::SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY is required"; exit 1; }

      - name: Put SigningWorker secrets
        run: |
          set -euo pipefail
          wrangler_env_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          fi
          printf '%s' "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET --config wrangler.signing-worker.toml "${wrangler_env_args[@]}"
          printf '%s' "$SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY --config wrangler.signing-worker.toml "${wrangler_env_args[@]}"

      - name: Deploy SigningWorker
        run: |
          set -euo pipefail
          wrangler_env_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          fi
          pnpm -C crates/router-ab-cloudflare exec wrangler deploy \
            --config wrangler.signing-worker.toml \
            "${wrangler_env_args[@]}" \
            --var "SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY:${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY}" \
            --var "SEAMS_RELEASE_SET_ID:${RELEASE_SET_ID}"

      - name: Upload SigningWorker report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-signing-worker-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore

      - name: Summarize SigningWorker deployment
        run: |
          manifest_digest="$(node -e "const value=require('./crates/router-ab-cloudflare/.release-artifacts/signing-worker.json'); process.stdout.write(value.contentDigestSha256)")"
          {
            echo '## SigningWorker deployment'
            echo
            echo "- Source SHA: \`$DEPLOY_SHA\`"
            echo "- Target: \`$DEPLOY_TARGET\`"
            echo "- Release set: \`$RELEASE_SET_ID\`"
            echo "- Artifact run: \`$ARTIFACT_RUN_ID\`"
            echo "- Artifact content digest: \`$manifest_digest\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_deriver_a:
    name: Deploy / ${{ inputs.target }} / cloudflare-mpc-router-ab / deriver-a
    if: >-
      ${{
        needs.preflight_release.result == 'success' &&
        contains(fromJSON(needs.preflight_release.outputs.selected_components), 'deriver-a')
      }}
    needs:
      - preflight_release
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: ${{ format('{0}-deriver-a', inputs.target) }}
    env:
      WORKER_ENV: ${{ inputs.target == 'staging' && 'staging' || '' }}
      ROUTER_AB_USE_PREBUILT: '1'
      ROUTER_AB_DEPLOY_TARGET: ${{ inputs.target }}
      ROUTER_AB_DEPLOY_SHA: ${{ inputs.deploy_sha }}
      ROUTER_AB_ARTIFACT_IDENTITY_JSON: '{"profile":"release","role":"deriver-a"}'
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET: ${{ secrets.ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET }}
      DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY }}
      DERIVER_A_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_A_PEER_VERIFYING_KEY_HEX }}
      DERIVER_B_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_B_PEER_VERIFYING_KEY_HEX }}
      DERIVER_A_ROOT_SHARE_WIRE_SECRET: ${{ secrets.DERIVER_A_ROOT_SHARE_WIRE_SECRET }}
      DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY: ${{ secrets.DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY }}
      DERIVER_A_PEER_SIGNING_KEY: ${{ secrets.DERIVER_A_PEER_SIGNING_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile --filter router-ab-cloudflare

      - name: Download Deriver A artifact
        uses: actions/download-artifact@v8
        with:
          name: release-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_SHA }}-deriver-a
          path: crates/router-ab-cloudflare
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}

      - name: Verify Deriver A artifact
        run: |
          node scripts/deployment-artifact.mjs verify \
            --kind deriver-a \
            --target "$DEPLOY_TARGET" \
            --sha "$DEPLOY_SHA" \
            --root crates/router-ab-cloudflare/build/deriver-a \
            --manifest crates/router-ab-cloudflare/.release-artifacts/deriver-a.json \
            --identity-json "$ROUTER_AB_ARTIFACT_IDENTITY_JSON"

      - name: Check Deriver A environment
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_API_TOKEN is required"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_ACCOUNT_ID is required"; exit 1; }
          test -n "${ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET:-}" || { echo "::error title=Missing GitHub secret::ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET is required"; exit 1; }
          test -n "${DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${DERIVER_A_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_A_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          test -n "${DERIVER_B_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_B_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          test -n "${DERIVER_A_ROOT_SHARE_WIRE_SECRET:-}" || { echo "::error title=Missing GitHub secret::DERIVER_A_ROOT_SHARE_WIRE_SECRET is required"; exit 1; }
          test -n "${DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY:-}" || { echo "::error title=Missing GitHub secret::DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY is required"; exit 1; }
          test -n "${DERIVER_A_PEER_SIGNING_KEY:-}" || { echo "::error title=Missing GitHub secret::DERIVER_A_PEER_SIGNING_KEY is required"; exit 1; }

      - name: Put Deriver A secrets
        run: |
          set -euo pipefail
          wrangler_env_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          fi
          printf '%s' "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET --config wrangler.deriver-a.toml "${wrangler_env_args[@]}"
          printf '%s' "$DERIVER_A_ROOT_SHARE_WIRE_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put DERIVER_A_ROOT_SHARE_WIRE_SECRET --config wrangler.deriver-a.toml "${wrangler_env_args[@]}"
          printf '%s' "$DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY --config wrangler.deriver-a.toml "${wrangler_env_args[@]}"
          printf '%s' "$DERIVER_A_PEER_SIGNING_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put DERIVER_A_PEER_SIGNING_KEY --config wrangler.deriver-a.toml "${wrangler_env_args[@]}"

      - name: Deploy Deriver A
        run: |
          set -euo pipefail
          wrangler_env_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          fi
          pnpm -C crates/router-ab-cloudflare exec wrangler deploy \
            --config wrangler.deriver-a.toml \
            "${wrangler_env_args[@]}" \
            --var "DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY:${DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY}" \
            --var "DERIVER_A_PEER_VERIFYING_KEY_HEX:${DERIVER_A_PEER_VERIFYING_KEY_HEX}" \
            --var "DERIVER_B_PEER_VERIFYING_KEY_HEX:${DERIVER_B_PEER_VERIFYING_KEY_HEX}" \
            --var "SEAMS_RELEASE_SET_ID:${RELEASE_SET_ID}"

      - name: Upload Deriver A report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-deriver-a-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore

      - name: Summarize Deriver A deployment
        run: |
          manifest_digest="$(node -e "const value=require('./crates/router-ab-cloudflare/.release-artifacts/deriver-a.json'); process.stdout.write(value.contentDigestSha256)")"
          {
            echo '## Deriver A deployment'
            echo
            echo "- Source SHA: \`$DEPLOY_SHA\`"
            echo "- Target: \`$DEPLOY_TARGET\`"
            echo "- Release set: \`$RELEASE_SET_ID\`"
            echo "- Artifact run: \`$ARTIFACT_RUN_ID\`"
            echo "- Artifact content digest: \`$manifest_digest\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_deriver_b:
    name: Deploy / ${{ inputs.target }} / cloudflare-mpc-router-ab / deriver-b
    if: >-
      ${{
        needs.preflight_release.result == 'success' &&
        contains(fromJSON(needs.preflight_release.outputs.selected_components), 'deriver-b')
      }}
    needs:
      - preflight_release
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: ${{ format('{0}-deriver-b', inputs.target) }}
    env:
      WORKER_ENV: ${{ inputs.target == 'staging' && 'staging' || '' }}
      ROUTER_AB_USE_PREBUILT: '1'
      ROUTER_AB_DEPLOY_TARGET: ${{ inputs.target }}
      ROUTER_AB_DEPLOY_SHA: ${{ inputs.deploy_sha }}
      ROUTER_AB_ARTIFACT_IDENTITY_JSON: '{"profile":"release","role":"deriver-b"}'
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET: ${{ secrets.ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET }}
      DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY }}
      DERIVER_A_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_A_PEER_VERIFYING_KEY_HEX }}
      DERIVER_B_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_B_PEER_VERIFYING_KEY_HEX }}
      DERIVER_B_ROOT_SHARE_WIRE_SECRET: ${{ secrets.DERIVER_B_ROOT_SHARE_WIRE_SECRET }}
      DERIVER_B_ENVELOPE_HPKE_PRIVATE_KEY: ${{ secrets.DERIVER_B_ENVELOPE_HPKE_PRIVATE_KEY }}
      DERIVER_B_PEER_SIGNING_KEY: ${{ secrets.DERIVER_B_PEER_SIGNING_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile --filter router-ab-cloudflare

      - name: Download Deriver B artifact
        uses: actions/download-artifact@v8
        with:
          name: release-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_SHA }}-deriver-b
          path: crates/router-ab-cloudflare
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}

      - name: Verify Deriver B artifact
        run: |
          node scripts/deployment-artifact.mjs verify \
            --kind deriver-b \
            --target "$DEPLOY_TARGET" \
            --sha "$DEPLOY_SHA" \
            --root crates/router-ab-cloudflare/build/deriver-b \
            --manifest crates/router-ab-cloudflare/.release-artifacts/deriver-b.json \
            --identity-json "$ROUTER_AB_ARTIFACT_IDENTITY_JSON"

      - name: Check Deriver B environment
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_API_TOKEN is required"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_ACCOUNT_ID is required"; exit 1; }
          test -n "${ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET:-}" || { echo "::error title=Missing GitHub secret::ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET is required"; exit 1; }
          test -n "${DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${DERIVER_A_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_A_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          test -n "${DERIVER_B_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_B_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          test -n "${DERIVER_B_ROOT_SHARE_WIRE_SECRET:-}" || { echo "::error title=Missing GitHub secret::DERIVER_B_ROOT_SHARE_WIRE_SECRET is required"; exit 1; }
          test -n "${DERIVER_B_ENVELOPE_HPKE_PRIVATE_KEY:-}" || { echo "::error title=Missing GitHub secret::DERIVER_B_ENVELOPE_HPKE_PRIVATE_KEY is required"; exit 1; }
          test -n "${DERIVER_B_PEER_SIGNING_KEY:-}" || { echo "::error title=Missing GitHub secret::DERIVER_B_PEER_SIGNING_KEY is required"; exit 1; }

      - name: Put Deriver B secrets
        run: |
          set -euo pipefail
          wrangler_env_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          fi
          printf '%s' "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET --config wrangler.deriver-b.toml "${wrangler_env_args[@]}"
          printf '%s' "$DERIVER_B_ROOT_SHARE_WIRE_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put DERIVER_B_ROOT_SHARE_WIRE_SECRET --config wrangler.deriver-b.toml "${wrangler_env_args[@]}"
          printf '%s' "$DERIVER_B_ENVELOPE_HPKE_PRIVATE_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put DERIVER_B_ENVELOPE_HPKE_PRIVATE_KEY --config wrangler.deriver-b.toml "${wrangler_env_args[@]}"
          printf '%s' "$DERIVER_B_PEER_SIGNING_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put DERIVER_B_PEER_SIGNING_KEY --config wrangler.deriver-b.toml "${wrangler_env_args[@]}"

      - name: Deploy Deriver B
        run: |
          set -euo pipefail
          wrangler_env_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          fi
          pnpm -C crates/router-ab-cloudflare exec wrangler deploy \
            --config wrangler.deriver-b.toml \
            "${wrangler_env_args[@]}" \
            --var "DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY:${DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY}" \
            --var "DERIVER_A_PEER_VERIFYING_KEY_HEX:${DERIVER_A_PEER_VERIFYING_KEY_HEX}" \
            --var "DERIVER_B_PEER_VERIFYING_KEY_HEX:${DERIVER_B_PEER_VERIFYING_KEY_HEX}" \
            --var "SEAMS_RELEASE_SET_ID:${RELEASE_SET_ID}"

      - name: Upload Deriver B report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-deriver-b-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore

      - name: Summarize Deriver B deployment
        run: |
          manifest_digest="$(node -e "const value=require('./crates/router-ab-cloudflare/.release-artifacts/deriver-b.json'); process.stdout.write(value.contentDigestSha256)")"
          {
            echo '## Deriver B deployment'
            echo
            echo "- Source SHA: \`$DEPLOY_SHA\`"
            echo "- Target: \`$DEPLOY_TARGET\`"
            echo "- Release set: \`$RELEASE_SET_ID\`"
            echo "- Artifact run: \`$ARTIFACT_RUN_ID\`"
            echo "- Artifact content digest: \`$manifest_digest\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_mpc_router:
    name: Deploy / ${{ inputs.target }} / cloudflare-mpc-router-ab / router
    if: |
      always() &&
      needs.preflight_release.result == 'success' &&
      contains(fromJSON(needs.preflight_release.outputs.selected_components), 'router') &&
      needs.deploy_signing_worker.result == 'success' &&
      needs.deploy_deriver_a.result == 'success' &&
      needs.deploy_deriver_b.result == 'success'
    needs:
      - preflight_release
      - deploy_signing_worker
      - deploy_deriver_a
      - deploy_deriver_b
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: ${{ format('{0}-mpc-router', inputs.target) }}
    env:
      WORKER_ENV: ${{ inputs.target == 'staging' && 'staging' || '' }}
      ROUTER_AB_USE_PREBUILT: '1'
      ROUTER_AB_DEPLOY_TARGET: ${{ inputs.target }}
      ROUTER_AB_DEPLOY_SHA: ${{ inputs.deploy_sha }}
      ROUTER_AB_ARTIFACT_IDENTITY_JSON: '{"profile":"release","role":"router"}'
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET: ${{ secrets.ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET }}
      ROUTER_AB_JWT_ISSUER: ${{ vars.ROUTER_AB_JWT_ISSUER }}
      ROUTER_AB_JWT_AUDIENCE: ${{ vars.ROUTER_AB_JWT_AUDIENCE }}
      ROUTER_AB_JWT_JWKS_URL: ${{ vars.ROUTER_AB_JWT_JWKS_URL }}
      DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY }}
      DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY }}
      SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY }}
      DERIVER_A_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_A_PEER_VERIFYING_KEY_HEX }}
      DERIVER_B_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_B_PEER_VERIFYING_KEY_HEX }}
      ROUTER_AB_PROJECT_POLICY_BOOTSTRAP_JSON: ${{ vars.ROUTER_AB_PROJECT_POLICY_BOOTSTRAP_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile --filter router-ab-cloudflare

      - name: Download MPCRouter artifact
        uses: actions/download-artifact@v8
        with:
          name: release-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_SHA }}-router
          path: crates/router-ab-cloudflare
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}

      - name: Verify MPCRouter artifact
        run: |
          node scripts/deployment-artifact.mjs verify \
            --kind router \
            --target "$DEPLOY_TARGET" \
            --sha "$DEPLOY_SHA" \
            --root crates/router-ab-cloudflare/build/router \
            --manifest crates/router-ab-cloudflare/.release-artifacts/router.json \
            --identity-json "$ROUTER_AB_ARTIFACT_IDENTITY_JSON"

      - name: Check MPCRouter environment
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_API_TOKEN is required"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_ACCOUNT_ID is required"; exit 1; }
          test -n "${ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET:-}" || { echo "::error title=Missing GitHub secret::ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET is required"; exit 1; }
          test -n "${ROUTER_AB_JWT_ISSUER:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_JWT_ISSUER is required"; exit 1; }
          test -n "${ROUTER_AB_JWT_AUDIENCE:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_JWT_AUDIENCE is required"; exit 1; }
          test -n "${ROUTER_AB_JWT_JWKS_URL:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_JWT_JWKS_URL is required"; exit 1; }
          test -n "${DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${DERIVER_A_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_A_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          test -n "${DERIVER_B_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_B_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          if [[ "$DEPLOY_TARGET" == 'production' ]]; then
            test -n "${ROUTER_AB_PROJECT_POLICY_BOOTSTRAP_JSON:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_PROJECT_POLICY_BOOTSTRAP_JSON is required for production"; exit 1; }
          fi

      - name: Put MPCRouter secrets
        run: |
          set -euo pipefail
          wrangler_env_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          fi
          printf '%s' "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET --config wrangler.router.toml "${wrangler_env_args[@]}"

      - name: Deploy MPCRouter
        run: |
          set -euo pipefail
          wrangler_env_args=()
          project_policy_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          else
            project_policy_args=(--var "ROUTER_PROJECT_POLICY_BOOTSTRAP_JSON:${ROUTER_AB_PROJECT_POLICY_BOOTSTRAP_JSON}")
          fi
          pnpm -C crates/router-ab-cloudflare exec wrangler deploy \
            --config wrangler.router.toml \
            "${wrangler_env_args[@]}" \
            --var "ROUTER_JWT_ISSUER:${ROUTER_AB_JWT_ISSUER}" \
            --var "ROUTER_JWT_AUDIENCE:${ROUTER_AB_JWT_AUDIENCE}" \
            --var "ROUTER_JWT_JWKS_URL:${ROUTER_AB_JWT_JWKS_URL}" \
            --var "DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY:${DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY}" \
            --var "DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY:${DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY}" \
            --var "DERIVER_A_PEER_VERIFYING_KEY_HEX:${DERIVER_A_PEER_VERIFYING_KEY_HEX}" \
            --var "DERIVER_B_PEER_VERIFYING_KEY_HEX:${DERIVER_B_PEER_VERIFYING_KEY_HEX}" \
            --var "SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY:${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY}" \
            --var "SEAMS_RELEASE_SET_ID:${RELEASE_SET_ID}" \
            "${project_policy_args[@]}"

      - name: Upload MPCRouter report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-router-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore

      - name: Summarize MPCRouter deployment
        run: |
          manifest_digest="$(node -e "const value=require('./crates/router-ab-cloudflare/.release-artifacts/router.json'); process.stdout.write(value.contentDigestSha256)")"
          {
            echo '## MPCRouter deployment'
            echo
            echo "- Source SHA: \`$DEPLOY_SHA\`"
            echo "- Target: \`$DEPLOY_TARGET\`"
            echo "- Release set: \`$RELEASE_SET_ID\`"
            echo "- Artifact run: \`$ARTIFACT_RUN_ID\`"
            echo "- Artifact content digest: \`$manifest_digest\`"
            echo "- Recovery: rerun this job for the same release; use manual stack dispatch with a prior accepted release set for rollback"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_gateway:
    name: Deploy / ${{ inputs.target }} / cloudflare-api-gateway
    if: >-
      ${{
        needs.preflight_release.result == 'success' &&
        contains(fromJSON(needs.preflight_release.outputs.selected_components), 'gateway')
      }}
    needs: preflight_release
    uses: ./scripts/deployment-workflow-templates/deploy-cloudflare-gateway.yml
    with:
      target: ${{ inputs.target }}
      source_sha: ${{ inputs.deploy_sha }}
      artifact_run_id: ${{ inputs.artifact_run_id }}
      release_set_id: ${{ inputs.release_set_id }}

  deploy_pages:
    name: Deploy / ${{ inputs.target }} / cloudflare-pages
    if: >-
      ${{
        always() &&
        needs.preflight_release.result == 'success' &&
        (contains(fromJSON(needs.preflight_release.outputs.selected_components), 'site') ||
        contains(fromJSON(needs.preflight_release.outputs.selected_components), 'signer-iframe')) &&
        (!contains(fromJSON(needs.preflight_release.outputs.selected_components), 'gateway') ||
        needs.deploy_gateway.result == 'success')
      }}
    needs:
      - preflight_release
      - deploy_gateway
    uses: ./scripts/deployment-workflow-templates/deploy-cloudflare-pages.yml
    with:
      target: all
      deploy_environment: ${{ inputs.target }}
      source_sha: ${{ inputs.deploy_sha }}
      artifact_run_id: ${{ inputs.artifact_run_id }}
      release_set_id: ${{ inputs.release_set_id }}

  final_smoke:
    name: Verify / ${{ inputs.target }} / cloudflare-stack / final-smoke
    if: >-
      ${{
        always() &&
        needs.preflight_release.result == 'success' &&
        (contains(fromJSON(needs.preflight_release.outputs.selected_components), 'router') ||
        contains(fromJSON(needs.preflight_release.outputs.selected_components), 'deriver-a') ||
        contains(fromJSON(needs.preflight_release.outputs.selected_components), 'deriver-b') ||
        contains(fromJSON(needs.preflight_release.outputs.selected_components), 'signing-worker') ||
        contains(fromJSON(needs.preflight_release.outputs.selected_components), 'gateway') ||
        contains(fromJSON(needs.preflight_release.outputs.selected_components), 'site') ||
        contains(fromJSON(needs.preflight_release.outputs.selected_components), 'signer-iframe')) &&
        needs.deploy_mpc_router.result != 'failure' &&
        needs.deploy_mpc_router.result != 'cancelled' &&
        (!contains(fromJSON(needs.preflight_release.outputs.selected_components), 'router') ||
        needs.deploy_mpc_router.result == 'success') &&
        (!contains(fromJSON(needs.preflight_release.outputs.selected_components), 'gateway') ||
        needs.deploy_gateway.result == 'success') &&
        ((!contains(fromJSON(needs.preflight_release.outputs.selected_components), 'site') &&
        !contains(fromJSON(needs.preflight_release.outputs.selected_components), 'signer-iframe')) ||
        needs.deploy_pages.result == 'success')
      }}
    needs:
      - preflight_release
      - deploy_mpc_router
      - deploy_gateway
      - deploy_pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: ${{ inputs.target }}
    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.deploy_sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install release tooling
        run: pnpm install --frozen-lockfile --filter router-ab-cloudflare

      - name: Download release-set manifest
        uses: actions/download-artifact@v8
        with:
          name: release-set-${{ inputs.release_set_id }}
          path: .release-artifacts/release-set
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.artifact_run_id }}

      - name: Verify final release smoke
        env:
          DEPLOYED_GATEWAY_ORIGIN: ${{ needs.deploy_gateway.outputs.gateway_origin }}
          SITE_ORIGIN: ${{ vars.VITE_DOCS_ORIGIN }}
          WALLET_ORIGIN: ${{ vars.VITE_WALLET_ORIGIN }}
          SELECTED_COMPONENTS: ${{ needs.preflight_release.outputs.selected_components }}
        run: |
          set -euo pipefail
          gateway_origin="$DEPLOYED_GATEWAY_ORIGIN"
          if [[ -z "$gateway_origin" ]]; then
            gateway_origin="$STAGING_GATEWAY_ORIGIN"
            if [[ "${{ inputs.target }}" == 'production' ]]; then
              gateway_origin="$PRODUCTION_GATEWAY_ORIGIN"
            fi
          fi
          node scripts/deployment-release.mjs verify \
            --manifest .release-artifacts/release-set/manifest.json \
            --target "${{ inputs.target }}" \
            --source-sha "${{ inputs.deploy_sha }}" \
            --artifact-run-id "${{ inputs.artifact_run_id }}" \
            --release-set-id "${{ inputs.release_set_id }}"
          node scripts/deployment-final-smoke.mjs \
            --manifest .release-artifacts/release-set/manifest.json \
            --release-set-id "${{ inputs.release_set_id }}" \
            --selected-components "$SELECTED_COMPONENTS" \
            --gateway-origin "$gateway_origin" \
            --site-origin "$SITE_ORIGIN" \
            --wallet-origin "$WALLET_ORIGIN"
          {
            echo '## Final release smoke'
            echo
            echo "- Release set: \`${{ inputs.release_set_id }}\`"
            echo "- Selected components: \`$SELECTED_COMPONENTS\`"
            echo '- Selected component readiness, representative routes, and release identity passed.'
          } >> "$GITHUB_STEP_SUMMARY"
