name: Deploy / staging / cloudflare-stack
run-name: >-
  deploy / staging / cloudflare-stack /

  ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.source_sha }} /

  ${{ github.event_name == 'workflow_run' && 'automatic' || 'manual-promotion' }}
on:
  workflow_run:
    workflows:
      - Validate / repository
    types:
      - completed
    branches:
      - dev
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact accepted staging source SHA
        required: true
        type: string
      artifact_run_id:
        description: Accepted release artifact workflow run ID
        required: true
        type: string
      release_set_id:
        description: Content-addressed release-set ID
        required: true
        type: string
permissions:
  actions: read
  contents: read
env:
  DEPLOY_TARGET: staging
  DEPLOY_SOURCE_BRANCH: dev
  SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.source_sha }}
  VALIDATION_RUN_ID: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || '' }}
  MANUAL_ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
  MANUAL_RELEASE_SET_ID: ${{ inputs.release_set_id }}
  STAGING_GATEWAY_ORIGIN: https://seams-sdk-d1-gateway-staging.n6378056.workers.dev
  PRODUCTION_GATEWAY_ORIGIN: https://seams-sdk-d1-gateway.n6378056.workers.dev
  RUST_TOOLCHAIN: 1.96.0
concurrency:
  group: deployment-staging
  cancel-in-progress: false
jobs:
  auto_prepare:
    name: Select accepted release
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.release.outputs.target }}
      source_sha: ${{ steps.release.outputs.source_sha }}
      source_branch: ${{ steps.release.outputs.source_branch }}
      validation_run_id: ${{ steps.release.outputs.validation_run_id }}
      change_base_sha: ${{ steps.release.outputs.change_base_sha }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.SOURCE_SHA }}
      - name: Resolve release identity
        id: release
        env:
          INPUT_TARGET: ${{ env.DEPLOY_TARGET }}
          INPUT_SOURCE_SHA: ${{ env.SOURCE_SHA }}
          INPUT_VALIDATION_RUN_ID: ${{ env.VALIDATION_RUN_ID }}
          EXPECTED_BRANCH: ${{ env.DEPLOY_TARGET == 'production' && 'main' || 'dev' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          target="$INPUT_TARGET"
          source_sha="$INPUT_SOURCE_SHA"
          source_branch="$EXPECTED_BRANCH"
          validation_run_id="$INPUT_VALIDATION_RUN_ID"
          [[ "$target" == 'staging' || "$target" == 'production' ]] || {
            echo '::error title=Unsupported release target::Only staging and production are supported'
            exit 1
          }
          [[ "$source_sha" =~ ^[0-9a-f]{40}$ ]] || {
            echo '::error title=Invalid source SHA::Release source SHA must be a full lowercase Git SHA'
            exit 1
          }
          [[ "$validation_run_id" =~ ^[1-9][0-9]*$ ]] || {
            echo '::error title=Invalid validation run ID::Validation run ID must be numeric'
            exit 1
          }
          validation_name="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$validation_run_id" --jq '.name')"
          validation_sha="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$validation_run_id" --jq '.head_sha')"
          validation_branch="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$validation_run_id" --jq '.head_branch')"
          validation_conclusion="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$validation_run_id" --jq '.conclusion')"
          [[ "$validation_name" == 'Validate / repository' ]] || {
            echo "::error title=Invalid validation workflow::Run $validation_run_id is not a Validate / repository run"
            exit 1
          }
          [[ "$validation_sha" == "$source_sha" ]] || {
            echo "::error title=Validation SHA mismatch::Run $validation_run_id tested $validation_sha, expected $source_sha"
            exit 1
          }
          [[ "$validation_branch" == "$source_branch" ]] || {
            echo "::error title=Validation branch mismatch::Run $validation_run_id belongs to $validation_branch, expected $source_branch"
            exit 1
          }
          if [[ "$target" == 'production' && "$GITHUB_REF" != 'refs/heads/main' ]]; then
            echo "::error title=Untrusted production workflow authority::Production release workflows must execute from refs/heads/main"
            exit 1
          fi
          [[ "$validation_conclusion" == 'success' ]] || {
            echo "::error title=Validation run did not succeed::Run $validation_run_id concluded $validation_conclusion"
            exit 1
          }
          git fetch origin "refs/heads/$source_branch:refs/remotes/origin/$source_branch"
          branch_tip="$(git rev-parse "refs/remotes/origin/$source_branch")"
          [[ "$source_sha" == "$branch_tip" ]] || {
            echo "::error title=Release SHA is not the branch tip::$source_sha is not the current $source_branch tip"
            exit 1
          }
          {
            echo "target=$target"
            echo "source_sha=$source_sha"
            echo "source_branch=$source_branch"
            echo "validation_run_id=$validation_run_id"
            echo 'change_base_sha='
          } >> "$GITHUB_OUTPUT"
    if: github.event_name == 'workflow_run'
    env: {}
  auto_build_router:
    name: Build / ${{ needs.auto_prepare.outputs.target }} / cloudflare-router-ab
    needs:
      - auto_prepare
      - auto_select_components
    if: |-
      github.event_name == 'workflow_run' && (contains(fromJSON(needs.auto_select_components.outputs.components), 'router') ||
        contains(fromJSON(needs.auto_select_components.outputs.components), 'deriver-a') ||
        contains(fromJSON(needs.auto_select_components.outputs.components), 'deriver-b') ||
        contains(fromJSON(needs.auto_select_components.outputs.components), 'signing-worker'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.auto_prepare.outputs.source_sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Cache Router A/B Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: router-ab-release-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-release
          workspaces: crates/router-ab-cloudflare -> target
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install pinned Worker builder
        run: pnpm -C crates/router-ab-cloudflare run worker-build:install
      - name: Build all role bundles once
        env:
          ROUTER_AB_WORKER_BUILD_PROFILE: release
        run: |
          set -euo pipefail
          for role in signing-worker deriver-a deriver-b router; do
            pnpm -C crates/router-ab-cloudflare run "build:$role"
          done
      - name: Create role manifests
        env:
          DEPLOY_TARGET: ${{ needs.auto_prepare.outputs.target }}
          DEPLOY_SHA: ${{ needs.auto_prepare.outputs.source_sha }}
        run: |
          set -euo pipefail
          build_metadata="$(node -e 'process.stdout.write(JSON.stringify({bun:process.argv[1],node:process.argv[2],rustc:process.argv[3],workerBuild:process.argv[4]}))' "$(bun --version)" "$(node --version)" "$(rustc --version)" "$(worker-build --version)")"
          mkdir -p crates/router-ab-cloudflare/.release-artifacts
          for role in signing-worker deriver-a deriver-b router; do
            node scripts/deployment-artifact.mjs create \
              --kind "$role" \
              --target "$DEPLOY_TARGET" \
              --sha "$DEPLOY_SHA" \
              --root "crates/router-ab-cloudflare/build/$role" \
              --manifest "crates/router-ab-cloudflare/.release-artifacts/$role.json" \
              --identity-json "{\"profile\":\"release\",\"role\":\"$role\"}" \
              --metadata-json "$build_metadata"
          done
      - name: Upload Router A/B artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ needs.auto_prepare.outputs.target }}-${{ needs.auto_prepare.outputs.source_sha }}-router
          path: |
            crates/router-ab-cloudflare/build/router
            crates/router-ab-cloudflare/.release-artifacts/router.json
          include-hidden-files: true
          retention-days: 30
          compression-level: 0
      - name: Upload Deriver A artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ needs.auto_prepare.outputs.target }}-${{ needs.auto_prepare.outputs.source_sha }}-deriver-a
          path: |
            crates/router-ab-cloudflare/build/deriver-a
            crates/router-ab-cloudflare/.release-artifacts/deriver-a.json
          include-hidden-files: true
          retention-days: 30
          compression-level: 0
      - name: Upload Deriver B artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ needs.auto_prepare.outputs.target }}-${{ needs.auto_prepare.outputs.source_sha }}-deriver-b
          path: |
            crates/router-ab-cloudflare/build/deriver-b
            crates/router-ab-cloudflare/.release-artifacts/deriver-b.json
          include-hidden-files: true
          retention-days: 30
          compression-level: 0
      - name: Upload SigningWorker artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ needs.auto_prepare.outputs.target }}-${{ needs.auto_prepare.outputs.source_sha }}-signing-worker
          path: |
            crates/router-ab-cloudflare/build/signing-worker
            crates/router-ab-cloudflare/.release-artifacts/signing-worker.json
          include-hidden-files: true
          retention-days: 30
          compression-level: 0
    env: {}
  auto_select_components:
    name: Select affected components
    needs: auto_prepare
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.select.outputs.components }}
    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.auto_prepare.outputs.source_sha }}
      - name: Download pushed change range
        uses: actions/download-artifact@v8
        with:
          name: release-change-set
          path: .release-change-set
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.auto_prepare.outputs.validation_run_id }}
      - name: Select components from accepted change range
        id: select
        env:
          SOURCE_SHA: ${{ needs.auto_prepare.outputs.source_sha }}
        run: |
          set -euo pipefail
          test "$(<.release-change-set/source-sha.txt)" = "$SOURCE_SHA"
          test -s .release-change-set/changed-files.txt
          cp .release-change-set/changed-files.txt "$RUNNER_TEMP/changed-files.txt"
          components="$(node scripts/deployment-components.mjs select --files-file "$RUNNER_TEMP/changed-files.txt")"
          echo "components=$components" >> "$GITHUB_OUTPUT"
          {
            echo '## Selected deployment components'
            echo
            echo "- Source SHA: \`$SOURCE_SHA\`"
            echo "- Components: \`$components\`"
          } >> "$GITHUB_STEP_SUMMARY"
    if: github.event_name == 'workflow_run'
    env: {}
  auto_build_gateway:
    name: Build / ${{ needs.auto_prepare.outputs.target }} / cloudflare-gateway
    needs:
      - auto_prepare
      - auto_select_components
    if:
      github.event_name == 'workflow_run' && (contains(fromJSON(needs.auto_select_components.outputs.components),
      'gateway'))
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: ${{ format('{0}-gateway', needs.auto_prepare.outputs.target) }}
    env:
      GATEWAY_DEPLOYMENT_CONFIG_JSON: ${{ vars.GATEWAY_DEPLOYMENT_CONFIG_JSON }}
      RELAYER_PRIVATE_KEY: ${{ secrets.RELAYER_PRIVATE_KEY }}
    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.auto_prepare.outputs.source_sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install pinned WASM tooling
        run: bash packages/sdk-web/scripts/build/install-ci-wasm-tooling.sh
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Gateway WASM dependencies
        env:
          WASM_SDK_BUILD_TARGET: gateway
        run: pnpm -C packages/console-server-ts run d1:local:ensure-wasm
      - name: Assemble Gateway artifact
        env:
          DEPLOY_TARGET: ${{ needs.auto_prepare.outputs.target }}
          DEPLOY_SHA: ${{ needs.auto_prepare.outputs.source_sha }}
        run: |
          set -euo pipefail
          build_metadata="$(node -e 'process.stdout.write(JSON.stringify({bun:process.argv[1],node:process.argv[2],rustc:process.argv[3],wasmPack:process.argv[4]}))' "$(bun --version)" "$(node --version)" "$(rustc --version)" "$(wasm-pack --version)")"
          artifact_root='.release-artifacts/gateway/payload'
          mkdir -p "$artifact_root/wasm"
          for package in near_signer threshold_prf evm_crypto router_ab_ecdsa_signing_worker; do
            mkdir -p "$artifact_root/wasm/$package"
            rsync -a "wasm/$package/pkg/" "$artifact_root/wasm/$package/pkg/"
          done
          (
            cd packages/console-server-ts
            node scripts/render-d1-gateway-config.mjs \
              --target "$DEPLOY_TARGET" \
              --output .wrangler/generated/gateway.jsonc \
              --deployment-plan-output .wrangler/generated/gateway-deployment-plan.json
            pnpm exec wrangler deploy \
              --dry-run \
              --config .wrangler/generated/gateway.jsonc \
              --outfile "$GITHUB_WORKSPACE/$artifact_root/worker.js" \
              --metafile "$GITHUB_WORKSPACE/$artifact_root/worker-meta.json"
          )
          node scripts/deployment-artifact.mjs create \
            --kind gateway-wasm \
            --target "$DEPLOY_TARGET" \
            --sha "$DEPLOY_SHA" \
            --root "$artifact_root" \
            --manifest .release-artifacts/gateway/manifest.json \
            --identity-json '{"wasmPackageSet":"gateway-v1"}' \
            --metadata-json "$build_metadata"
      - name: Upload Gateway artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ needs.auto_prepare.outputs.target }}-${{ needs.auto_prepare.outputs.source_sha }}-gateway
          path: .release-artifacts/gateway
          include-hidden-files: true
          retention-days: 30
          compression-level: 0
  auto_build_pages:
    name: Build / ${{ needs.auto_prepare.outputs.target }} / cloudflare-pages
    needs:
      - auto_prepare
      - auto_select_components
    if: |-
      github.event_name == 'workflow_run' && (contains(fromJSON(needs.auto_select_components.outputs.components), 'site') ||
        contains(fromJSON(needs.auto_select_components.outputs.components), 'signer-iframe'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: ${{ needs.auto_prepare.outputs.target }}
    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.auto_prepare.outputs.source_sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install pinned WASM tooling
        run: bash packages/sdk-web/scripts/build/install-ci-wasm-tooling.sh
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build production SDK
        run: pnpm build:sdk-prod
      - name: Build Pages output
        env:
          VITE_RELAYER_URL: ${{ vars.VITE_RELAYER_URL }}
          VITE_CONSOLE_BASE_URL: ${{ vars.VITE_CONSOLE_BASE_URL }}
          VITE_RELAYER_ACCOUNT_ID: ${{ vars.VITE_RELAYER_ACCOUNT_ID }}
          VITE_SEAMS_PROJECT_ENVIRONMENT_ID: ${{ vars.VITE_SEAMS_PROJECT_ENVIRONMENT_ID }}
          VITE_SEAMS_PUBLISHABLE_KEY: ${{ vars.VITE_SEAMS_PUBLISHABLE_KEY }}
          VITE_NEAR_NETWORK: ${{ vars.VITE_NEAR_NETWORK }}
          VITE_NEAR_RPC_URL: ${{ vars.VITE_NEAR_RPC_URL }}
          VITE_NEAR_EXPLORER: ${{ vars.VITE_NEAR_EXPLORER }}
          VITE_TEMPO_RPC_URL: ${{ vars.VITE_TEMPO_RPC_URL }}
          VITE_TEMPO_EXPLORER: ${{ vars.VITE_TEMPO_EXPLORER }}
          VITE_TEMPO_FEE_TOKEN: ${{ vars.VITE_TEMPO_FEE_TOKEN }}
          VITE_ARC_RPC_URL: ${{ vars.VITE_ARC_RPC_URL }}
          VITE_ARC_EXPLORER: ${{ vars.VITE_ARC_EXPLORER }}
          VITE_WALLET_ORIGIN: ${{ vars.VITE_WALLET_ORIGIN }}
          VITE_WALLET_SERVICE_PATH: ${{ vars.VITE_WALLET_SERVICE_PATH }}
          VITE_RP_ID_BASE: ${{ vars.VITE_RP_ID_BASE }}
          VITE_SDK_BASE_PATH: ${{ vars.VITE_SDK_BASE_PATH }}
          VITE_DOCS_ORIGIN: ${{ vars.VITE_DOCS_ORIGIN }}
          VITE_SIGNING_SESSION_PERSISTENCE_MODE: ${{ vars.VITE_SIGNING_SESSION_PERSISTENCE_MODE }}
          VITE_SIGNING_SESSION_SEAL_KEY_VERSION: ${{ vars.VITE_SIGNING_SESSION_SEAL_KEY_VERSION }}
          VITE_SIGNING_SESSION_SHAMIR_P_B64U: ${{ vars.VITE_SIGNING_SESSION_SHAMIR_P_B64U }}
          VITE_ROUTER_AB_NORMAL_SIGNING_WORKER_ID: ${{ vars.VITE_ROUTER_AB_NORMAL_SIGNING_WORKER_ID }}
          VITE_DASHBOARD_WALLETS_ROUTES_ENABLED: ${{ vars.VITE_DASHBOARD_WALLETS_ROUTES_ENABLED }}
        run: pnpm -C apps/seams-site exec vite build
      - name: Copy SDK runtime assets into Pages output
        run: |
          set -euo pipefail
          test -d packages/sdk-web/dist/esm/sdk
          test -f packages/sdk-web/dist/public/wallet-service/index.html
          mkdir -p apps/seams-site/dist/sdk apps/seams-site/dist/sdk/workers apps/seams-site/dist/wallet-service
          rsync -a --delete packages/sdk-web/dist/esm/sdk/ apps/seams-site/dist/sdk/
          if [ -d packages/sdk-web/dist/workers ]; then rsync -a --delete packages/sdk-web/dist/workers/ apps/seams-site/dist/sdk/workers/; fi
          rsync -a --delete packages/sdk-web/dist/public/wallet-service/ apps/seams-site/dist/wallet-service/
      - name: Create Pages artifact manifest
        env:
          DEPLOY_TARGET: ${{ needs.auto_prepare.outputs.target }}
          DEPLOY_SHA: ${{ needs.auto_prepare.outputs.source_sha }}
        run: |
          build_metadata="$(node -e 'process.stdout.write(JSON.stringify({bun:process.argv[1],node:process.argv[2],rustc:process.argv[3],wasmPack:process.argv[4]}))' "$(bun --version)" "$(node --version)" "$(rustc --version)" "$(wasm-pack --version)")"
          mkdir -p .release-artifacts/pages
          node scripts/deployment-artifact.mjs create \
            --kind pages \
            --target "$DEPLOY_TARGET" \
            --sha "$DEPLOY_SHA" \
            --root apps/seams-site/dist \
            --manifest .release-artifacts/pages/manifest.json \
            --identity-json '{"pagesBuild":"app-wallet-v1"}' \
            --metadata-json "$build_metadata"
          mkdir -p .release-artifacts/signer-iframe
          node scripts/deployment-artifact.mjs create \
            --kind signer-iframe \
            --target "$DEPLOY_TARGET" \
            --sha "$DEPLOY_SHA" \
            --root packages/sdk-web/dist/public/wallet-service \
            --manifest .release-artifacts/signer-iframe/manifest.json \
            --identity-json '{"pagesBuild":"app-wallet-v1"}' \
            --metadata-json "$build_metadata"
      - name: Upload Pages artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ needs.auto_prepare.outputs.target }}-${{ needs.auto_prepare.outputs.source_sha }}-pages
          path: |
            apps/seams-site/dist
            .release-artifacts/pages/manifest.json
          include-hidden-files: true
          retention-days: 30
          compression-level: 0
      - name: Upload signer iframe artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ needs.auto_prepare.outputs.target }}-${{ needs.auto_prepare.outputs.source_sha }}-signer-iframe
          path: |
            packages/sdk-web/dist/public/wallet-service
            .release-artifacts/signer-iframe/manifest.json
          include-hidden-files: true
          retention-days: 30
          compression-level: 0
    env: {}
  auto_create_release_set:
    name: Create release-set manifest
    if: |-
      github.event_name == 'workflow_run' && (always() &&
        needs.auto_prepare.result == 'success' &&
        needs.auto_select_components.result == 'success' &&
        needs.auto_select_components.outputs.components != '[]' &&
        needs.auto_build_router.result != 'failure' &&
        needs.auto_build_router.result != 'cancelled' &&
        needs.auto_build_gateway.result != 'failure' &&
        needs.auto_build_gateway.result != 'cancelled' &&
        needs.auto_build_pages.result != 'failure' &&
        needs.auto_build_pages.result != 'cancelled')
    needs:
      - auto_prepare
      - auto_select_components
      - auto_build_router
      - auto_build_gateway
      - auto_build_pages
    runs-on: ubuntu-latest
    outputs:
      release_set_id: ${{ steps.manifest.outputs.release_set_id }}
    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.auto_prepare.outputs.source_sha }}
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Download component artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-${{ needs.auto_prepare.outputs.target }}-${{ needs.auto_prepare.outputs.source_sha }}-*
          path: .release-inputs
          merge-multiple: false
      - name: Assemble manifest inputs
        env:
          DEPLOY_TARGET: ${{ needs.auto_prepare.outputs.target }}
          DEPLOY_SHA: ${{ needs.auto_prepare.outputs.source_sha }}
          VALIDATION_RUN_ID: ${{ needs.auto_prepare.outputs.validation_run_id }}
          SELECTED_COMPONENTS: ${{ needs.auto_select_components.outputs.components }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';
          import { join } from 'node:path';
          import { readMigrationSet } from './scripts/migration-fingerprint.mjs';

          const target = process.env.DEPLOY_TARGET;
          const sourceSha = process.env.DEPLOY_SHA;
          const root = '.release-inputs';
          const selectedComponents = new Set(JSON.parse(process.env.SELECTED_COMPONENTS));
          const specs = [
            ['router', 'router', 'router.json'],
            ['deriver-a', 'deriver-a', 'deriver-a.json'],
            ['deriver-b', 'deriver-b', 'deriver-b.json'],
            ['signing-worker', 'signing-worker', 'signing-worker.json'],
            ['gateway', 'gateway-wasm', 'manifest.json'],
            ['site', 'pages', 'manifest.json'],
            ['signer-iframe', 'signer-iframe', 'manifest.json'],
          ].filter(([name]) => selectedComponents.has(name));
          async function findManifest(directory, name) {
            const candidates = [
              join(root, directory, name),
              join(root, directory, '.release-artifacts', name),
              join(root, directory, '.release-artifacts/pages', name),
              join(root, directory, '.release-artifacts/signer-iframe', name),
            ];
            for (const candidate of candidates) {
              try { return JSON.parse(await readFile(candidate, 'utf8')); } catch {}
            }
            throw new Error(`missing artifact manifest for ${directory}`);
          }
          const components = [];
          for (const [name, kind, manifestName] of specs) {
            const artifactSuffix = name === 'gateway' ? 'gateway' : name === 'site' ? 'pages' : name;
            const artifactDirectory = `release-${target}-${sourceSha}-${artifactSuffix}`;
            const manifest = await findManifest(artifactDirectory, manifestName);
            components.push({
              name,
              kind,
              artifactName: artifactDirectory,
              contentDigestSha256: manifest.contentDigestSha256,
              sourceSha,
              target,
              releaseId: `artifact-${kind}-${manifest.contentDigestSha256}`,
            });
          }
          await writeFile('.release-artifacts-components.json', `${JSON.stringify(components, null, 2)}\n`);
          await writeFile('.release-artifacts-migrations.json', `${JSON.stringify({
            consoleD1: readMigrationSet('packages/console-server-ts/migrations/d1-console'),
            signerD1: readMigrationSet('packages/sdk-server-ts/migrations/d1-signer'),
          }, null, 2)}\n`);
          await writeFile('.release-build-identity.json', `${JSON.stringify({
            node: process.version,
            workflow: 'deploy-cloudflare-stack',
            sourceSha,
            target,
            selectedComponents: JSON.parse(process.env.SELECTED_COMPONENTS),
          }, null, 2)}\n`);
          NODE
      - name: Create immutable release-set manifest
        id: manifest
        env:
          DEPLOY_TARGET: ${{ needs.auto_prepare.outputs.target }}
          DEPLOY_SHA: ${{ needs.auto_prepare.outputs.source_sha }}
          VALIDATION_RUN_ID: ${{ needs.auto_prepare.outputs.validation_run_id }}
          SELECTED_COMPONENTS: ${{ needs.auto_select_components.outputs.components }}
        run: |
          set -euo pipefail
          mkdir -p .release-artifacts/release-set
          node scripts/deployment-release.mjs create \
            --target "$DEPLOY_TARGET" \
            --source-sha "$DEPLOY_SHA" \
            --accepted-validation-run-id "$VALIDATION_RUN_ID" \
            --artifact-run-id "$GITHUB_RUN_ID" \
            --components-file .release-artifacts-components.json \
            --migrations-file .release-artifacts-migrations.json \
            --build-identity-file .release-build-identity.json \
            --output .release-artifacts/release-set/manifest.json
          release_set_id="$(node -e "const value=require('./.release-artifacts/release-set/manifest.json'); process.stdout.write(value.releaseSetId)")"
          echo "release_set_id=$release_set_id" >> "$GITHUB_OUTPUT"
          {
            echo '## Accepted release set'
            echo
            echo "- Source SHA: \`$DEPLOY_SHA\`"
            echo "- Target: \`$DEPLOY_TARGET\`"
            echo "- Validation run: \`$VALIDATION_RUN_ID\`"
            echo "- Artifact run: \`$GITHUB_RUN_ID\`"
            echo "- Release set: \`$release_set_id\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload release-set manifest
        uses: actions/upload-artifact@v7
        with:
          name: release-set-${{ steps.manifest.outputs.release_set_id }}
          path: .release-artifacts/release-set/manifest.json
          include-hidden-files: true
          retention-days: 30
    env: {}
  auto_preflight_release:
    name: Verify / staging / cloudflare-stack
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      selected_components: ${{ steps.release_selection.outputs.selected_components }}
    environment:
      name: ${{ format('{0}-mpc-router', 'staging') }}
    env:
      DEPLOY_TARGET: staging
      DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.source_sha }}
      ARTIFACT_RUN_ID: ${{ github.run_id }}
      RELEASE_SET_ID: ${{ needs.auto_create_release_set.outputs.release_set_id }}
      DEPLOY_SOURCE_BRANCH: dev
      ENFORCE_CURRENT_BRANCH: 'true'
      STAGING_GATEWAY_ORIGIN: https://seams-sdk-d1-gateway-staging.n6378056.workers.dev
      PRODUCTION_GATEWAY_ORIGIN: https://seams-sdk-d1-gateway.n6378056.workers.dev
      RUST_TOOLCHAIN: 1.96.0
      RELEASE_MANIFEST: .release-artifacts/release-set/manifest.json
    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}
      - name: Validate source branch and target
        run: |
          set -euo pipefail
          expected_branch='dev'
          if [[ "$DEPLOY_TARGET" == 'production' ]]; then expected_branch='main'; fi
          if [[ "$DEPLOY_TARGET" == 'production' && "$GITHUB_REF" != 'refs/heads/main' ]]; then
            echo "::error title=Untrusted production workflow authority::Production deployment workflows must execute from refs/heads/main"
            exit 1
          fi
          if [[ "${DEPLOY_SOURCE_BRANCH:-}" != "$expected_branch" ]]; then
            echo "::error title=Invalid release mapping::$DEPLOY_TARGET requires $expected_branch"
            exit 1
          fi
          git fetch origin "refs/heads/$DEPLOY_SOURCE_BRANCH:refs/remotes/origin/$DEPLOY_SOURCE_BRANCH"
          branch_ref="refs/remotes/origin/$DEPLOY_SOURCE_BRANCH"
          if ! git merge-base --is-ancestor "$DEPLOY_SHA" "$branch_ref"; then
            echo "::error title=Release SHA is not on the protected branch::$DEPLOY_SHA is not an ancestor of $DEPLOY_SOURCE_BRANCH"
            exit 1
          fi
          if [[ "$ENFORCE_CURRENT_BRANCH" == 'true' ]]; then
            branch_tip="$(git rev-parse "refs/remotes/origin/$DEPLOY_SOURCE_BRANCH")"
            if [[ "$branch_tip" != "$DEPLOY_SHA" ]]; then
              echo "::error title=Stale release skipped::$DEPLOY_SHA is no longer the tip of $DEPLOY_SOURCE_BRANCH"
              exit 1
            fi
          fi
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - name: Install release tooling
        run: pnpm install --frozen-lockfile --filter router-ab-cloudflare
      - name: Download release-set manifest
        uses: actions/download-artifact@v8
        with:
          name: release-set-${{ env.RELEASE_SET_ID }}
          path: .release-artifacts/release-set
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}
      - name: Download all release component artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_SHA }}-*
          path: .release-artifacts/components
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}
          merge-multiple: false
      - name: Verify release-set manifest
        run: |
          set -euo pipefail
          node scripts/deployment-release.mjs verify \
            --manifest "$RELEASE_MANIFEST" \
            --target "$DEPLOY_TARGET" \
            --source-sha "$DEPLOY_SHA" \
            --artifact-run-id "$ARTIFACT_RUN_ID" \
            --release-set-id "$RELEASE_SET_ID"
          for component in $(node -e "const value=require('./$RELEASE_MANIFEST'); process.stdout.write(value.components.map((component) => component.name).join('\\n'))"); do
            case "$component" in
              router|deriver-a|deriver-b|signing-worker)
                kind="$component"
                artifact_manifest=".release-artifacts/components/release-$DEPLOY_TARGET-$DEPLOY_SHA-$component/.release-artifacts/$component.json"
                artifact_root=".release-artifacts/components/release-$DEPLOY_TARGET-$DEPLOY_SHA-$component/build/$component"
                identity="{\"profile\":\"release\",\"role\":\"$component\"}"
                ;;
              gateway)
                kind='gateway-wasm'
                artifact_manifest=".release-artifacts/components/release-$DEPLOY_TARGET-$DEPLOY_SHA-gateway/manifest.json"
                artifact_root=".release-artifacts/components/release-$DEPLOY_TARGET-$DEPLOY_SHA-gateway/payload"
                identity='{"wasmPackageSet":"gateway-v1"}'
                ;;
              site)
                kind='pages'
                artifact_manifest=".release-artifacts/components/release-$DEPLOY_TARGET-$DEPLOY_SHA-pages/.release-artifacts/pages/manifest.json"
                artifact_root=".release-artifacts/components/release-$DEPLOY_TARGET-$DEPLOY_SHA-pages/apps/seams-site/dist"
                identity='{"pagesBuild":"app-wallet-v1"}'
                ;;
              signer-iframe)
                kind='signer-iframe'
                artifact_manifest=".release-artifacts/components/release-$DEPLOY_TARGET-$DEPLOY_SHA-signer-iframe/.release-artifacts/signer-iframe/manifest.json"
                artifact_root=".release-artifacts/components/release-$DEPLOY_TARGET-$DEPLOY_SHA-signer-iframe/packages/sdk-web/dist/public/wallet-service"
                identity='{"pagesBuild":"app-wallet-v1"}'
                ;;
            esac
            node scripts/deployment-release.mjs verify-component \
              --manifest "$RELEASE_MANIFEST" \
              --component-name "$component" \
              --artifact-manifest "$artifact_manifest"
            node scripts/deployment-artifact.mjs verify \
              --kind "$kind" \
              --target "$DEPLOY_TARGET" \
              --sha "$DEPLOY_SHA" \
              --root "$artifact_root" \
              --manifest "$artifact_manifest" \
              --identity-json "$identity"
          done
      - name: Resolve selected components
        id: release_selection
        run: |
          set -euo pipefail
          selected_components="$(node -e "const value=require('./$RELEASE_MANIFEST'); const selected=value.buildIdentity?.selectedComponents; if (!Array.isArray(selected) || selected.some((component) => typeof component !== 'string')) throw new Error('release-set selected components are invalid'); process.stdout.write(JSON.stringify(selected))")"
          if [[ "$selected_components" == *'"router"'* ]]; then
            for role in router deriver-a deriver-b signing-worker; do
              [[ "$selected_components" == *"\"$role\""* ]] || {
                echo "::error title=Incomplete Router release::Router selection is missing $role"
                exit 1
              }
            done
          fi
          echo "selected_components=$selected_components" >> "$GITHUB_OUTPUT"
    if: github.event_name == 'workflow_run' && (needs.auto_create_release_set.result == 'success')
    needs:
      - auto_create_release_set
