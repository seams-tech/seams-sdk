            crates/router-ab-cloudflare
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            scripts
          ref: ${{ env.DEPLOY_SHA }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
