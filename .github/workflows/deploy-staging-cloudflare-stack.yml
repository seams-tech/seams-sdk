      PRODUCTION_GATEWAY_ORIGIN: https://seams-sdk-d1-gateway.n6378056.workers.dev
      RUST_TOOLCHAIN: 1.96.0
      DEPLOY_ENVIRONMENT: staging
      PAGES_BRANCH: dev
      PAGES_ARTIFACT_NAME:
        release-staging-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha ||
        inputs.source_sha }}-pages
      PAGES_ARTIFACT_IDENTITY: '{"pagesBuild":"app-wallet-v1"}'
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PAGES_PROJECT: ${{ secrets.CF_PAGES_PROJECT_VITE }}
    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            crates/router-ab-cloudflare
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            scripts
          ref: ${{ env.DEPLOY_SHA }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - name: Install deployment dependencies
        run: pnpm install --frozen-lockfile --filter router-ab-cloudflare
      - name: Download release-set manifest
        uses: actions/download-artifact@v8
        with:
          name: release-set-${{ env.RELEASE_SET_ID }}
          path: .release-artifacts/release-set
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}
      - name: Download Pages artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}
      - name: Verify Pages artifact
        run: |
          set -euo pipefail
          node scripts/deployment-release.mjs verify \
