        needs.auto_deploy_mpc_router.result != 'failure' &&
        needs.auto_deploy_mpc_router.result != 'cancelled' &&
        (!contains(fromJSON(needs.auto_preflight_release.outputs.selected_components), 'router') ||
        needs.auto_deploy_mpc_router.result == 'success') &&
        (!contains(fromJSON(needs.auto_preflight_release.outputs.selected_components), 'gateway') ||
        needs.auto_deploy_gateway.result == 'success') &&
        ((!contains(fromJSON(needs.auto_preflight_release.outputs.selected_components), 'site') &&
