          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}
      - name: Verify release set and Gateway artifact
        run: |
          set -euo pipefail
          node scripts/deployment-release.mjs verify \
            --manifest .release-artifacts/release-set/manifest.json \
            --target "$DEPLOY_TARGET" \
            --source-sha "$DEPLOY_SHA" \
            --artifact-run-id "$ARTIFACT_RUN_ID" \
            --release-set-id "$RELEASE_SET_ID"
          node scripts/deployment-artifact.mjs verify \
            --kind gateway-wasm \
            --target "$DEPLOY_TARGET" \
            --sha "$DEPLOY_SHA" \
            --root .release-artifacts/gateway/payload \
            --manifest .release-artifacts/gateway/manifest.json \
            --identity-json "$GATEWAY_ARTIFACT_IDENTITY"
          rsync -a .release-artifacts/gateway/payload/wasm/ wasm/
          SEAMS_D1_LOCAL_WASM_AUTO_BUILD=0 \
            pnpm -C packages/console-server-ts run d1:local:ensure-wasm
      - name: Validate deployment credentials and secrets
        run: |
          set -euo pipefail
          for name in \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID \
            RELAY_SESSION_HMAC_SECRET \
            ACCOUNT_ID_DERIVATION_SECRET \
            ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET \
            ROUTER_AB_CEREMONY_JWT_PRIVATE_JWK \
            SIGNING_ROOT_KEK_VALUE
          do
            test -n "${!name:-}" || { echo "::error title=Missing GitHub Environment secret::$name is required"; exit 1; }
          done
          test -n "${GATEWAY_DEPLOYMENT_CONFIG_JSON:-}" || {
            echo "::error title=Missing GitHub Environment variable::GATEWAY_DEPLOYMENT_CONFIG_JSON is required"
            exit 1
          }

          seal_secret_count=0
          for name in \
            SIGNING_SESSION_SEAL_KEY_VERSION \
            SIGNING_SESSION_SHAMIR_P_B64U \
            SIGNING_SESSION_SEAL_E_S_B64U \
            SIGNING_SESSION_SEAL_D_S_B64U
          do
            test -z "${!name:-}" || seal_secret_count=$((seal_secret_count + 1))
          done
          if [ "$seal_secret_count" -ne 0 ] && [ "$seal_secret_count" -ne 4 ]; then
            echo "::error title=Incomplete signing-session seal::Configure all four SIGNING_SESSION_* secrets or leave all four unset"
            exit 1
          fi
      - name: Generate target Wrangler config
        working-directory: packages/console-server-ts
        run: |
          node scripts/render-d1-gateway-config.mjs \
            --target "$DEPLOY_TARGET" \
            --output "$WRANGLER_CONFIG" \
            --deployment-plan-output "$GATEWAY_DEPLOYMENT_PLAN"
      - name: Check prebuilt Gateway bundle
        run: test -s "$GATEWAY_WORKER_BUNDLE"
      - name: Apply remote console D1 migrations
        working-directory: packages/console-server-ts
        run: |
          expected_fingerprint="$(node -e "const value=require('../../.release-artifacts/release-set/manifest.json'); process.stdout.write(value.migrationSets.consoleD1.fingerprint)")"
          node scripts/apply-remote-d1-migrations.mjs \
            --database CONSOLE_DB \
            --config "$WRANGLER_CONFIG" \
            --migrations-dir migrations/d1-console \
            --expected-fingerprint "$expected_fingerprint"
      - name: Apply remote signer D1 migrations
        working-directory: packages/console-server-ts
        run: |
          expected_fingerprint="$(node -e "const value=require('../../.release-artifacts/release-set/manifest.json'); process.stdout.write(value.migrationSets.signerD1.fingerprint)")"
          node scripts/apply-remote-d1-migrations.mjs \
            --database SIGNER_DB \
            --config "$WRANGLER_CONFIG" \
            --migrations-dir ../sdk-server-ts/migrations/d1-signer \
            --expected-fingerprint "$expected_fingerprint"
      - name: Bootstrap Gateway tenant and publishable key
        working-directory: packages/console-server-ts
        run: |
          node scripts/bootstrap-gateway-deployment.mjs \
            --plan "$GATEWAY_DEPLOYMENT_PLAN" \
            --wrangler-config "$WRANGLER_CONFIG"
      - name: Upsert signing-root KEK in Secrets Store
        working-directory: packages/console-server-ts
        run: |
          node scripts/upsert-signing-root-kek.mjs \
            --plan "$GATEWAY_DEPLOYMENT_PLAN"
      - name: Build atomic Gateway secrets file
        working-directory: packages/console-server-ts
        run: |
          node scripts/write-gateway-secrets-file.mjs \
            --output "$GATEWAY_SECRETS_FILE"
      - name: Deploy Gateway
        working-directory: packages/console-server-ts
        run: |
          pnpm exec wrangler deploy \
            "$GATEWAY_WORKER_BUNDLE" \
            --no-bundle \
            --config "$WRANGLER_CONFIG" \
            --secrets-file "$GATEWAY_SECRETS_FILE" \
            --message "$RELEASE_SET_ID:$DEPLOY_SHA" \
            --var "SEAMS_RELEASE_SET_ID:$RELEASE_SET_ID"
      - name: Verify Gateway readiness and MPC routes
        id: gateway_readiness
        working-directory: packages/console-server-ts
        run: |
          set -euo pipefail
          gateway_origin="$(
            node scripts/read-gateway-deployment-plan.mjs \
              --plan "$GATEWAY_DEPLOYMENT_PLAN" \
              --field gateway-origin
          )"
          for path in \
            /readyz \
            /.well-known/router-ab-ceremony-jwks.json \
            /router-ab/ed25519/healthz \
            /router-ab/ecdsa-derivation/healthz
          do
            curl --fail --silent --show-error --max-time 5 \
              "$gateway_origin$path" > /dev/null
          done
          echo "gateway_origin=$gateway_origin" >> "$GITHUB_OUTPUT"
      - name: Summarize Gateway deployment
        env:
          GATEWAY_ORIGIN: ${{ steps.gateway_readiness.outputs.gateway_origin }}
        run: |
          manifest_digest="$(node -e "const value=require('./.release-artifacts/gateway/manifest.json'); process.stdout.write(value.contentDigestSha256)")"
          {
            echo '## Gateway deployment'
            echo
            echo "- Source SHA: \`$DEPLOY_SHA\`"
            echo "- Target: \`$DEPLOY_TARGET\`"
            echo "- Release set: \`$RELEASE_SET_ID\`"
            echo "- Artifact run: \`$ARTIFACT_RUN_ID\`"
            echo "- Artifact content digest: \`$manifest_digest\`"
            echo "- Origin: $GATEWAY_ORIGIN"
            echo "- Readiness: Gateway, ceremony JWKS, Ed25519, and ECDSA routes passed"
          } >> "$GITHUB_STEP_SUMMARY"
    if:
      github.event_name == 'workflow_dispatch' && (needs.manual_preflight_release.result == 'success' &&
      contains(fromJSON(needs.manual_preflight_release.outputs.selected_components), 'gateway'))
    needs:
      - manual_preflight_release
  manual_deploy_app:
    name: Deploy / staging / cloudflare-pages / app
    if:
      always() && github.event_name == 'workflow_dispatch' && needs.manual_preflight_release.result == 'success' &&
      (contains(fromJSON(needs.manual_preflight_release.outputs.selected_components), 'site') ||
      contains(fromJSON(needs.manual_preflight_release.outputs.selected_components), 'signer-iframe')) &&
      (!contains(fromJSON(needs.manual_preflight_release.outputs.selected_components), 'gateway') ||
      needs.manual_deploy_gateway.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      pages_origin: ${{ steps.deploy_app.outputs.pages_origin }}
    environment:
      name: ${{ 'staging' }}
    env:
      DEPLOY_TARGET: staging
      DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.source_sha }}
      ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
      RELEASE_SET_ID: ${{ inputs.release_set_id }}
      DEPLOY_SOURCE_BRANCH: dev
      ENFORCE_CURRENT_BRANCH: 'false'
      STAGING_GATEWAY_ORIGIN: https://seams-sdk-d1-gateway-staging.n6378056.workers.dev
      PRODUCTION_GATEWAY_ORIGIN: https://seams-sdk-d1-gateway.n6378056.workers.dev
      RUST_TOOLCHAIN: 1.96.0
      DEPLOY_ENVIRONMENT: staging
      PAGES_BRANCH: dev
      PAGES_ARTIFACT_NAME:
        release-staging-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha ||
        inputs.source_sha }}-pages
      PAGES_ARTIFACT_IDENTITY: '{"pagesBuild":"app-wallet-v1"}'
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PAGES_PROJECT: ${{ secrets.CF_PAGES_PROJECT_VITE }}
    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            crates/router-ab-cloudflare
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            scripts
          ref: ${{ env.DEPLOY_SHA }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - name: Install deployment dependencies
        run: pnpm install --frozen-lockfile --filter router-ab-cloudflare
      - name: Download release-set manifest
        uses: actions/download-artifact@v8
        with:
          name: release-set-${{ env.RELEASE_SET_ID }}
          path: .release-artifacts/release-set
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}
      - name: Download Pages artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}
      - name: Verify Pages artifact
        run: |
          set -euo pipefail
          node scripts/deployment-release.mjs verify \
            --manifest .release-artifacts/release-set/manifest.json \
            --target "$DEPLOY_ENVIRONMENT" \
            --source-sha "$DEPLOY_SHA" \
            --artifact-run-id "$ARTIFACT_RUN_ID" \
            --release-set-id "$RELEASE_SET_ID"
          node -e "const value=require('./.release-artifacts/release-set/manifest.json'); if (!value.components.some((component) => component.name === 'site')) throw new Error('Pages deployment requires the site release component')"
          node scripts/deployment-artifact.mjs verify \
            --kind pages \
            --target "$DEPLOY_ENVIRONMENT" \
            --sha "$DEPLOY_SHA" \
            --root apps/seams-site/dist \
            --manifest .release-artifacts/pages/manifest.json \
            --identity-json "$PAGES_ARTIFACT_IDENTITY"
      - name: Deploy app
        id: manual_deploy_app
        env:
          WRANGLER_OUTPUT_FILE_PATH: ${{ runner.temp }}/wrangler-pages-app.ndjson
        run: |
          set -euo pipefail
          test -n "${CF_PAGES_PROJECT:-}" || { echo "CF_PAGES_PROJECT_VITE is not set" >&2; exit 1; }
          rm -f "$WRANGLER_OUTPUT_FILE_PATH"
          pnpm -C crates/router-ab-cloudflare exec wrangler pages deploy ../../apps/seams-site/dist \
            --project-name "$CF_PAGES_PROJECT" \
            --branch "$PAGES_BRANCH" \
            --commit-hash "$DEPLOY_SHA" \
            --commit-dirty=false
          pages_origin="$(
            node scripts/wrangler-pages-deployment-url.mjs \
              "$WRANGLER_OUTPUT_FILE_PATH" \
              "$CF_PAGES_PROJECT"
          )"
          echo "pages_origin=$pages_origin" >> "$GITHUB_OUTPUT"
      - name: Verify app readiness
        env:
          PAGES_ORIGIN: ${{ steps.deploy_app.outputs.pages_origin }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 5 "$PAGES_ORIGIN/" > /dev/null
          curl --fail --silent --show-error --max-time 5 "$PAGES_ORIGIN/sdk/workers/near-signer.worker.js" > /dev/null
      - name: Summarize app deployment
        env:
          PAGES_ORIGIN: ${{ steps.deploy_app.outputs.pages_origin }}
        run: |
          manifest_digest="$(node -e "const value=require('./.release-artifacts/pages/manifest.json'); process.stdout.write(value.contentDigestSha256)")"
          {
            echo '## App Pages deployment'
            echo
            echo "- Source SHA: \`$DEPLOY_SHA\`"
            echo "- Release set: \`$RELEASE_SET_ID\`"
            echo "- Artifact run: \`$ARTIFACT_RUN_ID\`"
            echo "- Artifact content digest: \`$manifest_digest\`"
            echo "- URL: $PAGES_ORIGIN"
            echo "- Readiness: app and SDK worker passed"
          } >> "$GITHUB_STEP_SUMMARY"
    needs:
      - manual_preflight_release
      - manual_deploy_gateway
  manual_deploy_wallet:
    name: Deploy / staging / cloudflare-pages / wallet
    if:
      always() && github.event_name == 'workflow_dispatch' && needs.manual_preflight_release.result == 'success' &&
      (contains(fromJSON(needs.manual_preflight_release.outputs.selected_components), 'site') ||
      contains(fromJSON(needs.manual_preflight_release.outputs.selected_components), 'signer-iframe')) &&
      (!contains(fromJSON(needs.manual_preflight_release.outputs.selected_components), 'gateway') ||
      needs.manual_deploy_gateway.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      pages_origin: ${{ steps.deploy_wallet.outputs.pages_origin }}
    environment:
      name: ${{ 'staging' }}
    env:
      DEPLOY_TARGET: staging
      DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.source_sha }}
      ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
      RELEASE_SET_ID: ${{ inputs.release_set_id }}
      DEPLOY_SOURCE_BRANCH: dev
      ENFORCE_CURRENT_BRANCH: 'false'
      STAGING_GATEWAY_ORIGIN: https://seams-sdk-d1-gateway-staging.n6378056.workers.dev
      PRODUCTION_GATEWAY_ORIGIN: https://seams-sdk-d1-gateway.n6378056.workers.dev
      RUST_TOOLCHAIN: 1.96.0
      DEPLOY_ENVIRONMENT: staging
      PAGES_BRANCH: dev
      PAGES_ARTIFACT_NAME:
        release-staging-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha ||
        inputs.source_sha }}-pages
      PAGES_ARTIFACT_IDENTITY: '{"pagesBuild":"app-wallet-v1"}'
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PAGES_PROJECT: ${{ secrets.CF_PAGES_PROJECT_WALLET }}
    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            crates/router-ab-cloudflare
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            scripts
          ref: ${{ env.DEPLOY_SHA }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - name: Install deployment dependencies
        run: pnpm install --frozen-lockfile --filter router-ab-cloudflare
      - name: Download release-set manifest
        uses: actions/download-artifact@v8
        with:
          name: release-set-${{ env.RELEASE_SET_ID }}
          path: .release-artifacts/release-set
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}
      - name: Download Pages artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ARTIFACT_RUN_ID }}
      - name: Verify Pages artifact
        run: |
          set -euo pipefail
          node scripts/deployment-release.mjs verify \
