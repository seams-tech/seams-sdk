name: deploy-wallet-iframe-testnet

on:
  push:
    branches: [dev]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-wallet-iframe-testnet
  cancel-in-progress: true

jobs:
  deploy-wallet-iframe-testnet:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: testnet
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PAGES_PROJECT_WALLET: ${{ secrets.CF_PAGES_PROJECT_WALLET }}
      PAGES_BRANCH: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Setup Bun (for worker bundling step in build scripts)
        uses: oven-sh/setup-bun@v2

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Build SDK (sdk, production)
        run: pnpm build:sdk-prod

      - name: Build wallet iframe host site (examples/tatchi-site)
        env:
          VITE_WALLET_ORIGIN: ${{ vars.VITE_WALLET_ORIGIN }}
          VITE_WALLET_SERVICE_PATH: ${{ vars.VITE_WALLET_SERVICE_PATH }}
          VITE_SDK_BASE_PATH: ${{ vars.VITE_SDK_BASE_PATH }}
          VITE_RP_ID_BASE: ${{ vars.VITE_RP_ID_BASE }}
          VITE_RELAYER_URL: ${{ vars.VITE_RELAYER_URL }}
          VITE_RELAYER_ACCOUNT_ID: ${{ vars.VITE_RELAYER_ACCOUNT_ID }}
          VITE_EMAIL_RECOVERER_GLOBAL_CONTRACT: ${{ vars.VITE_EMAIL_RECOVERER_GLOBAL_CONTRACT }}
          VITE_EMAIL_DKIM_VERIFIER_CONTRACT: ${{ vars.VITE_EMAIL_DKIM_VERIFIER_CONTRACT }}
          VITE_NEAR_NETWORK: ${{ vars.VITE_NEAR_NETWORK }}
          VITE_NEAR_RPC_URL: ${{ vars.VITE_NEAR_RPC_URL }}
          VITE_NEAR_EXPLORER: ${{ vars.VITE_NEAR_EXPLORER }}
          VITE_DOCS_ORIGIN: ${{ vars.VITE_DOCS_ORIGIN }}
        run: pnpm -C examples/tatchi-site build

      - name: Copy SDK assets into Pages output
        run: |
          set -euo pipefail
          test -d sdk/dist/esm/sdk
          mkdir -p examples/tatchi-site/dist/sdk examples/tatchi-site/dist/sdk/workers
          rsync -av --delete sdk/dist/esm/sdk/ examples/tatchi-site/dist/sdk/
          if [ -d sdk/dist/workers ]; then
            rsync -av --delete sdk/dist/workers/ examples/tatchi-site/dist/sdk/workers/
          fi

      - name: Deploy wallet iframe to Cloudflare Pages
        run: |
          pnpm dlx wrangler@4.40.2 pages deploy examples/tatchi-site/dist \
            --project-name "$CF_PAGES_PROJECT_WALLET" \
            --branch "$PAGES_BRANCH"
