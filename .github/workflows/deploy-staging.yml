name: deploy-staging

on:
  workflow_run:
    workflows: ['ci']
    types: [completed]
    branches: [dev]

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy_staging:
    name: Deploy staging backend and sites
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'dev'
      }}
    uses: ./.github/workflows/deploy-router-ab.yml
    with:
      target: staging
      deploy_sha: ${{ github.event.workflow_run.head_sha }}
      source_branch: dev
    secrets: inherit
