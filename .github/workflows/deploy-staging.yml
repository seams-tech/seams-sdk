name: deploy-staging

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy_staging:
    name: Deploy staging backend and sites
    uses: ./.github/workflows/deploy-router-ab.yml
    with:
      target: staging
      deploy_sha: ${{ github.sha }}
      source_branch: dev
    secrets: inherit
