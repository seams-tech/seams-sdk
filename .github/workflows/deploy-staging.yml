name: deploy-staging

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact accepted source SHA
        required: true
        type: string
      artifact_run_id:
        description: Accepted release artifact workflow run ID
        required: true
        type: string
      release_set_id:
        description: Content-addressed release-set ID
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    name: Deploy accepted staging release
    uses: ./.github/workflows/deploy-router-ab.yml
    with:
      target: staging
      deploy_sha: ${{ inputs.source_sha }}
      artifact_run_id: ${{ inputs.artifact_run_id }}
      release_set_id: ${{ inputs.release_set_id }}
      source_branch: dev
      enforce_current_branch: false
    secrets: inherit
