name: deploy-router-ab

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
      operation:
        description: Router A/B operation
        required: true
        type: choice
        default: validate
        options:
          - validate
          - upload-version
          - deploy
      role:
        description: Worker role
        required: true
        type: choice
        default: all
        options:
          - all
          - router
          - deriver-a
          - deriver-b
          - signing-worker

permissions:
  contents: read

concurrency:
  group: deploy-router-ab-${{ inputs.target }}
  cancel-in-progress: true

jobs:
  validate_router_ab:
    name: Validate Router A/B
    runs-on: ubuntu-latest
    timeout-minutes: 55
    environment:
      name: ${{ inputs.target }}-router
    env:
      ROUTER_JWT_ISSUER: ${{ vars.ROUTER_AB_JWT_ISSUER }}
      ROUTER_JWT_AUDIENCE: ${{ vars.ROUTER_AB_JWT_AUDIENCE }}
      ROUTER_JWT_JWKS_URL: ${{ vars.ROUTER_AB_JWT_JWKS_URL }}
      SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY }}
      SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY }}
      SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY }}
      SIGNER_A_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_SIGNER_A_PEER_VERIFYING_KEY_HEX }}
      SIGNER_B_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_SIGNER_B_PEER_VERIFYING_KEY_HEX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Run Router A/B tests
        run: |
          set -euo pipefail
          cargo test --manifest-path crates/router-ab-core/Cargo.toml
          cargo test --manifest-path crates/router-ab-dev/Cargo.toml
          cargo test --manifest-path crates/router-ab-cloudflare/Cargo.toml

      - name: Check strict Worker entrypoints
        run: |
          set -euo pipefail
          for feature in \
            strict-worker-router-entrypoint \
            strict-worker-signer-a-entrypoint \
            strict-worker-signer-b-entrypoint \
            strict-worker-signing-worker-entrypoint
          do
            cargo check --manifest-path crates/router-ab-cloudflare/Cargo.toml --features "$feature"
          done

      - name: Check Router A/B release blockers
        if: inputs.operation == 'deploy'
        run: pnpm router:deploy:check

      - name: Run target Cloudflare startup dry-run
        run: |
          pnpm router:deploy:dry-run -- \
            --env ${{ inputs.target }} \
            --out reports/startup-latencies/router-ab-${{ inputs.target }}-dry-run-${{ github.run_id }}.json

      - name: Upload Router A/B validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ inputs.target }}-validation-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore

  upload_or_deploy_signing_worker:
    name: Upload or Deploy SigningWorker
    if: inputs.operation != 'validate' && (inputs.role == 'all' || inputs.role == 'signing-worker')
    needs: validate_router_ab
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: ${{ inputs.target }}-signing-worker
    env:
      WORKER_ENV: ${{ inputs.target }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET: ${{ secrets.ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET }}
      SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY }}
      SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY: ${{ secrets.SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Check SigningWorker environment
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_API_TOKEN is required"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_ACCOUNT_ID is required"; exit 1; }
          test -n "${ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET:-}" || { echo "::error title=Missing GitHub secret::ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET is required"; exit 1; }
          test -n "${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY:-}" || { echo "::error title=Missing GitHub secret::SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY is required"; exit 1; }

      - name: Put SigningWorker secrets
        run: |
          set -euo pipefail
          printf '%s' "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET --config wrangler.signing-worker.toml --env "$WORKER_ENV"
          printf '%s' "$SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY --config wrangler.signing-worker.toml --env "$WORKER_ENV"

      - name: Upload SigningWorker version
        if: inputs.operation == 'upload-version'
        run: |
          pnpm router:deploy:upload -- \
            --env "$WORKER_ENV" \
            --role signing-worker \
            --out "reports/startup-latencies/router-ab-${WORKER_ENV}-signing-worker-upload-${GITHUB_RUN_ID}.json"

      - name: Deploy SigningWorker
        if: inputs.operation == 'deploy'
        run: |
          pnpm -C crates/router-ab-cloudflare exec wrangler deploy \
            --config wrangler.signing-worker.toml \
            --env "$WORKER_ENV" \
            --var "SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY:${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY}"

      - name: Upload SigningWorker report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ inputs.target }}-${{ inputs.operation }}-signing-worker-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore

  upload_or_deploy_deriver_a:
    name: Upload or Deploy Deriver A
    if: |
      always() &&
      inputs.operation != 'validate' &&
      (inputs.role == 'all' || inputs.role == 'deriver-a') &&
      needs.validate_router_ab.result == 'success' &&
      (inputs.role != 'all' || needs.upload_or_deploy_signing_worker.result == 'success')
    needs:
      - validate_router_ab
      - upload_or_deploy_signing_worker
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: ${{ inputs.target }}-deriver-a
    env:
      WORKER_ENV: ${{ inputs.target }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET: ${{ secrets.ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET }}
      SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY }}
      SIGNER_A_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_SIGNER_A_PEER_VERIFYING_KEY_HEX }}
      SIGNER_B_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_SIGNER_B_PEER_VERIFYING_KEY_HEX }}
      SIGNER_A_ROOT_SHARE_WIRE_SECRET: ${{ secrets.SIGNER_A_ROOT_SHARE_WIRE_SECRET }}
      SIGNER_A_ENVELOPE_HPKE_PRIVATE_KEY: ${{ secrets.SIGNER_A_ENVELOPE_HPKE_PRIVATE_KEY }}
      SIGNER_A_PEER_SIGNING_KEY: ${{ secrets.SIGNER_A_PEER_SIGNING_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Check Deriver A environment
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_API_TOKEN is required"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_ACCOUNT_ID is required"; exit 1; }
          test -n "${ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET:-}" || { echo "::error title=Missing GitHub secret::ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET is required"; exit 1; }
          test -n "${SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${SIGNER_A_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_SIGNER_A_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          test -n "${SIGNER_B_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_SIGNER_B_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          test -n "${SIGNER_A_ROOT_SHARE_WIRE_SECRET:-}" || { echo "::error title=Missing GitHub secret::SIGNER_A_ROOT_SHARE_WIRE_SECRET is required"; exit 1; }
          test -n "${SIGNER_A_ENVELOPE_HPKE_PRIVATE_KEY:-}" || { echo "::error title=Missing GitHub secret::SIGNER_A_ENVELOPE_HPKE_PRIVATE_KEY is required"; exit 1; }
          test -n "${SIGNER_A_PEER_SIGNING_KEY:-}" || { echo "::error title=Missing GitHub secret::SIGNER_A_PEER_SIGNING_KEY is required"; exit 1; }

      - name: Put Deriver A secrets
        run: |
          set -euo pipefail
          printf '%s' "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET --config wrangler.signer-a.toml --env "$WORKER_ENV"
          printf '%s' "$SIGNER_A_ROOT_SHARE_WIRE_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put SIGNER_A_ROOT_SHARE_WIRE_SECRET --config wrangler.signer-a.toml --env "$WORKER_ENV"
          printf '%s' "$SIGNER_A_ENVELOPE_HPKE_PRIVATE_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put SIGNER_A_ENVELOPE_HPKE_PRIVATE_KEY --config wrangler.signer-a.toml --env "$WORKER_ENV"
          printf '%s' "$SIGNER_A_PEER_SIGNING_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put SIGNER_A_PEER_SIGNING_KEY --config wrangler.signer-a.toml --env "$WORKER_ENV"

      - name: Upload Deriver A version
        if: inputs.operation == 'upload-version'
        run: |
          pnpm router:deploy:upload -- \
            --env "$WORKER_ENV" \
            --role deriver-a \
            --out "reports/startup-latencies/router-ab-${WORKER_ENV}-deriver-a-upload-${GITHUB_RUN_ID}.json"

      - name: Deploy Deriver A
        if: inputs.operation == 'deploy'
        run: |
          pnpm -C crates/router-ab-cloudflare exec wrangler deploy \
            --config wrangler.signer-a.toml \
            --env "$WORKER_ENV" \
            --var "SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY:${SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY}" \
            --var "SIGNER_A_PEER_VERIFYING_KEY_HEX:${SIGNER_A_PEER_VERIFYING_KEY_HEX}" \
            --var "SIGNER_B_PEER_VERIFYING_KEY_HEX:${SIGNER_B_PEER_VERIFYING_KEY_HEX}"

      - name: Upload Deriver A report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ inputs.target }}-${{ inputs.operation }}-deriver-a-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore

  upload_or_deploy_deriver_b:
    name: Upload or Deploy Deriver B
    if: |
      always() &&
      inputs.operation != 'validate' &&
      (inputs.role == 'all' || inputs.role == 'deriver-b') &&
      needs.validate_router_ab.result == 'success' &&
      (inputs.role != 'all' || needs.upload_or_deploy_signing_worker.result == 'success')
    needs:
      - validate_router_ab
      - upload_or_deploy_signing_worker
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: ${{ inputs.target }}-deriver-b
    env:
      WORKER_ENV: ${{ inputs.target }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET: ${{ secrets.ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET }}
      SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY }}
      SIGNER_A_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_SIGNER_A_PEER_VERIFYING_KEY_HEX }}
      SIGNER_B_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_SIGNER_B_PEER_VERIFYING_KEY_HEX }}
      SIGNER_B_ROOT_SHARE_WIRE_SECRET: ${{ secrets.SIGNER_B_ROOT_SHARE_WIRE_SECRET }}
      SIGNER_B_ENVELOPE_HPKE_PRIVATE_KEY: ${{ secrets.SIGNER_B_ENVELOPE_HPKE_PRIVATE_KEY }}
      SIGNER_B_PEER_SIGNING_KEY: ${{ secrets.SIGNER_B_PEER_SIGNING_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Check Deriver B environment
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_API_TOKEN is required"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_ACCOUNT_ID is required"; exit 1; }
          test -n "${ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET:-}" || { echo "::error title=Missing GitHub secret::ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET is required"; exit 1; }
          test -n "${SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${SIGNER_A_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_SIGNER_A_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          test -n "${SIGNER_B_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_SIGNER_B_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          test -n "${SIGNER_B_ROOT_SHARE_WIRE_SECRET:-}" || { echo "::error title=Missing GitHub secret::SIGNER_B_ROOT_SHARE_WIRE_SECRET is required"; exit 1; }
          test -n "${SIGNER_B_ENVELOPE_HPKE_PRIVATE_KEY:-}" || { echo "::error title=Missing GitHub secret::SIGNER_B_ENVELOPE_HPKE_PRIVATE_KEY is required"; exit 1; }
          test -n "${SIGNER_B_PEER_SIGNING_KEY:-}" || { echo "::error title=Missing GitHub secret::SIGNER_B_PEER_SIGNING_KEY is required"; exit 1; }

      - name: Put Deriver B secrets
        run: |
          set -euo pipefail
          printf '%s' "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET --config wrangler.signer-b.toml --env "$WORKER_ENV"
          printf '%s' "$SIGNER_B_ROOT_SHARE_WIRE_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put SIGNER_B_ROOT_SHARE_WIRE_SECRET --config wrangler.signer-b.toml --env "$WORKER_ENV"
          printf '%s' "$SIGNER_B_ENVELOPE_HPKE_PRIVATE_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put SIGNER_B_ENVELOPE_HPKE_PRIVATE_KEY --config wrangler.signer-b.toml --env "$WORKER_ENV"
          printf '%s' "$SIGNER_B_PEER_SIGNING_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put SIGNER_B_PEER_SIGNING_KEY --config wrangler.signer-b.toml --env "$WORKER_ENV"

      - name: Upload Deriver B version
        if: inputs.operation == 'upload-version'
        run: |
          pnpm router:deploy:upload -- \
            --env "$WORKER_ENV" \
            --role deriver-b \
            --out "reports/startup-latencies/router-ab-${WORKER_ENV}-deriver-b-upload-${GITHUB_RUN_ID}.json"

      - name: Deploy Deriver B
        if: inputs.operation == 'deploy'
        run: |
          pnpm -C crates/router-ab-cloudflare exec wrangler deploy \
            --config wrangler.signer-b.toml \
            --env "$WORKER_ENV" \
            --var "SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY:${SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY}" \
            --var "SIGNER_A_PEER_VERIFYING_KEY_HEX:${SIGNER_A_PEER_VERIFYING_KEY_HEX}" \
            --var "SIGNER_B_PEER_VERIFYING_KEY_HEX:${SIGNER_B_PEER_VERIFYING_KEY_HEX}"

      - name: Upload Deriver B report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ inputs.target }}-${{ inputs.operation }}-deriver-b-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore

  upload_or_deploy_router:
    name: Upload or Deploy Router
    if: |
      always() &&
      inputs.operation != 'validate' &&
      (inputs.role == 'all' || inputs.role == 'router') &&
      needs.validate_router_ab.result == 'success' &&
      (
        inputs.role != 'all' ||
        (
          needs.upload_or_deploy_signing_worker.result == 'success' &&
          needs.upload_or_deploy_deriver_a.result == 'success' &&
          needs.upload_or_deploy_deriver_b.result == 'success'
        )
      )
    needs:
      - validate_router_ab
      - upload_or_deploy_signing_worker
      - upload_or_deploy_deriver_a
      - upload_or_deploy_deriver_b
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: ${{ inputs.target }}-router
    env:
      WORKER_ENV: ${{ inputs.target }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET: ${{ secrets.ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET }}
      ROUTER_AB_JWT_ISSUER: ${{ vars.ROUTER_AB_JWT_ISSUER }}
      ROUTER_AB_JWT_AUDIENCE: ${{ vars.ROUTER_AB_JWT_AUDIENCE }}
      ROUTER_AB_JWT_JWKS_URL: ${{ vars.ROUTER_AB_JWT_JWKS_URL }}
      SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY }}
      SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY }}
      SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY }}
      SIGNER_A_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_SIGNER_A_PEER_VERIFYING_KEY_HEX }}
      SIGNER_B_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_SIGNER_B_PEER_VERIFYING_KEY_HEX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Check Router environment
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_API_TOKEN is required"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_ACCOUNT_ID is required"; exit 1; }
          test -n "${ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET:-}" || { echo "::error title=Missing GitHub secret::ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET is required"; exit 1; }
          test -n "${ROUTER_AB_JWT_ISSUER:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_JWT_ISSUER is required"; exit 1; }
          test -n "${ROUTER_AB_JWT_AUDIENCE:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_JWT_AUDIENCE is required"; exit 1; }
          test -n "${ROUTER_AB_JWT_JWKS_URL:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_JWT_JWKS_URL is required"; exit 1; }
          test -n "${SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${SIGNER_A_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_SIGNER_A_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          test -n "${SIGNER_B_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_SIGNER_B_PEER_VERIFYING_KEY_HEX is required"; exit 1; }

      - name: Put Router secrets
        run: |
          set -euo pipefail
          printf '%s' "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET --config wrangler.router.toml --env "$WORKER_ENV"

      - name: Upload Router version
        if: inputs.operation == 'upload-version'
        run: |
          pnpm router:deploy:upload -- \
            --env "$WORKER_ENV" \
            --role router \
            --out "reports/startup-latencies/router-ab-${WORKER_ENV}-router-upload-${GITHUB_RUN_ID}.json"

      - name: Deploy Router
        if: inputs.operation == 'deploy'
        run: |
          pnpm -C crates/router-ab-cloudflare exec wrangler deploy \
            --config wrangler.router.toml \
            --env "$WORKER_ENV" \
            --var "ROUTER_JWT_ISSUER:${ROUTER_AB_JWT_ISSUER}" \
            --var "ROUTER_JWT_AUDIENCE:${ROUTER_AB_JWT_AUDIENCE}" \
            --var "ROUTER_JWT_JWKS_URL:${ROUTER_AB_JWT_JWKS_URL}" \
            --var "SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY:${SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY}" \
            --var "SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY:${SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY}" \
            --var "SIGNER_A_PEER_VERIFYING_KEY_HEX:${SIGNER_A_PEER_VERIFYING_KEY_HEX}" \
            --var "SIGNER_B_PEER_VERIFYING_KEY_HEX:${SIGNER_B_PEER_VERIFYING_KEY_HEX}" \
            --var "SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY:${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY}"

      - name: Upload Router report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ inputs.target }}-${{ inputs.operation }}-router-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore
