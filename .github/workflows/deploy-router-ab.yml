name: deploy-router-ab

on:
  workflow_call:
    inputs:
      target:
        description: Deployment target
        required: true
        type: string
      deploy_sha:
        description: Exact source revision to deploy
        required: true
        type: string
      source_branch:
        description: Source branch associated with the revision
        required: true
        type: string
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
      operation:
        description: Router A/B operation
        required: true
        type: choice
        default: validate
        options:
          - validate
          - upload-version
          - deploy
      role:
        description: Worker role
        required: true
        type: choice
        default: all
        options:
          - all
          - router
          - deriver-a
          - deriver-b
          - signing-worker

permissions:
  contents: read

env:
  DEPLOY_TARGET: ${{ inputs.target }}
  DEPLOY_OPERATION: ${{ github.event_name == 'workflow_call' && 'deploy' || inputs.operation }}
  DEPLOY_ROLE: ${{ github.event_name == 'workflow_call' && 'all' || inputs.role }}
  DEPLOY_SHA: ${{ inputs.deploy_sha || github.sha }}
  DEPLOY_SOURCE_BRANCH: ${{ inputs.source_branch || github.ref_name }}

concurrency:
  group: deploy-router-ab-${{ inputs.target }}
  cancel-in-progress: true

jobs:
  validate_router_ab:
    name: Validate Router A/B
    runs-on: ubuntu-latest
    timeout-minutes: 55
    environment:
      name: ${{ format('{0}-mpc-router', inputs.target) }}
    env:
      ROUTER_JWT_ISSUER: ${{ vars.ROUTER_AB_JWT_ISSUER }}
      ROUTER_JWT_AUDIENCE: ${{ vars.ROUTER_AB_JWT_AUDIENCE }}
      ROUTER_JWT_JWKS_URL: ${{ vars.ROUTER_AB_JWT_JWKS_URL }}
      DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY }}
      DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY }}
      SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY }}
      DERIVER_A_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_A_PEER_VERIFYING_KEY_HEX }}
      DERIVER_B_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_B_PEER_VERIFYING_KEY_HEX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}

      - name: Reject stale or mismatched automatic releases
        if: github.event_name == 'workflow_call'
        run: |
          set -euo pipefail
          expected_target='staging'
          if [[ "$DEPLOY_SOURCE_BRANCH" == 'main' ]]; then
            expected_target='production'
          fi
          if [[ "$DEPLOY_TARGET" != "$expected_target" ]]; then
            echo "::error title=Invalid release mapping::$DEPLOY_SOURCE_BRANCH must deploy to $expected_target"
            exit 1
          fi
          git fetch origin "refs/heads/$DEPLOY_SOURCE_BRANCH:refs/remotes/origin/$DEPLOY_SOURCE_BRANCH"
          branch_tip="$(git rev-parse "refs/remotes/origin/$DEPLOY_SOURCE_BRANCH")"
          if [[ "$branch_tip" != "$DEPLOY_SHA" ]]; then
            echo "::error title=Stale release skipped::$DEPLOY_SHA is no longer the tip of $DEPLOY_SOURCE_BRANCH"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Run Router A/B tests
        run: |
          set -euo pipefail
          cargo test --manifest-path crates/router-ab-core/Cargo.toml
          cargo test --manifest-path crates/router-ab-dev/Cargo.toml
          cargo test --manifest-path crates/router-ab-cloudflare/Cargo.toml

      - name: Check strict Worker entrypoints
        run: |
          set -euo pipefail
          for feature in \
            strict-worker-router-entrypoint \
            strict-worker-deriver-a-entrypoint \
            strict-worker-deriver-b-entrypoint \
            strict-worker-signing-worker-entrypoint
          do
            cargo check --manifest-path crates/router-ab-cloudflare/Cargo.toml --features "$feature"
          done

      - name: Check Router A/B release blockers
        if: env.DEPLOY_OPERATION == 'deploy'
        run: pnpm router:deploy:check

      - name: Run target Cloudflare startup dry-run
        run: |
          set -euo pipefail
          args=(
            --out "reports/startup-latencies/router-ab-${DEPLOY_TARGET}-dry-run-${GITHUB_RUN_ID}.json"
          )
          if [[ "$DEPLOY_TARGET" == 'staging' ]]; then
            args+=(--env staging)
          fi
          pnpm router:deploy:dry-run -- "${args[@]}"

      - name: Upload Router A/B validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-validation-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore

  upload_or_deploy_signing_worker:
    name: Upload or Deploy SigningWorker
    if: (github.event_name == 'workflow_call' || inputs.operation != 'validate') && (github.event_name == 'workflow_call' || inputs.role == 'all' || inputs.role == 'signing-worker')
    needs: validate_router_ab
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: ${{ format('{0}-signing-worker', inputs.target) }}
    env:
      WORKER_ENV: ${{ inputs.target == 'staging' && 'staging' || '' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET: ${{ secrets.ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET }}
      SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY }}
      SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY: ${{ secrets.SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Check SigningWorker environment
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_API_TOKEN is required"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_ACCOUNT_ID is required"; exit 1; }
          test -n "${ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET:-}" || { echo "::error title=Missing GitHub secret::ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET is required"; exit 1; }
          test -n "${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY:-}" || { echo "::error title=Missing GitHub secret::SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY is required"; exit 1; }

      - name: Put SigningWorker secrets
        run: |
          set -euo pipefail
          wrangler_env_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          fi
          printf '%s' "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET --config wrangler.signing-worker.toml "${wrangler_env_args[@]}"
          printf '%s' "$SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY --config wrangler.signing-worker.toml "${wrangler_env_args[@]}"

      - name: Upload SigningWorker version
        if: env.DEPLOY_OPERATION == 'upload-version'
        run: |
          set -euo pipefail
          args=(
            --role signing-worker
            --out "reports/startup-latencies/router-ab-${DEPLOY_TARGET}-signing-worker-upload-${GITHUB_RUN_ID}.json"
          )
          if [[ -n "$WORKER_ENV" ]]; then
            args+=(--env "$WORKER_ENV")
          fi
          pnpm router:deploy:upload -- "${args[@]}"

      - name: Deploy SigningWorker
        if: env.DEPLOY_OPERATION == 'deploy'
        run: |
          set -euo pipefail
          wrangler_env_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          fi
          pnpm -C crates/router-ab-cloudflare exec wrangler deploy \
            --config wrangler.signing-worker.toml \
            "${wrangler_env_args[@]}" \
            --var "SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY:${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY}"

      - name: Upload SigningWorker report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_OPERATION }}-signing-worker-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore

  upload_or_deploy_deriver_a:
    name: Upload or Deploy Deriver A
    if: |
      always() &&
      (github.event_name == 'workflow_call' || inputs.operation != 'validate') &&
      (github.event_name == 'workflow_call' || inputs.role == 'all' || inputs.role == 'deriver-a') &&
      needs.validate_router_ab.result == 'success' &&
      (github.event_name != 'workflow_call' && inputs.role != 'all' || needs.upload_or_deploy_signing_worker.result == 'success')
    needs:
      - validate_router_ab
      - upload_or_deploy_signing_worker
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: ${{ format('{0}-deriver-a', inputs.target) }}
    env:
      WORKER_ENV: ${{ inputs.target == 'staging' && 'staging' || '' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET: ${{ secrets.ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET }}
      DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY }}
      DERIVER_A_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_A_PEER_VERIFYING_KEY_HEX }}
      DERIVER_B_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_B_PEER_VERIFYING_KEY_HEX }}
      DERIVER_A_ROOT_SHARE_WIRE_SECRET: ${{ secrets.DERIVER_A_ROOT_SHARE_WIRE_SECRET }}
      DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY: ${{ secrets.DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY }}
      DERIVER_A_PEER_SIGNING_KEY: ${{ secrets.DERIVER_A_PEER_SIGNING_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Check Deriver A environment
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_API_TOKEN is required"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_ACCOUNT_ID is required"; exit 1; }
          test -n "${ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET:-}" || { echo "::error title=Missing GitHub secret::ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET is required"; exit 1; }
          test -n "${DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${DERIVER_A_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_A_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          test -n "${DERIVER_B_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_B_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          test -n "${DERIVER_A_ROOT_SHARE_WIRE_SECRET:-}" || { echo "::error title=Missing GitHub secret::DERIVER_A_ROOT_SHARE_WIRE_SECRET is required"; exit 1; }
          test -n "${DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY:-}" || { echo "::error title=Missing GitHub secret::DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY is required"; exit 1; }
          test -n "${DERIVER_A_PEER_SIGNING_KEY:-}" || { echo "::error title=Missing GitHub secret::DERIVER_A_PEER_SIGNING_KEY is required"; exit 1; }

      - name: Put Deriver A secrets
        run: |
          set -euo pipefail
          wrangler_env_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          fi
          printf '%s' "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET --config wrangler.deriver-a.toml "${wrangler_env_args[@]}"
          printf '%s' "$DERIVER_A_ROOT_SHARE_WIRE_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put DERIVER_A_ROOT_SHARE_WIRE_SECRET --config wrangler.deriver-a.toml "${wrangler_env_args[@]}"
          printf '%s' "$DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY --config wrangler.deriver-a.toml "${wrangler_env_args[@]}"
          printf '%s' "$DERIVER_A_PEER_SIGNING_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put DERIVER_A_PEER_SIGNING_KEY --config wrangler.deriver-a.toml "${wrangler_env_args[@]}"

      - name: Upload Deriver A version
        if: env.DEPLOY_OPERATION == 'upload-version'
        run: |
          set -euo pipefail
          args=(
            --role deriver-a
            --out "reports/startup-latencies/router-ab-${DEPLOY_TARGET}-deriver-a-upload-${GITHUB_RUN_ID}.json"
          )
          if [[ -n "$WORKER_ENV" ]]; then
            args+=(--env "$WORKER_ENV")
          fi
          pnpm router:deploy:upload -- "${args[@]}"

      - name: Deploy Deriver A
        if: env.DEPLOY_OPERATION == 'deploy'
        run: |
          set -euo pipefail
          wrangler_env_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          fi
          pnpm -C crates/router-ab-cloudflare exec wrangler deploy \
            --config wrangler.deriver-a.toml \
            "${wrangler_env_args[@]}" \
            --var "DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY:${DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY}" \
            --var "DERIVER_A_PEER_VERIFYING_KEY_HEX:${DERIVER_A_PEER_VERIFYING_KEY_HEX}" \
            --var "DERIVER_B_PEER_VERIFYING_KEY_HEX:${DERIVER_B_PEER_VERIFYING_KEY_HEX}"

      - name: Upload Deriver A report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_OPERATION }}-deriver-a-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore

  upload_or_deploy_deriver_b:
    name: Upload or Deploy Deriver B
    if: |
      always() &&
      (github.event_name == 'workflow_call' || inputs.operation != 'validate') &&
      (github.event_name == 'workflow_call' || inputs.role == 'all' || inputs.role == 'deriver-b') &&
      needs.validate_router_ab.result == 'success' &&
      (github.event_name != 'workflow_call' && inputs.role != 'all' || needs.upload_or_deploy_signing_worker.result == 'success')
    needs:
      - validate_router_ab
      - upload_or_deploy_signing_worker
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: ${{ format('{0}-deriver-b', inputs.target) }}
    env:
      WORKER_ENV: ${{ inputs.target == 'staging' && 'staging' || '' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET: ${{ secrets.ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET }}
      DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY }}
      DERIVER_A_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_A_PEER_VERIFYING_KEY_HEX }}
      DERIVER_B_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_B_PEER_VERIFYING_KEY_HEX }}
      DERIVER_B_ROOT_SHARE_WIRE_SECRET: ${{ secrets.DERIVER_B_ROOT_SHARE_WIRE_SECRET }}
      DERIVER_B_ENVELOPE_HPKE_PRIVATE_KEY: ${{ secrets.DERIVER_B_ENVELOPE_HPKE_PRIVATE_KEY }}
      DERIVER_B_PEER_SIGNING_KEY: ${{ secrets.DERIVER_B_PEER_SIGNING_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Check Deriver B environment
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_API_TOKEN is required"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_ACCOUNT_ID is required"; exit 1; }
          test -n "${ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET:-}" || { echo "::error title=Missing GitHub secret::ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET is required"; exit 1; }
          test -n "${DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${DERIVER_A_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_A_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          test -n "${DERIVER_B_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_B_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          test -n "${DERIVER_B_ROOT_SHARE_WIRE_SECRET:-}" || { echo "::error title=Missing GitHub secret::DERIVER_B_ROOT_SHARE_WIRE_SECRET is required"; exit 1; }
          test -n "${DERIVER_B_ENVELOPE_HPKE_PRIVATE_KEY:-}" || { echo "::error title=Missing GitHub secret::DERIVER_B_ENVELOPE_HPKE_PRIVATE_KEY is required"; exit 1; }
          test -n "${DERIVER_B_PEER_SIGNING_KEY:-}" || { echo "::error title=Missing GitHub secret::DERIVER_B_PEER_SIGNING_KEY is required"; exit 1; }

      - name: Put Deriver B secrets
        run: |
          set -euo pipefail
          wrangler_env_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          fi
          printf '%s' "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET --config wrangler.deriver-b.toml "${wrangler_env_args[@]}"
          printf '%s' "$DERIVER_B_ROOT_SHARE_WIRE_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put DERIVER_B_ROOT_SHARE_WIRE_SECRET --config wrangler.deriver-b.toml "${wrangler_env_args[@]}"
          printf '%s' "$DERIVER_B_ENVELOPE_HPKE_PRIVATE_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put DERIVER_B_ENVELOPE_HPKE_PRIVATE_KEY --config wrangler.deriver-b.toml "${wrangler_env_args[@]}"
          printf '%s' "$DERIVER_B_PEER_SIGNING_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put DERIVER_B_PEER_SIGNING_KEY --config wrangler.deriver-b.toml "${wrangler_env_args[@]}"

      - name: Upload Deriver B version
        if: env.DEPLOY_OPERATION == 'upload-version'
        run: |
          set -euo pipefail
          args=(
            --role deriver-b
            --out "reports/startup-latencies/router-ab-${DEPLOY_TARGET}-deriver-b-upload-${GITHUB_RUN_ID}.json"
          )
          if [[ -n "$WORKER_ENV" ]]; then
            args+=(--env "$WORKER_ENV")
          fi
          pnpm router:deploy:upload -- "${args[@]}"

      - name: Deploy Deriver B
        if: env.DEPLOY_OPERATION == 'deploy'
        run: |
          set -euo pipefail
          wrangler_env_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          fi
          pnpm -C crates/router-ab-cloudflare exec wrangler deploy \
            --config wrangler.deriver-b.toml \
            "${wrangler_env_args[@]}" \
            --var "DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY:${DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY}" \
            --var "DERIVER_A_PEER_VERIFYING_KEY_HEX:${DERIVER_A_PEER_VERIFYING_KEY_HEX}" \
            --var "DERIVER_B_PEER_VERIFYING_KEY_HEX:${DERIVER_B_PEER_VERIFYING_KEY_HEX}"

      - name: Upload Deriver B report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_OPERATION }}-deriver-b-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore

  upload_or_deploy_mpc_router:
    name: Upload or Deploy MPCRouter
    if: |
      always() &&
      (github.event_name == 'workflow_call' || inputs.operation != 'validate') &&
      (github.event_name == 'workflow_call' || inputs.role == 'all' || inputs.role == 'router') &&
      needs.validate_router_ab.result == 'success' &&
      (
        github.event_name != 'workflow_call' && inputs.role != 'all' ||
        (
          needs.upload_or_deploy_signing_worker.result == 'success' &&
          needs.upload_or_deploy_deriver_a.result == 'success' &&
          needs.upload_or_deploy_deriver_b.result == 'success'
        )
      )
    needs:
      - validate_router_ab
      - upload_or_deploy_signing_worker
      - upload_or_deploy_deriver_a
      - upload_or_deploy_deriver_b
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: ${{ format('{0}-mpc-router', inputs.target) }}
    env:
      WORKER_ENV: ${{ inputs.target == 'staging' && 'staging' || '' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET: ${{ secrets.ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET }}
      ROUTER_AB_JWT_ISSUER: ${{ vars.ROUTER_AB_JWT_ISSUER }}
      ROUTER_AB_JWT_AUDIENCE: ${{ vars.ROUTER_AB_JWT_AUDIENCE }}
      ROUTER_AB_JWT_JWKS_URL: ${{ vars.ROUTER_AB_JWT_JWKS_URL }}
      DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY }}
      DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY }}
      SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY }}
      DERIVER_A_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_A_PEER_VERIFYING_KEY_HEX }}
      DERIVER_B_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_B_PEER_VERIFYING_KEY_HEX }}
      ROUTER_AB_PROJECT_POLICY_BOOTSTRAP_JSON: ${{ vars.ROUTER_AB_PROJECT_POLICY_BOOTSTRAP_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Check MPCRouter environment
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_API_TOKEN is required"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_ACCOUNT_ID is required"; exit 1; }
          test -n "${ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET:-}" || { echo "::error title=Missing GitHub secret::ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET is required"; exit 1; }
          test -n "${ROUTER_AB_JWT_ISSUER:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_JWT_ISSUER is required"; exit 1; }
          test -n "${ROUTER_AB_JWT_AUDIENCE:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_JWT_AUDIENCE is required"; exit 1; }
          test -n "${ROUTER_AB_JWT_JWKS_URL:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_JWT_JWKS_URL is required"; exit 1; }
          test -n "${DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${DERIVER_A_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_A_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          test -n "${DERIVER_B_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_B_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          if [[ "$DEPLOY_TARGET" == 'production' ]]; then
            test -n "${ROUTER_AB_PROJECT_POLICY_BOOTSTRAP_JSON:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_PROJECT_POLICY_BOOTSTRAP_JSON is required for production"; exit 1; }
          fi

      - name: Put MPCRouter secrets
        run: |
          set -euo pipefail
          wrangler_env_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          fi
          printf '%s' "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET --config wrangler.router.toml "${wrangler_env_args[@]}"

      - name: Upload MPCRouter version
        if: env.DEPLOY_OPERATION == 'upload-version'
        run: |
          set -euo pipefail
          args=(
            --role router
            --out "reports/startup-latencies/router-ab-${DEPLOY_TARGET}-router-upload-${GITHUB_RUN_ID}.json"
          )
          if [[ -n "$WORKER_ENV" ]]; then
            args+=(--env "$WORKER_ENV")
          fi
          pnpm router:deploy:upload -- "${args[@]}"

      - name: Deploy MPCRouter
        if: env.DEPLOY_OPERATION == 'deploy'
        run: |
          set -euo pipefail
          wrangler_env_args=()
          project_policy_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          else
            project_policy_args=(--var "ROUTER_PROJECT_POLICY_BOOTSTRAP_JSON:${ROUTER_AB_PROJECT_POLICY_BOOTSTRAP_JSON}")
          fi
          pnpm -C crates/router-ab-cloudflare exec wrangler deploy \
            --config wrangler.router.toml \
            "${wrangler_env_args[@]}" \
            --var "ROUTER_JWT_ISSUER:${ROUTER_AB_JWT_ISSUER}" \
            --var "ROUTER_JWT_AUDIENCE:${ROUTER_AB_JWT_AUDIENCE}" \
            --var "ROUTER_JWT_JWKS_URL:${ROUTER_AB_JWT_JWKS_URL}" \
            --var "DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY:${DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY}" \
            --var "DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY:${DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY}" \
            --var "DERIVER_A_PEER_VERIFYING_KEY_HEX:${DERIVER_A_PEER_VERIFYING_KEY_HEX}" \
            --var "DERIVER_B_PEER_VERIFYING_KEY_HEX:${DERIVER_B_PEER_VERIFYING_KEY_HEX}" \
            --var "SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY:${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY}" \
            "${project_policy_args[@]}"

      - name: Upload MPCRouter report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_OPERATION }}-router-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore

  deploy_gateway:
    name: Deploy Gateway and D1
    if: >-
      ${{
        always() &&
        needs.upload_or_deploy_mpc_router.result == 'success' &&
        (
          github.event_name == 'workflow_call' ||
          (
            inputs.operation == 'deploy' &&
            inputs.role == 'all'
          )
        )
      }}
    needs: upload_or_deploy_mpc_router
    uses: ./.github/workflows/deploy-gateway.yml
    with:
      target: ${{ inputs.target }}
      deploy_sha: ${{ inputs.deploy_sha || github.sha }}
      source_branch: ${{ inputs.source_branch || github.ref_name }}
    secrets: inherit

  deploy_pages:
    name: Deploy seams.sh and wallet.seams.sh
    if: ${{ always() && needs.deploy_gateway.result == 'success' }}
    needs: deploy_gateway
    uses: ./.github/workflows/deploy-pages.yml
    with:
      target: all
      deploy_environment: ${{ inputs.target }}
      deploy_sha: ${{ inputs.deploy_sha || github.sha }}
      source_branch: ${{ inputs.source_branch || github.ref_name }}
    secrets: inherit
