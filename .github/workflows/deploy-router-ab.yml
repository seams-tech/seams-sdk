name: deploy-router-ab

on:
  workflow_call:
    inputs:
      target:
        description: Deployment target
        required: true
        type: string
      deploy_sha:
        description: Exact source revision to deploy
        required: true
        type: string
      source_branch:
        description: Source branch associated with the revision
        required: true
        type: string
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
      operation:
        description: Router A/B operation
        required: true
        type: choice
        default: validate
        options:
          - validate
          - upload-version
          - deploy
      role:
        description: Worker role
        required: true
        type: choice
        default: all
        options:
          - all
          - router
          - deriver-a
          - deriver-b
          - signing-worker

permissions:
  contents: read

env:
  DEPLOY_TARGET: ${{ inputs.target }}
  DEPLOY_OPERATION: ${{ inputs.deploy_sha != '' && 'deploy' || inputs.operation }}
  DEPLOY_ROLE: ${{ inputs.deploy_sha != '' && 'all' || inputs.role }}
  DEPLOY_SHA: ${{ inputs.deploy_sha || github.sha }}
  DEPLOY_SOURCE_BRANCH: ${{ inputs.source_branch || github.ref_name }}
  RUST_TOOLCHAIN: '1.96.0'

concurrency:
  group: deploy-router-ab-${{ inputs.target }}
  cancel-in-progress: true

jobs:
  validate_router_ab:
    name: Validate Router A/B
    runs-on: ubuntu-latest
    timeout-minutes: 55
    environment:
      name: ${{ format('{0}-mpc-router', inputs.target) }}
    env:
      ROUTER_JWT_ISSUER: ${{ vars.ROUTER_AB_JWT_ISSUER }}
      ROUTER_JWT_AUDIENCE: ${{ vars.ROUTER_AB_JWT_AUDIENCE }}
      ROUTER_JWT_JWKS_URL: ${{ vars.ROUTER_AB_JWT_JWKS_URL }}
      DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY }}
      DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_DERIVER_B_ENVELOPE_HPKE_PUBLIC_KEY }}
      SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY }}
      DERIVER_A_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_A_PEER_VERIFYING_KEY_HEX }}
      DERIVER_B_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_B_PEER_VERIFYING_KEY_HEX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}

      - name: Reject stale or mismatched automatic releases
        if: inputs.deploy_sha != ''
        run: |
          set -euo pipefail
          expected_target='staging'
          if [[ "$DEPLOY_SOURCE_BRANCH" == 'main' ]]; then
            expected_target='production'
          fi
          if [[ "$DEPLOY_TARGET" != "$expected_target" ]]; then
            echo "::error title=Invalid release mapping::$DEPLOY_SOURCE_BRANCH must deploy to $expected_target"
            exit 1
          fi
          git fetch origin "refs/heads/$DEPLOY_SOURCE_BRANCH:refs/remotes/origin/$DEPLOY_SOURCE_BRANCH"
          branch_tip="$(git rev-parse "refs/remotes/origin/$DEPLOY_SOURCE_BRANCH")"
          if [[ "$branch_tip" != "$DEPLOY_SHA" ]]; then
            echo "::error title=Stale release skipped::$DEPLOY_SHA is no longer the tip of $DEPLOY_SOURCE_BRANCH"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Rust toolchain
        if: env.DEPLOY_OPERATION != 'deploy'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Add wasm target
        if: env.DEPLOY_OPERATION != 'deploy'
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Bun
        if: env.DEPLOY_OPERATION != 'deploy'
        uses: oven-sh/setup-bun@v2

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile --filter router-ab-cloudflare

      - name: Run Router A/B tests
        if: env.DEPLOY_OPERATION != 'deploy'
        run: |
          set -euo pipefail
          cargo test --manifest-path crates/router-ab-core/Cargo.toml
          cargo test --manifest-path crates/router-ab-dev/Cargo.toml
          cargo test --manifest-path crates/router-ab-cloudflare/Cargo.toml

      - name: Check strict Worker entrypoints
        if: env.DEPLOY_OPERATION != 'deploy'
        run: |
          set -euo pipefail
          for feature in \
            strict-worker-router-entrypoint \
            strict-worker-deriver-a-entrypoint \
            strict-worker-deriver-b-entrypoint \
            strict-worker-signing-worker-entrypoint
          do
            cargo check --manifest-path crates/router-ab-cloudflare/Cargo.toml --features "$feature"
          done

      - name: Check Router A/B release blockers
        if: env.DEPLOY_OPERATION == 'deploy'
        run: pnpm router:deploy:check

      - name: Run target Cloudflare startup dry-run
        if: env.DEPLOY_OPERATION != 'deploy'
        run: |
          set -euo pipefail
          args=(
            --out "reports/startup-latencies/router-ab-${DEPLOY_TARGET}-dry-run-${GITHUB_RUN_ID}.json"
          )
          if [[ "$DEPLOY_TARGET" == 'staging' ]]; then
            args+=(--env staging)
          fi
          pnpm router:deploy:dry-run -- "${args[@]}"

      - name: Upload Router A/B validation report
        if: always() && env.DEPLOY_OPERATION != 'deploy'
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-validation-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore

  build_router_ab_artifacts:
    name: Build Router A/B artifacts
    if: inputs.deploy_sha != '' || inputs.operation != 'validate'
    needs: validate_router_ab
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}

      - name: Record artifact build start
        run: echo "ARTIFACT_BUILD_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache Router A/B Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: router-ab-workers-${{ runner.os }}-rust-${{ env.RUST_TOOLCHAIN }}-release
          workspaces: crates/router-ab-cloudflare -> target

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install pinned Worker builder
        run: pnpm -C crates/router-ab-cloudflare run worker-build:install

      - name: Build all role bundles once
        env:
          ROUTER_AB_WORKER_BUILD_PROFILE: release
        run: |
          set -euo pipefail
          for role in signing-worker deriver-a deriver-b router; do
            pnpm -C crates/router-ab-cloudflare run "build:$role"
          done

      - name: Create role manifests
        run: |
          set -euo pipefail
          build_metadata="$(
            node -e 'process.stdout.write(JSON.stringify({bun:process.argv[1],node:process.argv[2],rustc:process.argv[3],workerBuild:process.argv[4]}))' \
              "$(bun --version)" \
              "$(node --version)" \
              "$(rustc --version)" \
              "$(worker-build --version)"
          )"
          mkdir -p crates/router-ab-cloudflare/.release-artifacts
          for role in signing-worker deriver-a deriver-b router; do
            node scripts/deployment-artifact.mjs create \
              --kind "$role" \
              --target "$DEPLOY_TARGET" \
              --sha "$DEPLOY_SHA" \
              --root "crates/router-ab-cloudflare/build/$role" \
              --manifest "crates/router-ab-cloudflare/.release-artifacts/$role.json" \
              --identity-json "{\"profile\":\"release\",\"role\":\"$role\"}" \
              --metadata-json "$build_metadata"
          done

      - name: Upload SigningWorker artifact
        id: upload_signing_worker
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_SHA }}-signing-worker
          path: |
            crates/router-ab-cloudflare/build/signing-worker
            crates/router-ab-cloudflare/.release-artifacts/signing-worker.json
          if-no-files-found: error
          include-hidden-files: true
          overwrite: true
          retention-days: 30
          compression-level: 0

      - name: Upload Deriver A artifact
        id: upload_deriver_a
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_SHA }}-deriver-a
          path: |
            crates/router-ab-cloudflare/build/deriver-a
            crates/router-ab-cloudflare/.release-artifacts/deriver-a.json
          if-no-files-found: error
          include-hidden-files: true
          overwrite: true
          retention-days: 30
          compression-level: 0

      - name: Upload Deriver B artifact
        id: upload_deriver_b
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_SHA }}-deriver-b
          path: |
            crates/router-ab-cloudflare/build/deriver-b
            crates/router-ab-cloudflare/.release-artifacts/deriver-b.json
          if-no-files-found: error
          include-hidden-files: true
          overwrite: true
          retention-days: 30
          compression-level: 0

      - name: Upload MPCRouter artifact
        id: upload_router
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_SHA }}-router
          path: |
            crates/router-ab-cloudflare/build/router
            crates/router-ab-cloudflare/.release-artifacts/router.json
          if-no-files-found: error
          include-hidden-files: true
          overwrite: true
          retention-days: 30
          compression-level: 0

      - name: Summarize role artifacts
        env:
          SIGNING_WORKER_DIGEST: ${{ steps.upload_signing_worker.outputs.artifact-digest }}
          DERIVER_A_DIGEST: ${{ steps.upload_deriver_a.outputs.artifact-digest }}
          DERIVER_B_DIGEST: ${{ steps.upload_deriver_b.outputs.artifact-digest }}
          ROUTER_DIGEST: ${{ steps.upload_router.outputs.artifact-digest }}
        run: |
          elapsed_seconds="$(($(date +%s) - ARTIFACT_BUILD_STARTED_AT))"
          {
            echo '## Router A/B release artifacts'
            echo
            echo "- Source SHA: \`$DEPLOY_SHA\`"
            echo "- Target: \`$DEPLOY_TARGET\`"
            echo "- Build profile: \`release\`"
            echo "- Build duration: ${elapsed_seconds}s"
            echo "- SigningWorker: \`$SIGNING_WORKER_DIGEST\`"
            echo "- Deriver A: \`$DERIVER_A_DIGEST\`"
            echo "- Deriver B: \`$DERIVER_B_DIGEST\`"
            echo "- MPCRouter: \`$ROUTER_DIGEST\`"
          } >> "$GITHUB_STEP_SUMMARY"

  upload_or_deploy_signing_worker:
    name: Upload or Deploy SigningWorker
    if: (inputs.deploy_sha != '' || inputs.operation != 'validate') && (inputs.deploy_sha != '' || inputs.role == 'all' || inputs.role == 'signing-worker')
    needs:
      - validate_router_ab
      - build_router_ab_artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: ${{ format('{0}-signing-worker', inputs.target) }}
    env:
      WORKER_ENV: ${{ inputs.target == 'staging' && 'staging' || '' }}
      ROUTER_AB_USE_PREBUILT: '1'
      ROUTER_AB_DEPLOY_TARGET: ${{ env.DEPLOY_TARGET }}
      ROUTER_AB_DEPLOY_SHA: ${{ env.DEPLOY_SHA }}
      ROUTER_AB_ARTIFACT_IDENTITY_JSON: '{"profile":"release","role":"signing-worker"}'
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET: ${{ secrets.ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET }}
      SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY }}
      SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY: ${{ secrets.SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile --filter router-ab-cloudflare

      - name: Download SigningWorker artifact
        uses: actions/download-artifact@v4
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_SHA }}-signing-worker
          path: crates/router-ab-cloudflare

      - name: Verify SigningWorker artifact
        run: |
          node scripts/deployment-artifact.mjs verify \
            --kind signing-worker \
            --target "$DEPLOY_TARGET" \
            --sha "$DEPLOY_SHA" \
            --root crates/router-ab-cloudflare/build/signing-worker \
            --manifest crates/router-ab-cloudflare/.release-artifacts/signing-worker.json \
            --identity-json "$ROUTER_AB_ARTIFACT_IDENTITY_JSON"

      - name: Check SigningWorker environment
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_API_TOKEN is required"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_ACCOUNT_ID is required"; exit 1; }
          test -n "${ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET:-}" || { echo "::error title=Missing GitHub secret::ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET is required"; exit 1; }
          test -n "${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY:-}" || { echo "::error title=Missing GitHub secret::SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY is required"; exit 1; }

      - name: Put SigningWorker secrets
        run: |
          set -euo pipefail
          wrangler_env_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          fi
          printf '%s' "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET --config wrangler.signing-worker.toml "${wrangler_env_args[@]}"
          printf '%s' "$SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY --config wrangler.signing-worker.toml "${wrangler_env_args[@]}"

      - name: Upload SigningWorker version
        if: env.DEPLOY_OPERATION == 'upload-version'
        run: |
          set -euo pipefail
          args=(
            --role signing-worker
            --out "reports/startup-latencies/router-ab-${DEPLOY_TARGET}-signing-worker-upload-${GITHUB_RUN_ID}.json"
          )
          if [[ -n "$WORKER_ENV" ]]; then
            args+=(--env "$WORKER_ENV")
          fi
          pnpm router:deploy:upload -- "${args[@]}"

      - name: Deploy SigningWorker
        if: env.DEPLOY_OPERATION == 'deploy'
        run: |
          set -euo pipefail
          wrangler_env_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          fi
          pnpm -C crates/router-ab-cloudflare exec wrangler deploy \
            --config wrangler.signing-worker.toml \
            "${wrangler_env_args[@]}" \
            --var "SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY:${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY}"

      - name: Upload SigningWorker report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_OPERATION }}-signing-worker-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore

      - name: Summarize SigningWorker deployment
        if: env.DEPLOY_OPERATION == 'deploy'
        run: |
          manifest_digest="$(node -e "const value=require('./crates/router-ab-cloudflare/.release-artifacts/signing-worker.json'); process.stdout.write(value.contentDigestSha256)")"
          {
            echo '## SigningWorker deployment'
            echo
            echo "- Source SHA: \`$DEPLOY_SHA\`"
            echo "- Target: \`$DEPLOY_TARGET\`"
            echo "- Artifact content digest: \`$manifest_digest\`"
          } >> "$GITHUB_STEP_SUMMARY"

  upload_or_deploy_deriver_a:
    name: Upload or Deploy Deriver A
    if: |
      always() &&
      (inputs.deploy_sha != '' || inputs.operation != 'validate') &&
      (inputs.deploy_sha != '' || inputs.role == 'all' || inputs.role == 'deriver-a') &&
      needs.validate_router_ab.result == 'success' &&
      needs.build_router_ab_artifacts.result == 'success' &&
      (inputs.deploy_sha == '' && inputs.role != 'all' || needs.upload_or_deploy_signing_worker.result == 'success')
    needs:
      - validate_router_ab
      - build_router_ab_artifacts
      - upload_or_deploy_signing_worker
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: ${{ format('{0}-deriver-a', inputs.target) }}
    env:
      WORKER_ENV: ${{ inputs.target == 'staging' && 'staging' || '' }}
      ROUTER_AB_USE_PREBUILT: '1'
      ROUTER_AB_DEPLOY_TARGET: ${{ env.DEPLOY_TARGET }}
      ROUTER_AB_DEPLOY_SHA: ${{ env.DEPLOY_SHA }}
      ROUTER_AB_ARTIFACT_IDENTITY_JSON: '{"profile":"release","role":"deriver-a"}'
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET: ${{ secrets.ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET }}
      DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY }}
      DERIVER_A_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_A_PEER_VERIFYING_KEY_HEX }}
      DERIVER_B_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_DERIVER_B_PEER_VERIFYING_KEY_HEX }}
      DERIVER_A_ROOT_SHARE_WIRE_SECRET: ${{ secrets.DERIVER_A_ROOT_SHARE_WIRE_SECRET }}
      DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY: ${{ secrets.DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY }}
      DERIVER_A_PEER_SIGNING_KEY: ${{ secrets.DERIVER_A_PEER_SIGNING_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile --filter router-ab-cloudflare

      - name: Download Deriver A artifact
        uses: actions/download-artifact@v4
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_SHA }}-deriver-a
          path: crates/router-ab-cloudflare

      - name: Verify Deriver A artifact
        run: |
          node scripts/deployment-artifact.mjs verify \
            --kind deriver-a \
            --target "$DEPLOY_TARGET" \
            --sha "$DEPLOY_SHA" \
            --root crates/router-ab-cloudflare/build/deriver-a \
            --manifest crates/router-ab-cloudflare/.release-artifacts/deriver-a.json \
            --identity-json "$ROUTER_AB_ARTIFACT_IDENTITY_JSON"

      - name: Check Deriver A environment
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_API_TOKEN is required"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_ACCOUNT_ID is required"; exit 1; }
          test -n "${ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET:-}" || { echo "::error title=Missing GitHub secret::ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET is required"; exit 1; }
          test -n "${DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_A_ENVELOPE_HPKE_PUBLIC_KEY is required"; exit 1; }
          test -n "${DERIVER_A_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_A_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          test -n "${DERIVER_B_PEER_VERIFYING_KEY_HEX:-}" || { echo "::error title=Missing GitHub Environment variable::ROUTER_AB_DERIVER_B_PEER_VERIFYING_KEY_HEX is required"; exit 1; }
          test -n "${DERIVER_A_ROOT_SHARE_WIRE_SECRET:-}" || { echo "::error title=Missing GitHub secret::DERIVER_A_ROOT_SHARE_WIRE_SECRET is required"; exit 1; }
          test -n "${DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY:-}" || { echo "::error title=Missing GitHub secret::DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY is required"; exit 1; }
          test -n "${DERIVER_A_PEER_SIGNING_KEY:-}" || { echo "::error title=Missing GitHub secret::DERIVER_A_PEER_SIGNING_KEY is required"; exit 1; }

      - name: Put Deriver A secrets
        run: |
          set -euo pipefail
          wrangler_env_args=()
          if [[ -n "$WORKER_ENV" ]]; then
            wrangler_env_args=(--env "$WORKER_ENV")
          fi
          printf '%s' "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET --config wrangler.deriver-a.toml "${wrangler_env_args[@]}"
          printf '%s' "$DERIVER_A_ROOT_SHARE_WIRE_SECRET" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put DERIVER_A_ROOT_SHARE_WIRE_SECRET --config wrangler.deriver-a.toml "${wrangler_env_args[@]}"
          printf '%s' "$DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put DERIVER_A_ENVELOPE_HPKE_PRIVATE_KEY --config wrangler.deriver-a.toml "${wrangler_env_args[@]}"
          printf '%s' "$DERIVER_A_PEER_SIGNING_KEY" \
            | pnpm -C crates/router-ab-cloudflare exec wrangler secret put DERIVER_A_PEER_SIGNING_KEY --config wrangler.deriver-a.toml "${wrangler_env_args[@]}"

      - name: Upload Deriver A version
        if: env.DEPLOY_OPERATION == 'upload-version'
        run: |
          set -euo pipefail
          args=(
            --role deriver-a
