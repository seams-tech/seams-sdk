      - name: Upload Deriver B report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ env.DEPLOY_TARGET }}-${{ env.DEPLOY_OPERATION }}-deriver-b-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore

      - name: Summarize Deriver B deployment
        if: env.DEPLOY_OPERATION == 'deploy'
        run: |
          manifest_digest="$(node -e "const value=require('./crates/router-ab-cloudflare/.release-artifacts/deriver-b.json'); process.stdout.write(value.contentDigestSha256)")"
          {
