name: deploy-router-ab

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
      operation:
        description: Router A/B operation
        required: true
        type: choice
        default: validate
        options:
          - validate
          - upload-version
          - deploy
      role:
        description: Worker role
        required: true
        type: choice
        default: all
        options:
          - all
          - router
          - deriver-a
          - deriver-b
          - signing-worker

permissions:
  contents: read

concurrency:
  group: deploy-router-ab-${{ inputs.target }}
  cancel-in-progress: true

jobs:
  validate-router-ab:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    environment:
      name: ${{ inputs.target }}
    env:
      ROUTER_JWT_ISSUER: ${{ vars.ROUTER_AB_JWT_ISSUER }}
      ROUTER_JWT_AUDIENCE: ${{ vars.ROUTER_AB_JWT_AUDIENCE }}
      ROUTER_JWT_JWKS_URL: ${{ vars.ROUTER_AB_JWT_JWKS_URL }}
      SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY }}
      SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY }}
      SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY }}
      SIGNER_A_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_SIGNER_A_PEER_VERIFYING_KEY_HEX }}
      SIGNER_B_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_SIGNER_B_PEER_VERIFYING_KEY_HEX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Run Router A/B tests
        run: |
          set -euo pipefail
          cargo test --manifest-path crates/router-ab-core/Cargo.toml
          cargo test --manifest-path crates/router-ab-dev/Cargo.toml
          cargo test --manifest-path crates/router-ab-cloudflare/Cargo.toml

      - name: Check strict Worker entrypoints
        run: |
          set -euo pipefail
          for feature in \
            strict-worker-router-entrypoint \
            strict-worker-signer-a-entrypoint \
            strict-worker-signer-b-entrypoint \
            strict-worker-signing-worker-entrypoint
          do
            cargo check --manifest-path crates/router-ab-cloudflare/Cargo.toml --features "$feature"
          done

      - name: Run target Cloudflare startup dry-run
        run: |
          pnpm router:deploy:dry-run -- \
            --env ${{ inputs.target }} \
            --out reports/startup-latencies/router-ab-${{ inputs.target }}-dry-run-${{ github.run_id }}.json

      - name: Upload Router A/B validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ inputs.target }}-validation-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore

  upload-or-deploy-router-ab:
    if: inputs.operation != 'validate'
    needs: validate-router-ab
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: ${{ inputs.target }}
    env:
      WORKER_ENV: ${{ inputs.target }}
      ROLE: ${{ inputs.role }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ROUTER_AB_JWT_ISSUER: ${{ vars.ROUTER_AB_JWT_ISSUER }}
      ROUTER_AB_JWT_AUDIENCE: ${{ vars.ROUTER_AB_JWT_AUDIENCE }}
      ROUTER_AB_JWT_JWKS_URL: ${{ vars.ROUTER_AB_JWT_JWKS_URL }}
      ROUTER_JWT_ISSUER: ${{ vars.ROUTER_AB_JWT_ISSUER }}
      ROUTER_JWT_AUDIENCE: ${{ vars.ROUTER_AB_JWT_AUDIENCE }}
      ROUTER_JWT_JWKS_URL: ${{ vars.ROUTER_AB_JWT_JWKS_URL }}
      SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY }}
      SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY }}
      SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY: ${{ vars.ROUTER_AB_SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY }}
      SIGNER_A_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_SIGNER_A_PEER_VERIFYING_KEY_HEX }}
      SIGNER_B_PEER_VERIFYING_KEY_HEX: ${{ vars.ROUTER_AB_SIGNER_B_PEER_VERIFYING_KEY_HEX }}
      SIGNER_A_ROOT_SHARE_WIRE_SECRET: ${{ secrets.SIGNER_A_ROOT_SHARE_WIRE_SECRET }}
      SIGNER_A_ENVELOPE_HPKE_PRIVATE_KEY: ${{ secrets.SIGNER_A_ENVELOPE_HPKE_PRIVATE_KEY }}
      SIGNER_A_PEER_SIGNING_KEY: ${{ secrets.SIGNER_A_PEER_SIGNING_KEY }}
      SIGNER_B_ROOT_SHARE_WIRE_SECRET: ${{ secrets.SIGNER_B_ROOT_SHARE_WIRE_SECRET }}
      SIGNER_B_ENVELOPE_HPKE_PRIVATE_KEY: ${{ secrets.SIGNER_B_ENVELOPE_HPKE_PRIVATE_KEY }}
      SIGNER_B_PEER_SIGNING_KEY: ${{ secrets.SIGNER_B_PEER_SIGNING_KEY }}
      SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY: ${{ secrets.SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY }}
      ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET: ${{ secrets.ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Check Cloudflare credentials
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_API_TOKEN is required"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "::error title=Missing GitHub secret::CLOUDFLARE_ACCOUNT_ID is required"; exit 1; }

      - name: Check Router A/B public deployment vars
        run: |
          set -euo pipefail
          require_var() {
            local name="$1"
            local role_label="${2:-selected Router A/B role}"
            test -n "${!name:-}" || { echo "::error title=Missing GitHub Environment variable::$name is required for $role_label"; exit 1; }
          }

          if [ "$ROLE" = "all" ] || [ "$ROLE" = "router" ]; then
            require_var ROUTER_AB_JWT_ISSUER router
            require_var ROUTER_AB_JWT_JWKS_URL router
          fi

          if [ "$ROLE" = "all" ] || [ "$ROLE" = "router" ] || [ "$ROLE" = "deriver-a" ] || [ "$ROLE" = "deriver-b" ]; then
            require_var SIGNER_A_PEER_VERIFYING_KEY_HEX "Deriver A/B"
            require_var SIGNER_B_PEER_VERIFYING_KEY_HEX "Deriver A/B"
          fi

          if [ "$ROLE" = "all" ] || [ "$ROLE" = "router" ] || [ "$ROLE" = "deriver-a" ]; then
            require_var SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY "Deriver A"
          fi

          if [ "$ROLE" = "all" ] || [ "$ROLE" = "router" ] || [ "$ROLE" = "deriver-b" ]; then
            require_var SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY "Deriver B"
          fi

          if [ "$ROLE" = "all" ] || [ "$ROLE" = "router" ] || [ "$ROLE" = "signing-worker" ]; then
            require_var SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY SigningWorker
          fi

      - name: Check Router A/B Worker secrets
        run: |
          set -euo pipefail
          require_secret() {
            local name="$1"
            local role_label="$2"
            test -n "${!name:-}" || { echo "::error title=Missing GitHub secret::$name is required for $role_label"; exit 1; }
          }

          if [ "$ROLE" = "all" ] || [ "$ROLE" = "deriver-a" ]; then
            require_secret ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET "Deriver A"
            require_secret SIGNER_A_ROOT_SHARE_WIRE_SECRET "Deriver A"
            require_secret SIGNER_A_ENVELOPE_HPKE_PRIVATE_KEY "Deriver A"
            require_secret SIGNER_A_PEER_SIGNING_KEY "Deriver A"
          fi

          if [ "$ROLE" = "all" ] || [ "$ROLE" = "deriver-b" ]; then
            require_secret ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET "Deriver B"
            require_secret SIGNER_B_ROOT_SHARE_WIRE_SECRET "Deriver B"
            require_secret SIGNER_B_ENVELOPE_HPKE_PRIVATE_KEY "Deriver B"
            require_secret SIGNER_B_PEER_SIGNING_KEY "Deriver B"
          fi

          if [ "$ROLE" = "all" ] || [ "$ROLE" = "signing-worker" ]; then
            require_secret ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET SigningWorker
            require_secret SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY SigningWorker
          fi

          if [ "$ROLE" = "all" ] || [ "$ROLE" = "router" ]; then
            require_secret ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET router
          fi

      - name: Check Router A/B release blockers
        if: inputs.operation == 'deploy'
        run: pnpm router:deploy:check

      - name: Put Router A/B Worker secrets
        run: |
          set -euo pipefail
          put_secret() {
            local config="$1"
            local name="$2"
            local value="$3"
            printf '%s' "$value" \
              | pnpm -C crates/router-ab-cloudflare exec wrangler secret put "$name" --config "$config" --env "$WORKER_ENV"
          }

          if [ "$ROLE" = "all" ] || [ "$ROLE" = "deriver-a" ]; then
            put_secret wrangler.signer-a.toml ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET"
            put_secret wrangler.signer-a.toml SIGNER_A_ROOT_SHARE_WIRE_SECRET "$SIGNER_A_ROOT_SHARE_WIRE_SECRET"
            put_secret wrangler.signer-a.toml SIGNER_A_ENVELOPE_HPKE_PRIVATE_KEY "$SIGNER_A_ENVELOPE_HPKE_PRIVATE_KEY"
            put_secret wrangler.signer-a.toml SIGNER_A_PEER_SIGNING_KEY "$SIGNER_A_PEER_SIGNING_KEY"
          fi

          if [ "$ROLE" = "all" ] || [ "$ROLE" = "deriver-b" ]; then
            put_secret wrangler.signer-b.toml ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET"
            put_secret wrangler.signer-b.toml SIGNER_B_ROOT_SHARE_WIRE_SECRET "$SIGNER_B_ROOT_SHARE_WIRE_SECRET"
            put_secret wrangler.signer-b.toml SIGNER_B_ENVELOPE_HPKE_PRIVATE_KEY "$SIGNER_B_ENVELOPE_HPKE_PRIVATE_KEY"
            put_secret wrangler.signer-b.toml SIGNER_B_PEER_SIGNING_KEY "$SIGNER_B_PEER_SIGNING_KEY"
          fi

          if [ "$ROLE" = "all" ] || [ "$ROLE" = "signing-worker" ]; then
            put_secret wrangler.signing-worker.toml ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET"
            put_secret wrangler.signing-worker.toml SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY "$SIGNING_WORKER_SERVER_OUTPUT_HPKE_PRIVATE_KEY"
          fi

          if [ "$ROLE" = "all" ] || [ "$ROLE" = "router" ]; then
            put_secret wrangler.router.toml ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET "$ROUTER_AB_INTERNAL_SERVICE_AUTH_SECRET"
          fi

      - name: Upload Router A/B Worker versions
        if: inputs.operation == 'upload-version'
        run: |
          set -euo pipefail
          args=(--env "$WORKER_ENV" --out "reports/startup-latencies/router-ab-${WORKER_ENV}-upload-${GITHUB_RUN_ID}.json")
          if [ "$ROLE" != "all" ]; then
            args+=(--role "$ROLE")
          fi
          pnpm router:deploy:upload -- "${args[@]}"

      - name: Deploy Router A/B Workers
        if: inputs.operation == 'deploy'
        run: |
          set -euo pipefail

          deploy_role() {
            local label="$1"
            local config="$2"
            shift 2
            pnpm -C crates/router-ab-cloudflare exec wrangler deploy --config "$config" --env "$WORKER_ENV" "$@"
          }

          deploy_deriver_a() {
            local args=(
              --var "SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY:${SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY}"
              --var "SIGNER_A_PEER_VERIFYING_KEY_HEX:${SIGNER_A_PEER_VERIFYING_KEY_HEX}"
              --var "SIGNER_B_PEER_VERIFYING_KEY_HEX:${SIGNER_B_PEER_VERIFYING_KEY_HEX}"
            )
            deploy_role deriver-a wrangler.signer-a.toml "${args[@]}"
          }

          deploy_deriver_b() {
            local args=(
              --var "SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY:${SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY}"
              --var "SIGNER_A_PEER_VERIFYING_KEY_HEX:${SIGNER_A_PEER_VERIFYING_KEY_HEX}"
              --var "SIGNER_B_PEER_VERIFYING_KEY_HEX:${SIGNER_B_PEER_VERIFYING_KEY_HEX}"
            )
            deploy_role deriver-b wrangler.signer-b.toml "${args[@]}"
          }

          deploy_signing_worker() {
            local args=(
              --var "SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY:${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY}"
            )
            deploy_role signing-worker wrangler.signing-worker.toml "${args[@]}"
          }

          deploy_router() {
            test -n "${ROUTER_AB_JWT_ISSUER:-}" || { echo "ROUTER_AB_JWT_ISSUER is required"; exit 1; }
            test -n "${ROUTER_AB_JWT_JWKS_URL:-}" || { echo "ROUTER_AB_JWT_JWKS_URL is required"; exit 1; }
            local audience="${ROUTER_AB_JWT_AUDIENCE:-router-ab}"
            local args=(
              --var "ROUTER_JWT_ISSUER:${ROUTER_AB_JWT_ISSUER}"
              --var "ROUTER_JWT_AUDIENCE:${audience}"
              --var "ROUTER_JWT_JWKS_URL:${ROUTER_AB_JWT_JWKS_URL}"
              --var "SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY:${SIGNER_A_ENVELOPE_HPKE_PUBLIC_KEY}"
              --var "SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY:${SIGNER_B_ENVELOPE_HPKE_PUBLIC_KEY}"
              --var "SIGNER_A_PEER_VERIFYING_KEY_HEX:${SIGNER_A_PEER_VERIFYING_KEY_HEX}"
              --var "SIGNER_B_PEER_VERIFYING_KEY_HEX:${SIGNER_B_PEER_VERIFYING_KEY_HEX}"
              --var "SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY:${SIGNING_WORKER_SERVER_OUTPUT_HPKE_PUBLIC_KEY}"
            )
            deploy_role router wrangler.router.toml "${args[@]}"
          }

          case "$ROLE" in
            all)
              deploy_signing_worker
              deploy_deriver_a
              deploy_deriver_b
              deploy_router
              ;;
            router)
              deploy_router
              ;;
            deriver-a)
              deploy_deriver_a
              ;;
            deriver-b)
              deploy_deriver_b
              ;;
            signing-worker)
              deploy_signing_worker
              ;;
            *)
              echo "unknown role: $ROLE" >&2
              exit 1
              ;;
          esac

      - name: Upload Router A/B deploy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-${{ inputs.target }}-${{ inputs.operation }}-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore
