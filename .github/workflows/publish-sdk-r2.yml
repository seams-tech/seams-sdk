name: publish-sdk-r2

on:
  workflow_dispatch:
    inputs:
      prefix:
        description: 'R2 prefix override (auto | releases | releases-dev | custom)'
        required: false
        default: 'auto'

concurrency:
  group: publish-sdk-r2-${{ github.sha }}
  cancel-in-progress: false

env:
  PUBLISH_SHA: ${{ github.sha }}
  PUBLISH_REF_NAME: ${{ github.ref_name }}
  PUBLISH_TARGET: ${{ github.ref_name == 'dev' && 'staging' || 'production' }}
  RUST_TOOLCHAIN: '1.96.0'
  SDK_ARTIFACT_NAME: sdk-r2-${{ github.sha }}
  SDK_ARTIFACT_IDENTITY: '{"distribution":"r2","profile":"production"}'
  SDK_DIST_DIR: packages/sdk-web/dist

jobs:
  check-r2-credentials:
    name: Check R2 publication configuration
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'dev' && 'staging' || 'production' }}
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    env:
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - name: Check R2 credentials
        id: check
        run: |
          missing=()
          for name in R2_ENDPOINT R2_BUCKET AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY; do
            test -n "${!name:-}" || missing+=("$name")
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=R2 publication skipped::Missing optional R2 configuration: ${missing[*]}"
            {
              echo "## R2 publication skipped"
              echo
              echo "The optional R2 credentials are not configured: \`${missing[*]}\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

  build_sdk_artifact:
    name: Build SDK artifact
    needs: check-r2-credentials
    if: needs.check-r2-credentials.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.PUBLISH_SHA }}

      - name: Record artifact build start
        run: echo "ARTIFACT_BUILD_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache Rust build inputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: sdk-r2-${{ runner.os }}-${{ env.PUBLISH_REF_NAME }}
          workspaces: |
            crates/router-ab-ed25519-yao-client -> target
            wasm/ecdsa_registration_client -> target
            wasm/email_otp_runtime -> target
            wasm/evm_crypto -> target
            wasm/near_signer -> target
            wasm/router_ab_ecdsa_derivation_client -> target
            wasm/router_ab_ecdsa_online_client -> target
            wasm/router_ab_ecdsa_presign_client -> target
            wasm/router_ab_ecdsa_signing_worker -> target
            wasm/shamir3pass_runtime -> target
            wasm/tempo_signer -> target
            wasm/threshold_prf -> target

      - name: Cache pinned WASM tooling
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/wasm-pack
            packages/sdk-web/.tooling/wasm-bindgen
            packages/sdk-web/.tooling/wasm-pack-cache
          key: wasm-tooling-${{ runner.os }}-${{ hashFiles('packages/sdk-web/scripts/build/install-ci-wasm-tooling.sh', 'wasm/**/Cargo.lock', 'crates/router-ab-ed25519-yao-client/Cargo.lock') }}

      - name: Install pinned WASM tooling
        run: bash packages/sdk-web/scripts/build/install-ci-wasm-tooling.sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache generated SDK WASM
        id: cache_sdk_wasm
        uses: actions/cache@v4
        with:
          path: |
            wasm/*/pkg
            crates/router-ab-ed25519-yao-client/pkg
          key: sdk-wasm-${{ runner.os }}-rust-${{ env.RUST_TOOLCHAIN }}-prod-${{ hashFiles('wasm/**', 'crates/**/src/**', 'crates/**/Cargo.toml', 'packages/sdk-web/scripts/build/**') }}

      - name: Build SDK
        env:
          WASM_SDK_USE_PREBUILT: ${{ steps.cache_sdk_wasm.outputs.cache-hit == 'true' && '1' || '0' }}
        run: pnpm build:sdk-prod

      - name: Create SDK artifact manifest
        run: |
          build_metadata="$(
            node -e 'process.stdout.write(JSON.stringify({bun:process.argv[1],node:process.argv[2],rustc:process.argv[3],wasmPack:process.argv[4]}))' \
              "$(bun --version)" \
              "$(node --version)" \
              "$(rustc --version)" \
              "$(wasm-pack --version)"
          )"
          mkdir -p .release-artifacts/sdk-r2
          node scripts/deployment-artifact.mjs create \
            --kind sdk-r2 \
            --target "$PUBLISH_TARGET" \
            --sha "$PUBLISH_SHA" \
            --root "$SDK_DIST_DIR" \
            --manifest .release-artifacts/sdk-r2/manifest.json \
            --identity-json "$SDK_ARTIFACT_IDENTITY" \
            --metadata-json "$build_metadata"

      - name: Upload SDK artifact
        id: upload_sdk_artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SDK_ARTIFACT_NAME }}
          path: |
            packages/sdk-web/dist
            .release-artifacts/sdk-r2/manifest.json
          if-no-files-found: error
          include-hidden-files: true
          overwrite: true
          retention-days: 30
          compression-level: 0

      - name: Summarize SDK artifact
        env:
          ACTIONS_ARTIFACT_DIGEST: ${{ steps.upload_sdk_artifact.outputs.artifact-digest }}
        run: |
          elapsed_seconds="$(($(date +%s) - ARTIFACT_BUILD_STARTED_AT))"
          {
            echo '## R2 SDK release artifact'
            echo
            echo "- Source SHA: \`$PUBLISH_SHA\`"
            echo "- Target: \`$PUBLISH_TARGET\`"
            echo "- Artifact: \`$SDK_ARTIFACT_NAME\`"
            echo "- Actions digest: \`$ACTIONS_ARTIFACT_DIGEST\`"
            echo "- Build duration: ${elapsed_seconds}s"
          } >> "$GITHUB_STEP_SUMMARY"

  publish_sdk:
    name: Sign and publish SDK to R2
    needs:
      - check-r2-credentials
      - build_sdk_artifact
    if: needs.check-r2-credentials.outputs.enabled == 'true' && needs.build_sdk_artifact.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ github.ref_name == 'dev' && 'staging' || 'production' }}
    permissions:
      contents: read
      id-token: write
    env:
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.PUBLISH_SHA }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Download SDK artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.SDK_ARTIFACT_NAME }}
          path: .

      - name: Verify SDK artifact
        run: |
          node scripts/deployment-artifact.mjs verify \
            --kind sdk-r2 \
            --target "$PUBLISH_TARGET" \
            --sha "$PUBLISH_SHA" \
            --root "$SDK_DIST_DIR" \
            --manifest .release-artifacts/sdk-r2/manifest.json \
            --identity-json "$SDK_ARTIFACT_IDENTITY"

      - name: Generate sha256 manifest
        run: |
          cd "$SDK_DIST_DIR"
          find . -type f \
            ! -name "manifest.sha256" \
            ! -name "manifest.json" \
            ! -name "manifest.sig" \
            -exec sha256sum {} + | sort > manifest.sha256
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const files = readFileSync('manifest.sha256', 'utf8')
            .trim()
            .split('\n')
            .filter(Boolean)
            .map((line) => {
              const separator = line.indexOf(' ');
              return {
                path: line.slice(separator).trim(),
                sha256: line.slice(0, separator),
              };
            });
          writeFileSync('manifest.json', `${JSON.stringify({ files }, null, 2)}\n`);
          NODE

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign manifest with cosign
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: |
          cd "$SDK_DIST_DIR"
          cosign sign-blob --yes --output-signature manifest.sig manifest.json

      - name: Verify AWS CLI
        run: aws --version

      - name: Publish by commit SHA
        run: |
          set -euo pipefail
          input_prefix="${{ inputs.prefix || 'auto' }}"
          if [ "$input_prefix" != "auto" ]; then
            base_prefix="$input_prefix"
          elif [ "$PUBLISH_REF_NAME" = "dev" ]; then
            base_prefix="releases-dev"
          else
            base_prefix="releases"
          fi
          prefix="${base_prefix}/${PUBLISH_SHA}"
          aws s3 sync "$SDK_DIST_DIR" "s3://$R2_BUCKET/$prefix" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete
          find "$SDK_DIST_DIR" -name '*.wasm' -type f -print0 |
            while IFS= read -r -d '' file; do
              key="${file#${SDK_DIST_DIR}/}"
              aws s3 cp "$file" "s3://$R2_BUCKET/$prefix/$key" \
                --endpoint-url "$R2_ENDPOINT" \
                --content-type application/wasm \
                --cache-control "public, max-age=31536000, immutable" \
                --metadata-directive REPLACE
            done

      - name: Publish tag aliases
        run: |
          set -euo pipefail
          tags="$(git tag --points-at "$PUBLISH_SHA" | grep -E '^v' || true)"
          for tag in $tags; do
            prefix="releases/${tag}"
            aws s3 sync "$SDK_DIST_DIR" "s3://$R2_BUCKET/$prefix" \
              --endpoint-url "$R2_ENDPOINT" \
              --cache-control "public, max-age=31536000, immutable" \
              --delete
            find "$SDK_DIST_DIR" -name '*.wasm' -type f -print0 |
              while IFS= read -r -d '' file; do
                key="${file#${SDK_DIST_DIR}/}"
                aws s3 cp "$file" "s3://$R2_BUCKET/$prefix/$key" \
                  --endpoint-url "$R2_ENDPOINT" \
                  --content-type application/wasm \
                  --cache-control "public, max-age=31536000, immutable" \
                  --metadata-directive REPLACE
              done
          done

      - name: Summarize R2 publication
        run: |
          artifact_digest="$(node -e "const value=require('./.release-artifacts/sdk-r2/manifest.json'); process.stdout.write(value.contentDigestSha256)")"
          {
            echo '## R2 SDK publication'
            echo
            echo "- Source SHA: \`$PUBLISH_SHA\`"
            echo "- Target: \`$PUBLISH_TARGET\`"
            echo "- Artifact content digest: \`$artifact_digest\`"
            echo "- Bucket: \`$R2_BUCKET\`"
            echo "- Upload retry: re-run this failed job; the SDK artifact is retained"
          } >> "$GITHUB_STEP_SUMMARY"
