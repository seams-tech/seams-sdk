name: Validate / repository

on:
  push:
    branches:
      - dev
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'tests/**'
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deployment-workflow-policy:
    name: Deployment workflow policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - name: Install workflow policy tooling
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Check deployment workflow policy
        run: node scripts/check-deployment-workflows.mjs

  release-change-set:
    name: Record release change set
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout pushed revision
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Compute pushed change range
        env:
          BEFORE_SHA: ${{ github.event.before }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p release-change-set
          if [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
            git diff-tree --root --no-commit-id --name-only -r "$SOURCE_SHA" > release-change-set/changed-files.txt
          else
            git diff --name-only "$BEFORE_SHA" "$SOURCE_SHA" > release-change-set/changed-files.txt
          fi
          printf '%s\n' "$BEFORE_SHA" > release-change-set/base-sha.txt
          printf '%s\n' "$SOURCE_SHA" > release-change-set/source-sha.txt

      - name: Upload pushed change range
        uses: actions/upload-artifact@v7
        with:
          name: release-change-set
          path: release-change-set
          retention-days: 30

  router-ab-deployment-validation:
    name: Router A/B deployment validation
    if: >-
      github.event_name == 'pull_request' || github.event_name == 'merge_group' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Run Router A/B core and adapter tests
        run: |
          cargo test --manifest-path crates/router-ab-core/Cargo.toml
          cargo test --manifest-path crates/router-ab-dev/Cargo.toml
          cargo test --manifest-path crates/router-ab-cloudflare/Cargo.toml

      - name: Check strict Worker entrypoints
        run: |
          set -euo pipefail
          for feature in \
            strict-worker-router-entrypoint \
            strict-worker-deriver-a-entrypoint \
            strict-worker-deriver-b-entrypoint \
            strict-worker-signing-worker-entrypoint
          do
            cargo check --manifest-path crates/router-ab-cloudflare/Cargo.toml --features "$feature"
          done

  ed25519-yao-constant-time-codegen:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Worker WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install LLVM WASM inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes llvm
          command -v llvm-objdump

      - name: Inspect optimized native and Worker-WASM secret selection
        run: node crates/ed25519-yao/scripts/check_constant_time_codegen.mjs

  build-and-test:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust components (rustfmt + clippy)
        run: rustup component add rustfmt clippy

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Build production WASM for type checking
        run: WASM_SDK_BUILD_MODE=prod pnpm build:wasm

      - name: Check lint, types, Rust, and architecture
        run: |
          pnpm lint
          pnpm type-check
          pnpm format:rust:check
          pnpm lint:rust
          pnpm check:signing-architecture

      - name: Setup Bun (for worker bundling)
        uses: oven-sh/setup-bun@v2

      - name: Install Playwright (Chromium + system deps)
        run: pnpm -C tests exec playwright install --with-deps chromium

      - name: Build SDK (production)
        env:
          WASM_SDK_USE_PREBUILT: '1'
        run: pnpm build:sdk-prod

      - name: Assert generated palette CSS
        run: node packages/sdk-web/scripts/checks/assert-palette-css.mjs

      - name: Run lite SDK tests
        run: pnpm -C tests exec playwright test -c playwright.lite.config.ts --reporter=line

      - name: Run signer runtime gates
        run: pnpm -C tests exec playwright test ./unit/walletSessionReadiness.gate.unit.test.ts ./unit/thresholdEcdsa.commitQueue.unit.test.ts ./unit/walletIframeHost.signTempoCancel.unit.test.ts --reporter=line

      - name: Run signer parity tests
        run: pnpm -C tests exec playwright test -c playwright.unit.config.ts ./unit/signerParity.rustPlatforms.unit.test.ts ./unit/signingVectors.webWasmReplay.integration.test.ts --workers=1 --reporter=line

      - name: Run relayer (server) tests
        run: pnpm -C packages/sdk-web test:relayer

  signer-parity-swift:
    if: github.event_name != 'push'
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install WASM C compiler
        run: |
          brew install llvm
          llvm_prefix="$(brew --prefix llvm)"
          echo "CC_wasm32_unknown_unknown=$llvm_prefix/bin/clang" >> "$GITHUB_ENV"
          echo "AR_wasm32_unknown_unknown=$llvm_prefix/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "RANLIB_wasm32_unknown_unknown=$llvm_prefix/bin/llvm-ranlib" >> "$GITHUB_ENV"
          "$llvm_prefix/bin/clang" --target=wasm32-unknown-unknown -c -x c /dev/null -o "$RUNNER_TEMP/wasm-toolchain-check.o"

      - name: Install wasm-pack
        run: |
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Install pinned worker-build
        run: pnpm -C crates/router-ab-cloudflare worker-build:install

      - name: Setup Bun (for sdk build in parity tests)
        uses: oven-sh/setup-bun@v2

      - name: Install Playwright (Chromium)
        run: pnpm -C tests exec playwright install chromium

      - name: Run signer parity with iOS Swift replay
        run: pnpm -C tests test:signer-parity:swift

  threshold-signing-core:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Setup Bun (for worker bundling)
        uses: oven-sh/setup-bun@v2

      - name: Install Playwright (Chromium + system deps)
        run: pnpm -C tests exec playwright install --with-deps chromium

      - name: Build SDK (production)
        run: pnpm build:sdk-prod

      - name: Smoke check EVM crypto runtime loading (Node + Workers)
        run: pnpm -C packages/sdk-web smoke:evm-crypto:runtimes

      - name: Run threshold signing core suites
        run: pnpm test:threshold-core

      - name: Upload threshold-core test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: threshold-core-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            packages/sdk-web/playwright-report
            packages/sdk-web/test-results
