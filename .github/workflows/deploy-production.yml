name: deploy-production

on:
  workflow_run:
    workflows: ['ci']
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy_production:
    name: Deploy production backend and sites
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    uses: ./.github/workflows/deploy-router-ab.yml
    with:
      target: production
      deploy_sha: ${{ github.event.workflow_run.head_sha }}
      source_branch: main
    secrets: inherit
