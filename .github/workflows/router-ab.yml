name: router-ab

on:
  push:
    paths:
      - '.github/workflows/router-ab.yml'
      - 'crates/router-ab-core/**'
      - 'crates/router-ab-cloudflare/**'
      - 'crates/router-ab-dev/**'
      - 'docs/router-A-B-signer*.md'
      - 'docs/router-a-b-local-dev.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - '.github/workflows/router-ab.yml'
      - 'crates/router-ab-core/**'
      - 'crates/router-ab-cloudflare/**'
      - 'crates/router-ab-dev/**'
      - 'docs/router-A-B-signer*.md'
      - 'docs/router-a-b-local-dev.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  router-ab-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Run Router A/B core tests
        run: cargo test --manifest-path crates/router-ab-core/Cargo.toml

      - name: Run Router A/B dev tests
        run: cargo test --manifest-path crates/router-ab-dev/Cargo.toml

      - name: Run Router A/B Cloudflare tests
        run: cargo test --manifest-path crates/router-ab-cloudflare/Cargo.toml

      - name: Check strict Worker entrypoints
        run: |
          set -euo pipefail
          for feature in \
            strict-worker-router-entrypoint \
            strict-worker-signer-a-entrypoint \
            strict-worker-signer-b-entrypoint \
            strict-worker-signing-worker-entrypoint
          do
            cargo check --manifest-path crates/router-ab-cloudflare/Cargo.toml --features "$feature"
          done

      - name: Run Cloudflare startup dry-run
        run: |
          pnpm router:deploy:dry-run -- \
            --out reports/startup-latencies/router-ab-github-dry-run-${{ github.run_id }}.json

      - name: Upload Router A/B startup dry-run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-ab-startup-dry-run-${{ github.run_id }}
          path: crates/router-ab-cloudflare/reports/startup-latencies/*.json
          if-no-files-found: ignore
