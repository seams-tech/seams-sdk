name: ci

on:
  push:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  formal-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: Install Lean toolchain
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y

      - name: Install Verus release
        env:
          VERUS_VERSION: 0.2026.04.03.21dfcd2
        run: |
          curl -L "https://github.com/verus-lang/verus/releases/download/release%2F${VERUS_VERSION}/verus-${VERUS_VERSION}-x86-linux.zip" -o /tmp/verus.zip
          rm -rf "$HOME/.local/verus"
          unzip -q /tmp/verus.zip -d /tmp
          mv /tmp/verus-x86-linux "$HOME/.local/verus"
          echo "$HOME/.local/verus" >> "$GITHUB_PATH"

      - name: Install Verus Rust toolchain
        run: |
          TOOLCHAIN=$(verus --version | sed -n 's/^  Toolchain: //p' | head -n1)
          test -n "$TOOLCHAIN"
          rustup toolchain install "$TOOLCHAIN"

      - name: Verify Lean and Verus toolchains
        run: |
          source "$HOME/.elan/env"
          lean --version
          lake --version
          verus --version
          cargo verus --help

      - name: Run ed25519-hss formal verification
        run: |
          source "$HOME/.elan/env"
          pnpm check:formal-verification

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust components (rustfmt + clippy)
        run: rustup component add rustfmt clippy

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Build WASM packages
        run: pnpm build:wasm

      - name: Check (lint + format + type-check)
        run: pnpm check

      - name: Enforce chain family naming guardrails
        run: pnpm -C tests check:chain-family-naming

      - name: Setup Bun (for worker bundling)
        uses: oven-sh/setup-bun@v2

      - name: Install Playwright (Chromium + system deps)
        run: pnpm -C tests exec playwright install --with-deps chromium

      - name: Build SDK (production)
        run: pnpm build:sdk-prod

      - name: Assert generated palette CSS
        run: node packages/sdk-web/scripts/checks/assert-palette-css.mjs

      - name: Run lite SDK tests
        run: pnpm test:lite

      - name: Run signer runtime gates
        run: pnpm test:signers:gates

      - name: Run relayer (server) tests
        run: pnpm -C packages/sdk-web test:relayer

  signer-parity-swift:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Setup Bun (for sdk build in parity tests)
        uses: oven-sh/setup-bun@v2

      - name: Install Playwright (Chromium)
        run: pnpm -C tests exec playwright install chromium

      - name: Run signer parity with iOS Swift replay
        run: pnpm -C tests test:signer-parity:swift

  threshold-signing-core:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Setup Bun (for worker bundling)
        uses: oven-sh/setup-bun@v2

      - name: Install Playwright (Chromium + system deps)
        run: pnpm -C tests exec playwright install --with-deps chromium

      - name: Build SDK (production)
        run: pnpm build:sdk-prod

      - name: Smoke check eth_signer runtime loading (Node + Workers)
        run: pnpm -C packages/sdk-web smoke:eth-signer:runtimes

      - name: Run threshold signing core suites
        run: pnpm test:threshold-core

      - name: Run threshold Ed25519 active-path suites
        run: pnpm test:threshold-ed25519:active-path

      - name: Run threshold Ed25519 load smoke
        run: pnpm benchmark:threshold-load:ci

      - name: Run relay-server script unit checks
        run: pnpm -C tests test:unit:relay-server-scripts

      - name: Run threshold ECDSA benchmark SLO gates
        env:
          # CI VMs have noisier CPU scheduling than local; keep guardrails but avoid flakiness.
          BENCH_SLO_PRESIGN_STEP_P95_MS: '1400'
          BENCH_SLO_PRESIGN_STEP_P99_MS: '2000'
        run: pnpm benchmark:threshold-ecdsa

      - name: Upload threshold-core test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: threshold-core-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            packages/sdk-web/playwright-report
            packages/sdk-web/test-results
