name: ci

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ed25519-yao-constant-time-codegen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Worker WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install LLVM WASM inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes llvm
          command -v llvm-objdump

      - name: Inspect optimized native and Worker-WASM secret selection
        run: node crates/ed25519-yao/scripts/check_constant_time_codegen.mjs

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust components (rustfmt + clippy)
        run: rustup component add rustfmt clippy

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Build WASM packages
        run: pnpm build:wasm

      - name: Check lint, types, Rust, and architecture
        run: pnpm check

      - name: Setup Bun (for worker bundling)
        uses: oven-sh/setup-bun@v2

      - name: Install Playwright (Chromium + system deps)
        run: pnpm -C tests exec playwright install --with-deps chromium

      - name: Build SDK (production)
        run: pnpm build:sdk-prod

      - name: Assert generated palette CSS
        run: node packages/sdk-web/scripts/checks/assert-palette-css.mjs

      - name: Run lite SDK tests
        run: pnpm test:lite

      - name: Run signer runtime gates
        run: pnpm test:signers:gates

      - name: Run relayer (server) tests
        run: pnpm -C packages/sdk-web test:relayer

  signer-parity-swift:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install WASM C compiler
        run: |
          brew install llvm
          llvm_prefix="$(brew --prefix llvm)"
          echo "CC_wasm32_unknown_unknown=$llvm_prefix/bin/clang" >> "$GITHUB_ENV"
          echo "AR_wasm32_unknown_unknown=$llvm_prefix/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "RANLIB_wasm32_unknown_unknown=$llvm_prefix/bin/llvm-ranlib" >> "$GITHUB_ENV"
          "$llvm_prefix/bin/clang" --target=wasm32-unknown-unknown -c -x c /dev/null -o "$RUNNER_TEMP/wasm-toolchain-check.o"

      - name: Install wasm-pack
        run: |
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Install pinned worker-build
        run: pnpm -C crates/router-ab-cloudflare worker-build:install

      - name: Setup Bun (for sdk build in parity tests)
        uses: oven-sh/setup-bun@v2

      - name: Install Playwright (Chromium)
        run: pnpm -C tests exec playwright install chromium

      - name: Run signer parity with iOS Swift replay
        run: pnpm -C tests test:signer-parity:swift

  threshold-signing-core:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Setup Bun (for worker bundling)
        uses: oven-sh/setup-bun@v2

      - name: Install Playwright (Chromium + system deps)
        run: pnpm -C tests exec playwright install --with-deps chromium

      - name: Build SDK (production)
        run: pnpm build:sdk-prod

      - name: Smoke check EVM crypto runtime loading (Node + Workers)
        run: pnpm -C packages/sdk-web smoke:evm-crypto:runtimes

      - name: Run threshold signing core suites
        run: pnpm test:threshold-core

      - name: Upload threshold-core test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: threshold-core-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            packages/sdk-web/playwright-report
            packages/sdk-web/test-results
