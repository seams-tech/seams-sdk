name: ci

on:
  push:
  pull_request:
  merge_group:

jobs:
  formal-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Coq toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y coq

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run formal verification checks
        run: make -C formal-verification check

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies (workspace)
        run: pnpm install --no-frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust components (rustfmt + clippy)
        run: rustup component add rustfmt clippy

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Generate WASM TypeScript types (wasm-pack)
        run: pnpm -C sdk exec bash ./scripts/codegen/generate-types.sh

      - name: Check (lint + format + type-check)
        run: pnpm check

      - name: Enforce chain family naming guardrails
        run: pnpm -C tests check:chain-family-naming

      - name: Setup Bun (for worker bundling)
        uses: oven-sh/setup-bun@v2

      - name: Install Playwright (Chromium + system deps)
        run: pnpm -C sdk exec playwright install --with-deps chromium

      - name: Build SDK (production)
        run: pnpm build:sdk-prod

      - name: Assert generated palette CSS
        run: node sdk/scripts/checks/assert-palette-css.mjs

      - name: Run lite SDK tests
        run: pnpm test:lite

      - name: Run signer runtime gates
        run: pnpm test:signers:gates

      - name: Run relayer (server) tests
        run: pnpm -C sdk test:relayer

  signer-parity-swift:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies (workspace)
        run: pnpm install --no-frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Setup Bun (for sdk build in parity tests)
        uses: oven-sh/setup-bun@v2

      - name: Install Playwright (Chromium)
        run: pnpm -C tests exec playwright install chromium

      - name: Run signer parity with iOS Swift replay
        run: pnpm -C tests test:signer-parity:swift

  relay-server-postgres-split-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies (workspace)
        run: pnpm install --no-frozen-lockfile

      - name: Prepare SDK dist for relay-server scripts
        run: pnpm -s server:prepare-sdk

      - name: Run split-domain Postgres bootstrap+migrate+verify smoke
        env:
          POSTGRES_URL: postgres://tatchi_signer:tatchi_signer@127.0.0.1:5432/tatchi_signer
          POSTGRES_MIGRATION_URL: postgres://tatchi_signer_migrator:tatchi_signer_migrator@127.0.0.1:5432/tatchi_signer
          CONSOLE_POSTGRES_URL: postgres://tatchi_console:tatchi_console@127.0.0.1:5432/tatchi_console
          CONSOLE_POSTGRES_MIGRATION_URL: postgres://tatchi_console_migrator:tatchi_console_migrator@127.0.0.1:5432/tatchi_console
        run: pnpm -C examples/relay-server run postgres:setup:split

      - name: Teardown relay-server Postgres compose stack
        if: always()
        run: pnpm -C examples/relay-server run postgres:down

  threshold-signing-core:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tatchi
          POSTGRES_PASSWORD: tatchi
          POSTGRES_DB: tatchi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tatchi -d tatchi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      POSTGRES_URL: postgres://tatchi:tatchi@127.0.0.1:5432/tatchi
      REDIS_URL: redis://127.0.0.1:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies (workspace)
        run: pnpm install --no-frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Setup Bun (for worker bundling)
        uses: oven-sh/setup-bun@v2

      - name: Install Playwright (Chromium + system deps)
        run: pnpm -C sdk exec playwright install --with-deps chromium

      - name: Build SDK (production)
        run: pnpm build:sdk-prod

      - name: Smoke check eth_signer runtime loading (Node + Workers)
        run: pnpm -C sdk smoke:eth-signer:runtimes

      - name: Run threshold signing core suites
        run: pnpm test:threshold-core

      - name: Run console Postgres isolation suites
        run: pnpm -C tests test:relayer:console-postgres

      - name: Run relay-server script unit checks
        run: pnpm -C tests test:unit:relay-server-scripts

      - name: Run threshold ECDSA benchmark SLO gates
        env:
          # CI VMs have noisier CPU scheduling than local; keep guardrails but avoid flakiness.
          BENCH_SLO_PRESIGN_STEP_P95_MS: '1400'
          BENCH_SLO_PRESIGN_STEP_P99_MS: '2000'
        run: pnpm benchmark:threshold-ecdsa

      - name: Upload threshold-core test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: threshold-core-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            sdk/playwright-report
            sdk/test-results
